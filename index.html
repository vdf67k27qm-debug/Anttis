<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anttis - 全パーツ合体完了</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Anttis: 組み立て完了<br>マウスで回転/ズーム</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(2, 2, 5);

        scene.add(new THREE.DirectionalLight(0xffffff, 2.5).set(5, 10, 7));
        scene.add(new THREE.AmbientLight(0x404040, 3));
        scene.add(new THREE.GridHelper(10, 10, 0x555555, 0x333333));

        // --- 確定した正解の数値 ---
        const S = 0.5;   // Unit Scale
        const AX = 0.3;  // 腕のX距離
        const AY = -0.15; // 腕のY高さ
        const LX = 0.15;  // 足のX（腕より少し内側と想定）
        const LY = -0.4; // 足のY（胴体の下）

        const bodyGroup = new THREE.Group();
        scene.add(bodyGroup);

        const loader = new GLTFLoader();
        const parts = {};

        function loadPart(name, x, y, z) {
            loader.load(`./${name}.glb`, (gltf) => {
                const model = gltf.scene;
                model.scale.set(S, S, S);
                model.position.set(x, y, z);
                bodyGroup.add(model);
                parts[name] = model;
            });
        }

        // --- 全パーツを「正解」の位置に配置 ---
        loadPart('Body',  0,  0, 0);
        loadPart('Arm_R', -AX, AY, 0); // 右
        loadPart('Arm_L',  AX, AY, 0); // 左
        loadPart('Leg_R', -LX, LY, 0); // 右足
        loadPart('Leg_L',  LX, LY, 0); // 左足

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
