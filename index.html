<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snail Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2F2F2F; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 1. シーン・カメラ・レンダラーの基本設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2F2F2F); // 背景色（ダークグレー）

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5); // モデルが見える位置にカメラを配置

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. ライトの設定（モデルが見えるように明るくする）
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // 3. モデルの読み込み
        const loader = new THREE.GLTFLoader();

        // 胴体の読み込み
        loader.load('Snail.glb', (gltf) => {
            scene.add(gltf.scene);
            console.log('Snail loaded');
        });

        // 殻の読み込み
        loader.load('Shell.glb', (gltf) => {
            scene.add(gltf.scene);
            console.log('Shell loaded');
        });

        // 4. 描画ループ
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // 画面サイズが変わった時の調整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
