<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Map Editor - Battlefield Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
// --- マップ・エディタ設定 ---
const TILE_SIZE = 64; // グリッドサイズ
const MAP_WIDTH = 20;  // マップの横幅（タイル数）
const MAP_HEIGHT = 12; // マップの縦幅（タイル数）

// タイルのID定義
// 1:土台(すり抜けない), 2:プラットフォーム(下からすり抜ける), 3:装飾
const TILE_TYPES = {
    EMPTY: 0,
    SOLID: 1,
    PLATFORM: 2,
    DECO: 3
};

// 初期マップデータ（空白）
let MAP_DATA = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(0));

// エディタの状態
let currentSelectedTile = TILE_TYPES.SOLID; // 現在選択中のタイルID

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#000000',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: true } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    // --- 素材のロード（iPad内のパスに合わせてください） ---
    // 背景（正方形）
    this.load.image('bg_castle', 'backgroundCastles.png');
    
    // タイル素材（バラバラの画像）
    this.load.image('tile_solid', 'ground_stone.png'); // 土台用
    this.load.image('tile_plat', 'platform_wood.png'); // すり抜け床用
    this.load.image('deco_flag', 'flag_red.png');      // 装飾用
}

let mapLayer; // タイルを配置するレイヤー
let marker;   // グリッドの場所を示すマーカー

function create() {
    const scene = this;

    // --- 1. 背景の配置 ---
    const bg = this.add.image(0, 0, 'bg_castle').setOrigin(0, 0);
    // 画面に合わせてスケーリング（正方形なので、横か縦の大きい方に合わせる）
    const scale = Math.max(scene.scale.width / bg.width, scene.scale.height / bg.height);
    bg.setScale(scale).setScrollFactor(0); // カメラに追従させない

    // --- 2. マップ描画用レイヤーの準備 ---
    mapLayer = this.add.group();

    // --- 3. グリッドマーカー（エディタ用） ---
    marker = this.add.graphics();
    marker.lineStyle(2, 0xffffff, 1);
    marker.strokeRect(0, 0, TILE_SIZE, TILE_SIZE);
    marker.setDepth(100);

    // --- 4. パレットUI（画面上部） ---
    const paletteY = 40;
    const paletteX = 50;
    
    // パレットの背景
    this.add.rectangle(0, 0, scene.scale.width, 80, 0x000000, 0.5).setOrigin(0,0).setScrollFactor(0).setDepth(90);

    // SOLIDタイル選択ボタン
    this.add.image(paletteX, paletteY, 'tile_solid').setDisplaySize(50, 50).setInteractive().setScrollFactor(0).setDepth(91)
        .on('pointerdown', () => { currentSelectedTile = TILE_TYPES.SOLID; console.log("SOLIDを選択"); });
    
    // PLATFORMタイル選択ボタン
    this.add.image(paletteX + 70, paletteY, 'tile_plat').setDisplaySize(50, 50).setInteractive().setScrollFactor(0).setDepth(91)
        .on('pointerdown', () => { currentSelectedTile = TILE_TYPES.PLATFORM; console.log("PLATFORMを選択"); });

    // DECOタイル選択ボタン
    this.add.image(paletteX + 140, paletteY, 'deco_flag').setDisplaySize(50, 50).setInteractive().setScrollFactor(0).setDepth(91)
        .on('pointerdown', () => { currentSelectedTile = TILE_TYPES.DECO; console.log("DECOを選択"); });
    
    // 消しゴムボタン
    const eraserBtn = this.add.rectangle(paletteX + 210, paletteY, 50, 50, 0xffffff, 0.2).setInteractive().setScrollFactor(0).setDepth(91)
        .on('pointerdown', () => { currentSelectedTile = TILE_TYPES.EMPTY; console.log("消しゴムを選択"); });
    this.add.text(paletteX + 190, paletteY - 10, '消しゴム', {fontSize: '12px', color: '#fff'}).setScrollFactor(0).setDepth(92);

    // 出力ボタン
    const outBtn = this.add.rectangle(scene.scale.width - 60, paletteY, 80, 50, 0x00ff00, 0.5).setInteractive().setScrollFactor(0).setDepth(91)
        .on('pointerdown', exportMapData);
    this.add.text(scene.scale.width - 90, paletteY - 10, 'データ出力', {fontSize: '12px', color: '#fff'}).setScrollFactor(0).setDepth(92);


    // --- 5. 配置アクション（iPadのタップ） ---
    this.input.on('pointerdown', placeTile, this);
    this.input.on('pointermove', (pointer) => {
        if (pointer.isDown) placeTile.call(this, pointer);
    }, this);

    // 最初に空白のマップを描画
    drawMap.call(this);
}

function update() {
    // アクション入力（タップ）の座標をグリッドに変換してマーカーを移動
    const worldPoint = this.input.activePointer.positionToCamera(this.cameras.main);
    const pointerTileX = Math.floor(worldPoint.x / TILE_SIZE);
    const pointerTileY = Math.floor(worldPoint.y / TILE_SIZE);

    marker.x = pointerTileX * TILE_SIZE;
    marker.y = pointerTileY * TILE_SIZE;
}

// --- タイル配置処理 ---
function placeTile(pointer) {
    // パレットエリア（上部80px）のタップは無視
    if (pointer.y < 80) return;

    const worldPoint = pointer.positionToCamera(this.cameras.main);
    const tileX = Math.floor(worldPoint.x / TILE_SIZE);
    const tileY = Math.floor(worldPoint.y / TILE_SIZE);

    // マップの範囲外なら無視
    if (tileX < 0 || tileX >= MAP_WIDTH || tileY < 0 || tileY >= MAP_HEIGHT) return;

    // データを更新
    MAP_DATA[tileY][tileX] = currentSelectedTile;

    // マップを再描画
    drawMap.call(this);
}

// --- マップ再描画処理（最適化の余地ありだが、エディタなので分かりやすさ優先） ---
function drawMap() {
    mapLayer.clear(true, true); // 一旦全部消す

    const tileKeys = {
        [TILE_TYPES.SOLID]: 'tile_solid',
        [TILE_TYPES.PLATFORM]: 'tile_plat',
        [TILE_TYPES.DECO]: 'deco_flag'
    };

    for (let row = 0; row < MAP_HEIGHT; row++) {
        for (let col = 0; col < MAP_WIDTH; col++) {
            const tileId = MAP_DATA[row][col];
            if (tileId === TILE_TYPES.EMPTY) continue;

            const x = col * TILE_SIZE + TILE_SIZE / 2;
            const y = row * TILE_SIZE + TILE_SIZE / 2;
            const key = tileKeys[tileId];

            if (!key) continue;

            const tileSprite = mapLayer.create(x, y, key);
            tileSprite.setDisplaySize(TILE_SIZE, TILE_SIZE);

            // 装飾以外は物理ボディ（static）を持つ
            if (tileId !== TILE_TYPES.DECO) {
                this.physics.add.existing(tileSprite, true);
            }
        }
    }
}

// --- マップデータの出力 ---
function exportMapData() {
    console.log("--- 以下の配列を GitHub の MAP_DATA に貼り付けてください ---");
    // 配列を見やすく整形して出力
    let output = "[\n";
    MAP_DATA.forEach(row => {
        output += "    [" + row.join(", ") + "],\n";
    });
    output += "]";
    console.log(output);
    alert("コンソールにマップデータを出力しました。PC等のブラウザの検証ツールでコピーしてください。");
}
</script>
</body>
</html>
