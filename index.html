<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Pro Map Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style> body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; } </style>
</head>
<body>
<script>
const TILE_SIZE = 64;
const MAP_WIDTH = 60;
const MAP_HEIGHT = 20;
const WORLD_W = MAP_WIDTH * TILE_SIZE;
const WORLD_H = MAP_HEIGHT * TILE_SIZE;

let MAP_DATA = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(0));
let currentTileID = null; // 初期値は何も選択していない状態

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    this.load.image('bg', 'backgroundCastles.png');
    this.load.image('t1', 'ground_stone.png');
    this.load.image('t2', 'platform_wood.png');
    this.load.image('t3', 'flag_red.png');
}

let cam, marker, uiButtons = [];

function create() {
    cam = this.cameras.main;
    cam.setBounds(0, 0, WORLD_W, WORLD_H);
    cam.setZoom(0.5); // 最初から少し引いた視点にする

    // 1. 背景 (最背面)
    const bg = this.add.image(0, 0, 'bg').setOrigin(0).setDisplaySize(WORLD_W, WORLD_H);

    // 2. グリッド線 (背景のすぐ上)
    const grid = this.add.grid(WORLD_W/2, WORLD_H/2, WORLD_W, WORLD_H, TILE_SIZE, TILE_SIZE, 0, 0, 0xffffff, 0.2);
    grid.setDepth(1);

    // 3. マップレイヤー
    this.mapLayer = this.add.group();

    // 4. マーカー
    marker = this.add.graphics().lineStyle(3, 0xffff00, 1).strokeRect(0, 0, TILE_SIZE, TILE_SIZE);
    marker.setDepth(10);

    // 5. UI作成
    createUI.call(this);

    // 6. 入力制御（マルチタッチ）
    this.input.addPointer(2); // 二本指
    this.input.addPointer(3); // 三本指
    
    setupTouchControls.call(this);
}

function setupTouchControls() {
    let lastPinchDist = 0;

    this.input.on('pointermove', (p) => {
        const p1 = this.input.pointer1;
        const p2 = this.input.pointer2;
        const p3 = this.input.pointer3;

        // 三本指：カメラ移動
        if (p1.isDown && p2.isDown && p3.isDown) {
            cam.scrollX -= (p.x - p.prevPosition.x) / cam.zoom;
            cam.scrollY -= (p.y - p.prevPosition.y) / cam.zoom;
        } 
        // 二本指：ピンチズーム
        else if (p1.isDown && p2.isDown) {
            let dist = Phaser.Math.Distance.Between(p1.x, p1.y, p2.x, p2.y);
            if (lastPinchDist > 0) {
                let zoomChange = dist / lastPinchDist;
                cam.setZoom(Phaser.Math.Clamp(cam.zoom * zoomChange, 0.1, 2.0));
            }
            lastPinchDist = dist;
        } 
        // 一本指：タイル配置（素材選択中のみ）
        else if (p1.isDown && currentTileID !== null && p1.y > 100) {
            placeTile.call(this, p1);
        }
    });

    this.input.on('pointerup', () => {
        lastPinchDist = 0;
    });
    
    // タップで配置（単押し対応）
    this.input.on('pointerdown', (p) => {
        if (p.y > 100 && currentTileID !== null && !this.input.pointer2.isDown) {
            placeTile.call(this, p);
        }
    });
}

function createUI() {
    const uiContainer = this.add.container(0, 0).setScrollFactor(0).setDepth(100);
    const topBar = this.add.rectangle(0, 0, window.innerWidth, 100, 0x000000, 0.8).setOrigin(0);
    uiContainer.add(topBar);

    const tiles = [
        { id: 1, key: 't1', label: '土台' },
        { id: 2, key: 't2', label: '足場' },
        { id: 3, key: 't3', label: '旗' }
    ];

    tiles.forEach((tile, i) => {
        const x = 70 + (i * 100);
        const btn = this.add.container(x, 50).setInteractive(new Phaser.Geom.Rectangle(-40, -40, 80, 80), Phaser.Geom.Rectangle.Contains);
        
        const bg = this.add.rectangle(0, 0, 80, 80, 0x333333).setStrokeStyle(2, 0x666666);
        const img = this.add.image(0, -5, tile.key).setDisplaySize(50, 50);
        const txt = this.add.text(0, 25, tile.label, {fontSize: '12px'}).setOrigin(0.5);
        
        btn.add([bg, img, txt]);
        btn.on('pointerdown', () => selectTile.call(this, tile.id, bg));
        
        uiContainer.add(btn);
        uiButtons.push({ id: tile.id, bg: bg });
    });

    // 出力ボタン
    const exportBtn = this.add.container(window.innerWidth - 80, 50).setInteractive(new Phaser.Geom.Rectangle(-40, -40, 80, 80), Phaser.Geom.Rectangle.Contains);
    exportBtn.add([this.add.rectangle(0,0,80,60,0x00aa00), this.add.text(0,0,'EXPORT').setOrigin(0.5)]);
    exportBtn.on('pointerdown', exportMapData);
    uiContainer.add(exportBtn);
}

function selectTile(id, bgElement) {
    if (currentTileID === id) {
        // 同じものをタップしたら非選択にする
        currentTileID = null;
    } else {
        currentTileID = id;
    }

    // 全ボタンの枠線をリセットし、選択中のみ黄色くする
    uiButtons.forEach(btn => {
        if (btn.id === currentTileID) {
            btn.bg.setStrokeStyle(4, 0xffff00);
            btn.bg.setFillStyle(0x555555);
        } else {
            btn.bg.setStrokeStyle(2, 0x666666);
            btn.bg.setFillStyle(0x333333);
        }
    });
}

function placeTile(pointer) {
    const worldPoint = pointer.positionToCamera(cam);
    const tx = Math.floor(worldPoint.x / TILE_SIZE);
    const ty = Math.floor(worldPoint.y / TILE_SIZE);

    if (tx >= 0 && tx < MAP_WIDTH && ty >= 0 && ty < MAP_HEIGHT) {
        MAP_DATA[ty][tx] = currentTileID;
        renderMap.call(this);
    }
}

function renderMap() {
    this.mapLayer.clear(true, true);
    const keys = { 1: 't1', 2: 't2', 3: 't3' };

    for (let r = 0; r < MAP_HEIGHT; r++) {
        for (let c = 0; c < MAP_WIDTH; c++) {
            const id = MAP_DATA[r][c];
            if (!id) continue;
            const img = this.mapLayer.create(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, keys[id]);
            img.setDisplaySize(TILE_SIZE, TILE_SIZE);
        }
    }
}

function update() {
    const worldPoint = this.input.activePointer.positionToCamera(cam);
    marker.x = Math.floor(worldPoint.x / TILE_SIZE) * TILE_SIZE;
    marker.y = Math.floor(worldPoint.y / TILE_SIZE) * TILE_SIZE;
    
    // 素材未選択時はマーカーを隠す
    marker.visible = (currentTileID !== null);
}

function exportMapData() {
    console.log(JSON.stringify(MAP_DATA));
    alert("コンソールに書き出しました");
}
</script>
</body>
</html>
