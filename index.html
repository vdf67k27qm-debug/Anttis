<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail Debug View</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: monospace; }
        #debug-ui { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.7); padding: 10px; pointer-events: none; z-index: 100; font-size: 12px; }
        #joystick-container { position: absolute; bottom: 50px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: block; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #FFD700; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="debug-ui">System Initializing...</div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const ui = document.getElementById('debug-ui');
        function log(msg) { ui.innerHTML += "<br>> " + msg; console.log(msg); }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        scene.add(new THREE.GridHelper(20, 20));

        const snailGroup = new THREE.Group();
        const motionGroup = new THREE.Group();
        snailGroup.add(motionGroup);
        scene.add(snailGroup);

        // --- Model Loading ---
        const loader = new THREE.GLTFLoader();
        let loadedCount = 0;

        function loadModel(name) {
            log(`Loading: ${name}...`);
            loader.load(name, 
                (gltf) => {
                    motionGroup.add(gltf.scene);
                    log(`SUCCESS: ${name}`);
                    loadedCount++;
                },
                undefined,
                (err) => {
                    log(`FAILED: ${name} (Not Found)`);
                    // 失敗した時の代わりに赤い箱を出す
                    const box = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    motionGroup.add(box);
                }
            );
        }

        // GitHubのリポジトリに上げたファイル名と完全に一致させてください
        loadModel('Snail.glb');
        loadModel('Shell.glb');

        // --- Joystick ---
        let moveInput = { x: 0, y: 0 };
        const knob = document.getElementById('joystick-knob');
        const container = document.getElementById('joystick-container');

        const handleTouch = (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + 60);
            const dy = touch.clientY - (rect.top + 60);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveInput = { x: Math.cos(angle) * (dist/40), y: Math.sin(angle) * (dist/40) };
        };

        container.addEventListener('touchstart', handleTouch);
        container.addEventListener('touchmove', handleTouch);
        container.addEventListener('touchend', () => {
            knob.style.transform = `translate(0,0)`;
            moveInput = { x: 0, y: 0 };
        });

        // --- Animation ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;

            if (moveInput.x !== 0 || moveInput.y !== 0) {
                snailGroup.position.x += moveInput.x * 0.1;
                snailGroup.position.z += moveInput.y * 0.1;
                snailGroup.rotation.y = Math.atan2(-moveInput.x, -moveInput.y);

                // 自然なモーション
                motionGroup.rotation.x = Math.sin(time * 2) * 0.1; // 前後揺れ
                motionGroup.position.y = Math.abs(Math.sin(time * 2)) * 0.1; // 跳ね
            }

            camera.position.lerp(new THREE.Vector3(snailGroup.position.x, 5, snailGroup.position.z + 10), 0.1);
            camera.lookAt(snailGroup.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
