<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Pro Stick</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2400 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let playerMain, body, head, leftHand, rightHand, sword, platforms;
let jumpCount = 0;
let isAttacking = false;
let attackType = 'slash'; // 'slash' or 'stab'
let attackDir = { x: 1, y: 0 };
let attackProgress = 0;
let joyInput = { x: 0, y: 0 };
let atkJoyInput = { x: 0, y: 0 };

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'rabbit_sword.png');
    this.load.image('tile', 'tile_top.png');
}

function create() {
    const scene = this;
    this.input.addPointer(3);

    const worldWidth = 2000;
    const worldHeight = 800;

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 32; i++) platforms.create(32 + (i * 64), 750, 'tile');
    platforms.create(400, 550, 'tile');
    platforms.create(800, 400, 'tile');
    platforms.create(1200, 550, 'tile');

    playerMain = this.add.container(400, 600);
    body = this.add.sprite(0, 0, 'body');
    head = this.add.sprite(0, -32, 'head');
    playerMain.add([body, head]);
    playerMain.setDepth(11);

    this.physics.world.enable(playerMain);
    playerMain.body.setCollideWorldBounds(true);
    playerMain.body.setDragX(3500); 
    playerMain.body.setMaxVelocity(400, 1200);
    playerMain.body.setSize(60, 80);
    playerMain.body.setOffset(-30, -40);

    leftHand = this.add.sprite(0, 0, 'hand').setDepth(10);
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 0.9).setDepth(12);
    rightHand = this.add.sprite(0, 0, 'hand').setDepth(13);

    this.physics.add.collider(playerMain, platforms);

    this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.startFollow(playerMain, true, 0.1, 0.1);

    const setupUI = () => {
        const uiY = 480;
        // 移動ジョイスティック (左)
        const joyBase = this.add.circle(120, uiY, 60, 0x000000, 0.1).setScrollFactor(0).setDepth(100);
        const joyStick = this.add.circle(120, uiY, 30, 0x000000, 0.2).setScrollFactor(0).setDepth(101);

        // 攻撃ジョイスティック (右)
        const atkBase = this.add.circle(680, uiY, 60, 0xff0000, 0.1).setScrollFactor(0).setDepth(100);
        const atkStick = this.add.circle(680, uiY, 30, 0xff0000, 0.2).setScrollFactor(0).setDepth(101);
        this.add.text(680, uiY - 80, 'ATTACK STICK', {fontSize:'14px', color:'#f00'}).setOrigin(0.5).setScrollFactor(0);

        // ジャンプボタン (中央)
        const btnJ = this.add.circle(400, uiY + 40, 50, 0x0000ff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(400, uiY + 40, 'JUMP', {fontSize:'18px', color:'#000'}).setOrigin(0.5).setScrollFactor(0);

        this.input.on('pointermove', (pointer) => {
            if (pointer.x < 300 && pointer.isDown) {
                const angle = Phaser.Math.Angle.Between(120, uiY, pointer.x, pointer.y);
                const dist = Math.min(Phaser.Math.Distance.Between(120, uiY, pointer.x, pointer.y), 60);
                joyStick.setPosition(120 + Math.cos(angle) * dist, uiY + Math.sin(angle) * dist);
                joyInput = { x: Math.cos(angle) * (dist/60), y: Math.sin(angle) * (dist/60) };
            }
            if (pointer.x > 500 && pointer.isDown) {
                const angle = Phaser.Math.Angle.Between(680, uiY, pointer.x, pointer.y);
                const dist = Math.min(Phaser.Math.Distance.Between(680, uiY, pointer.x, pointer.y), 60);
                atkStick.setPosition(680 + Math.cos(angle) * dist, uiY + Math.sin(angle) * dist);
                atkJoyInput = { x: Math.cos(angle) * (dist/60), y: Math.sin(angle) * (dist/60) };
            }
        });

        this.input.on('pointerup', (pointer) => {
            if (pointer.x < 300) {
                joyStick.setPosition(120, uiY);
                joyInput = { x: 0, y: 0 };
            }
            if (pointer.x > 500) {
                // 攻撃判定
                if (!isAttacking) {
                    const dist = Phaser.Math.Distance.Between(680, uiY, atkStick.x, atkStick.y);
                    if (dist > 30) {
                        startAttack(scene, 'slash', {x: atkJoyInput.x, y: atkJoyInput.y});
                    } else {
                        startAttack(scene, 'stab'); // タップで突き
                    }
                }
                atkStick.setPosition(680, uiY);
                atkJoyInput = { x: 0, y: 0 };
            }
        });

        btnJ.on('pointerdown', () => {
            if (playerMain.body.touching.down) { jumpCount = 1; playerMain.body.setVelocityY(-1000); }
            else if (jumpCount < 2) { jumpCount++; playerMain.body.setVelocityY(-900); }
        });
    };
    setupUI();
    this.cursors = this.input.keyboard.createCursorKeys();
}

function startAttack(scene, type, dir = null) {
    isAttacking = true;
    attackType = type;
    attackProgress = 0;
    
    // スラッシュの場合は方向を固定
    if (dir) {
        // 上下左右に丸める
        if (Math.abs(dir.x) > Math.abs(dir.y)) attackDir = { x: dir.x > 0 ? 1 : -1, y: 0 };
        else attackDir = { x: 0, y: dir.y > 0 ? 1 : -1 };
    }

    scene.tweens.add({
        targets: { val: 0 },
        val: 1,
        duration: type === 'stab' ? 400 : 250,
        ease: 'Cubic.easeOut',
        onUpdate: (tween) => { attackProgress = tween.getValue(); },
        onComplete: () => { isAttacking = false; }
    });
}

function update() {
    let moveX = (this.cursors.left.isDown ? -1 : (this.cursors.right.isDown ? 1 : joyInput.x));
    if (Math.abs(moveX) > 0.2) {
        playerMain.body.setAccelerationX(moveX * 4000);
        playerMain.setScale(moveX < 0 ? -1 : 1, 1);
    } else {
        playerMain.body.setAccelerationX(0);
    }
    
    if (playerMain.body.touching.down) jumpCount = 0;

    let time = this.time.now;
    let bounceY = (Math.abs(playerMain.body.velocity.x) > 20) ? Math.sin(time / 100) * 8 : Math.sin(time / 400) * 2;
    body.y = bounceY;
    head.y = -32 + bounceY;

    let side = playerMain.scaleX;
    let px = playerMain.x, py = playerMain.y;
    leftHand.setPosition(px - (40 * side), py + 10 + bounceY);

    if (!isAttacking) {
        rightHand.setPosition(px + (40 * side), py + 10 + bounceY);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setAngle(0);
        sword.setScale(side, 1.3);
    } else {
        if (attackType === 'stab') {
            // 2連突き
            let p = (attackProgress * 2) % 1; 
            let thrust = Math.sin(p * Math.PI) * 60;
            rightHand.setPosition(px + ((40 + thrust) * side), py + 10 + bounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle(90 * side);
        } else {
            // 方向斬り
            let p = attackProgress;
            let startAng, endAng;
            
            if (attackDir.y < -0.5) { // 上斬り
                startAng = 180; endAng = 0;
            } else if (attackDir.y > 0.5) { // 下斬り
                startAng = 0; endAng = 180;
            } else { // 横斬り
                startAng = -60; endAng = 200;
            }
            
            let currentAng = startAng + (p * (endAng - startAng));
            let sweepX = Math.cos(Phaser.Math.DegToRad(currentAng)) * 50;
            let sweepY = Math.sin(Phaser.Math.DegToRad(currentAng)) * 50;
            
            rightHand.setPosition(px + (sweepX * side), py + sweepY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle((currentAng + 90) * side);
        }
        sword.setScale(side, 1.5); // 攻撃時は少し大きく
    }
}
</script>
</body>
</html>
