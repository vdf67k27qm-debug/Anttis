<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Ragdoll Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
import * as CANNON from 'cannon-es';

// --- 1. 基本設定（Three.js） ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xa0a0a0);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
light.castShadow = true;
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// --- 2. 物理世界の設定（Cannon.js） ---
const world = new CANNON.World();
world.gravity.set(0, -9.82, 0);

// 地面
const groundBody = new CANNON.Body({ mass: 0 });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
world.addBody(groundBody);

const groundMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshStandardMaterial({ color: 0x888888 })
);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// --- 3. モデルの読み込みと物理設定 ---
const loader = new GLTFLoader();
let bodyMesh, armLMesh, armRMesh, legLMesh, legRMesh;
let bodyBody, armLBody, armRBody, legLBody, legRBody;

// 自分のパーツ同士の衝突を防ぐためのフィルター
const GROUP_PLAYER = 1;
const GROUP_OTHERS = 2;

loader.load('Base.glb', (gltf) => {
    const model = gltf.scene;
    scene.add(model);

    // 各パーツを取得
    bodyMesh = model.getObjectByName('Body');
    armLMesh = model.getObjectByName('Arm_L');
    armRMesh = model.getObjectByName('Arm_R');
    legLMesh = model.getObjectByName('Leg_L');
    legRMesh = model.getObjectByName('Leg_R');

    // --- 胴体の物理 ---
    bodyBody = new CANNON.Body({
        mass: 5,
        position: new CANNON.Vec3(0, 3, 0),
        shape: new CANNON.Box(new CANNON.Vec3(0.4, 0.6, 0.4)),
        collisionFilterGroup: GROUP_PLAYER,
        collisionFilterMask: GROUP_OTHERS,
        angularDamping: 0.9 // 回転しにくくする
    });
    world.addBody(bodyBody);

    // --- 腕の物理と接続 (左腕の例) ---
    if(armLMesh) {
        armLBody = new CANNON.Body({
            mass: 1,
            position: new CANNON.Vec3(-0.6, 3.5, 0),
            shape: new CANNON.Box(new CANNON.Vec3(0.15, 0.4, 0.15)),
            collisionFilterGroup: GROUP_PLAYER,
            collisionFilterMask: GROUP_OTHERS
        });
        world.addBody(armLBody);

        // 肩で繋ぐ（PointToPointConstraint）
        const constraint = new CANNON.PointToPointConstraint(
            bodyBody, new CANNON.Vec3(-0.5, 0.4, 0),
            armLBody, new CANNON.Vec3(0, 0.3, 0)
        );
        world.addConstraint(constraint);
    }

    // 他のパーツ（右腕、足）も同様に設定...
});

// --- 4. 操作とループ ---
let moveVec = { x: 0, z: 0 };
window.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    moveVec.x = (touch.clientX / window.innerWidth - 0.5) * 2;
    moveVec.z = (touch.clientY / window.innerHeight - 0.5) * 2;
}, { passive: false });

function animate() {
    requestAnimationFrame(animate);
    world.fixedStep();

    if (bodyBody && bodyMesh) {
        // 移動
        bodyBody.velocity.x = moveVec.x * 5;
        bodyBody.velocity.z = moveVec.z * 5;

        // 起き上がりこぼし（常に上を向く力）
        const uprightTorque = new CANNON.Vec3(
            -bodyBody.quaternion.x * 20,
            0,
            -bodyBody.quaternion.z * 20
        );
        bodyBody.applyTorque(uprightTorque);

        // メッシュを物理体に合わせる
        bodyMesh.position.copy(bodyBody.position);
        bodyMesh.quaternion.copy(bodyBody.quaternion);
        if(armLBody && armLMesh) {
            armLMesh.position.copy(armLBody.position);
            armLMesh.quaternion.copy(armLBody.quaternion);
        }
        // 他のパーツも同期...
    }
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
