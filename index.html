<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penguin Run - iPad Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border-radius: 50%; touch-action: none; border: 2px solid white; z-index: 10;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: white; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="joystick-container"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 照明
        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 7);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 地面
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x90ee90 }));
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        let dummy, mixer, walkAction;
        let moveDir = { x: 0, z: 0 };
        const gltfLoader = new GLTFLoader();
        const fbxLoader = new FBXLoader();

        // 1. まず人間（骨組み）を読み込む
        // ※ dummy.glb に変換済みと想定。FBXのままなら fbxLoader.load('Walking.fbx', ...) に書き換え
        gltfLoader.load('dummy.glb', (gltf) => {
            dummy = gltf.scene;
            dummy.visible = false; // 人間は隠す
            scene.add(dummy);

            mixer = new THREE.AnimationMixer(dummy);
            walkAction = mixer.clipAction(gltf.animations[0]);
            walkAction.play();
            walkAction.setEffectiveWeight(0);

            // 2. ペンギン（殻）を読み込んで骨にくっつける
            gltfLoader.load('animal-penguin.glb', (penguinGltf) => {
                const penguin = penguinGltf.scene;
                
                // パーツを骨に移植する関数
                const attachPart = (partName, boneName) => {
                    const part = penguin.getObjectByName(partName);
                    const bone = dummy.getObjectByName(boneName);
                    if (part && bone) {
                        // パーツの位置をリセットして骨の直下に入れる
                        part.position.set(0, 0, 0); 
                        bone.add(part);
                    }
                };

                // Mixamoの骨の名前に合わせてペンギンのパーツを接着
                attachPart('body', 'mixamorig_Spine');
                attachPart('head', 'mixamorig_Head');
                attachPart('wing_left', 'mixamorig_LeftArm');
                attachPart('wing_right', 'mixamorig_RightArm');
                attachPart('leg_left', 'mixamorig_LeftLeg');
                attachPart('leg_right', 'mixamorig_RightLeg');
                
                // 残りのパーツ（目や嘴）は体に付随するので、
                // 上記の attachPart で body ごと移動します。
            });
        });

        // カメラ位置
        camera.position.set(0, 3, 6);

        // ジョイスティック処理 (省略せず動作するように記述)
        const stick = document.getElementById('joystick-stick');
        const container = document.getElementById('joystick-container');
        let isTouching = false;

        container.addEventListener('touchstart', () => isTouching = true);
        window.addEventListener('touchend', () => {
            isTouching = false;
            moveDir = { x: 0, z: 0 };
            stick.style.transform = `translate(0, 0)`;
            if (walkAction) walkAction.setEffectiveWeight(0);
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            const rect = container.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveDir.x = Math.cos(angle) * (dist/40);
            moveDir.z = Math.sin(angle) * (dist/40);
            if (walkAction) walkAction.setEffectiveWeight(1);
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
            if (mixer) mixer.update(delta);

            if (dummy && (moveDir.x !== 0 || moveDir.z !== 0)) {
                dummy.position.x += moveDir.x * 0.05;
                dummy.position.z += moveDir.z * 0.05;
                dummy.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);
            }

            camera.position.lerp(new THREE.Vector3(
                dummy ? dummy.position.x : 0,
                5,
                (dummy ? dummy.position.z : 0) + 8
            ), 0.1);
            camera.lookAt(dummy ? dummy.position : new THREE.Vector3(0,0,0));

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
