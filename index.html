<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentou Reset</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    // --- 1. 準備 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(5, 10, 5);
    light.castShadow = true;
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x606060));

    // --- 2. 物理ワールド ---
    const world = new CANNON.World();
    world.gravity.set(0, -9.8, 0);

    // 強力な床
    const groundBody = new CANNON.Body({ mass: 0 });
    groundBody.addShape(new CANNON.Plane());
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(groundBody);

    const groundMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0x44aa44 })
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);

    // --- 3. キャラクター ---
    const parts = {};
    const loader = new THREE.GLTFLoader();

    loader.load('Base.glb', (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        // 胴体 (Body)
        const bodyM = model.getObjectByName('Body');
        const bodyB = new CANNON.Body({
            mass: 5,
            position: new CANNON.Vec3(0, 3, 0),
            shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.7, 0.3)),
            angularDamping: 0.9
        });
        world.addBody(bodyB);
        parts['Body'] = { mesh: bodyM, body: bodyB };

        // 腕 (Arm_L / Arm_R)
        ['Arm_L', 'Arm_R'].forEach((name, i) => {
            const m = model.getObjectByName(name);
            if (!m) return;
            const side = i === 0 ? -1 : 1;
            const b = new CANNON.Body({
                mass: 1,
                position: new CANNON.Vec3(side, 3, 0),
                shape: new CANNON.Box(new CANNON.Vec3(0.2, 0.4, 0.2))
            });
            world.addBody(b);
            world.addConstraint(new CANNON.PointToPointConstraint(
                bodyB, new CANNON.Vec3(side * 0.5, 0.5, 0),
                b, new CANNON.Vec3(0, 0.3, 0)
            ));
            parts[name] = { mesh: m, body: b };
        });
    }, undefined, (error) => {
        console.error("モデル読み込みエラー:", error);
    });

    // --- 4. 操作 ---
    let move = { x: 0, z: 0 };
    window.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        move.originX = t.clientX;
        move.originZ = t.clientY;
    });
    window.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        move.x = (t.clientX - move.originX) * 0.01;
        move.z = (t.clientY - move.originZ) * 0.01;
    });
    window.addEventListener('touchend', () => move = { x: 0, z: 0 });

    // --- 5. ループ ---
    function animate() {
        requestAnimationFrame(animate);
        world.fixedStep();

        for (let key in parts) {
            const p = parts[key];
            p.mesh.position.copy(p.body.position);
            p.mesh.quaternion.copy(p.body.quaternion);

            // 地面貫通防止（安全装置）
            if (p.body.position.y < 0.2) {
                p.body.position.y = 0.2;
                p.body.velocity.y = 0;
            }
        }

        if (parts['Body']) {
            const b = parts['Body'].body;
            b.velocity.x = move.x * 5;
            b.velocity.z = move.z * 5;

            // 起き上がり（超安定化）
            b.quaternion.x *= 0.9;
            b.quaternion.z *= 0.9;
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
