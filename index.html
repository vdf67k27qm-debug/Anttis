<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Mobile Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; font-family: sans-serif; pointer-events: none; font-size: 12px; }
        /* ジョイスティックの見た目 */
        #joystick-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; display: block; }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">画面左下をドラッグして移動</div>
    
    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 5, 12);

        scene.add(new THREE.AmbientLight(0xffffff, 3));
        scene.add(new THREE.GridHelper(100, 100, 0x666666, 0x333333));

        // --- 記録した黄金の数値 ---
        const S = 0.5;
        const POS = {
            Arm_R: { x: -0.25, y: -0.15 }, Arm_L: { x: 0.25, y: -0.15 },
            Leg_R: { x: -0.12, y: -0.2 },  Leg_L: { x: 0.12, y: -0.2 }
        };

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const loader = new GLTFLoader();
        const parts = {};
        const fileNames = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];

        fileNames.forEach(name => {
            loader.load(`./${name}.glb`, (gltf) => {
                const model = gltf.scene;
                model.scale.set(S, S, S);
                if (name !== 'Body') model.position.set(POS[name].x, POS[name].y, 0);
                parts[name] = model;
                playerGroup.add(model);
            });
        });

        // --- ジョイスティックのロジック ---
        let moveX = 0, moveZ = 0, isMoving = false;
        const base = document.getElementById('joystick-base');
        const stick = document.getElementById('joystick-stick');
        const baseRect = base.getBoundingClientRect();
        const centerX = baseRect.left + baseRect.width / 2;
        const centerY = baseRect.top + baseRect.height / 2;

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        window.addEventListener('touchend', () => {
            stick.style.transform = `translate(0px, 0px)`;
            moveX = 0; moveZ = 0; isMoving = false;
        });

        function handleTouch(e) {
            const touch = e.touches[0];
            if (touch.clientX < window.innerWidth / 2) { // 画面左側のみ反応
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);
                
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                stick.style.transform = `translate(${tx}px, ${ty}px)`;

                moveX = (dx / 50) * 0.15;
                moveZ = (dy / 50) * 0.15;
                isMoving = true;
            }
        }

        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getElapsedTime();

            if (isMoving && parts['Leg_R']) {
                playerGroup.position.x += moveX;
                playerGroup.position.z += moveZ;
                
                // 進む方向に向きを変える
                playerGroup.rotation.y = Math.atan2(-moveX, -moveZ);

                // アニメーション
                const walkSpeed = 12;
                parts['Leg_R'].rotation.x = Math.sin(delta * walkSpeed) * 0.6;
                parts['Leg_L'].rotation.x = Math.sin(delta * walkSpeed + Math.PI) * 0.6;
                parts['Arm_R'].rotation.x = Math.sin(delta * walkSpeed + Math.PI) * 0.6;
                parts['Arm_L'].rotation.x = Math.sin(delta * walkSpeed) * 0.6;
            } else if (parts['Leg_R']) {
                parts['Leg_R'].rotation.x = 0; parts['Leg_L'].rotation.x = 0;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
