<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Motion & Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2400 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let playerMain, body, head, leftHand, rightHand, sword, platforms;
let jumpCount = 0;
let isAttacking = false;
let attackType = 'slash'; 
let attackDir = { x: 1, y: 0 };
let attackProgress = 0;
let joyInput = { x: 0, y: 0 };
let atkJoyInput = { x: 0, y: 0 };
let isAtkJoyActive = false; // 攻撃ジョイスティックを正しく触っているか

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'rabbit_sword.png');
    this.load.image('tile', 'tile_top.png');
}

function create() {
    const scene = this;
    this.input.addPointer(3);

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 32; i++) platforms.create(32 + (i * 64), 750, 'tile');
    platforms.create(400, 550, 'tile');
    platforms.create(800, 400, 'tile');

    playerMain = this.add.container(400, 600);
    body = this.add.sprite(0, 0, 'body');
    head = this.add.sprite(0, -32, 'head');
    playerMain.add([body, head]);
    playerMain.setDepth(11);

    this.physics.world.enable(playerMain);
    playerMain.body.setCollideWorldBounds(true);
    playerMain.body.setDragX(3500); 
    playerMain.body.setMaxVelocity(400, 1200);
    playerMain.body.setSize(60, 90);
    playerMain.body.setOffset(-30, -45);

    leftHand = this.add.sprite(0, 0, 'hand').setDepth(10);
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 0.9).setDepth(12);
    rightHand = this.add.sprite(0, 0, 'hand').setDepth(13);

    this.physics.add.collider(playerMain, platforms);

    const setupUI = () => {
        const uiY = 510;
        const joyX = 110;
        const atkX = 690;
        const radius = 45;

        // UIパーツ
        this.add.circle(joyX, uiY, radius, 0x000000, 0.1).setScrollFactor(0).setDepth(100);
        const joyStick = this.add.circle(joyX, uiY, 20, 0x000000, 0.2).setScrollFactor(0).setDepth(101);
        this.add.circle(atkX, uiY, radius, 0xff0000, 0.1).setScrollFactor(0).setDepth(100);
        const atkStick = this.add.circle(atkX, uiY, 20, 0xff0000, 0.2).setScrollFactor(0).setDepth(101);
        const btnJ = this.add.circle(atkX - 90, uiY + 10, 35, 0x0000ff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(atkX - 90, uiY + 10, 'JUMP', {fontSize:'12px', color:'#000'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

        this.input.on('pointerdown', (p) => {
            // 攻撃ジョイスティックの範囲内かチェック
            if (Phaser.Math.Distance.Between(atkX, uiY, p.x, p.y) < radius) {
                isAtkJoyActive = true;
            }
        });

        this.input.on('pointermove', (p) => {
            // 移動
            if (p.x < 400 && p.isDown) {
                const ang = Phaser.Math.Angle.Between(joyX, uiY, p.x, p.y);
                const d = Math.min(Phaser.Math.Distance.Between(joyX, uiY, p.x, p.y), radius);
                joyStick.setPosition(joyX + Math.cos(ang) * d, uiY + Math.sin(ang) * d);
                joyInput = { x: Math.cos(ang) * (d/radius), y: Math.sin(ang) * (d/radius) };
            }
            // 攻撃（アクティブな時のみ）
            if (isAtkJoyActive && p.isDown) {
                const ang = Phaser.Math.Angle.Between(atkX, uiY, p.x, p.y);
                const d = Math.min(Phaser.Math.Distance.Between(atkX, uiY, p.x, p.y), radius);
                atkStick.setPosition(atkX + Math.cos(ang) * d, uiY + Math.sin(ang) * d);
                atkJoyInput = { x: Math.cos(ang) * (d/radius), y: Math.sin(ang) * (d/radius) };
            }
        });

        this.input.on('pointerup', (p) => {
            if (p.x < 400) {
                joyStick.setPosition(joyX, uiY);
                joyInput = { x: 0, y: 0 };
            }
            if (isAtkJoyActive) {
                if (!isAttacking) {
                    // 指を離した位置で最終的な方向を再計算（上方向入力を確実に拾う）
                    const dist = Phaser.Math.Distance.Between(atkX, uiY, p.x, p.y);
                    const ang = Phaser.Math.Angle.Between(atkX, uiY, p.x, p.y);
                    const finalDir = { x: Math.cos(ang), y: Math.sin(ang) };

                    if (dist > 25) {
                        startAttack(scene, 'slash', finalDir);
                    } else {
                        startAttack(scene, 'stab');
                    }
                }
                atkStick.setPosition(atkX, uiY);
                atkJoyInput = { x: 0, y: 0 };
                isAtkJoyActive = false;
            }
        });

        btnJ.on('pointerdown', () => {
            if (playerMain.body.touching.down) { jumpCount = 1; playerMain.body.setVelocityY(-1000); }
            else if (jumpCount < 2) { jumpCount++; playerMain.body.setVelocityY(-900); }
        });
    };
    setupUI();
}

function startAttack(scene, type, dir = null) {
    isAttacking = true;
    attackType = type;
    attackProgress = 0;
    if (dir) {
        if (Math.abs(dir.x) > 0.1) playerMain.setScale(dir.x > 0 ? 1 : -1, 1);
        attackDir = dir;
    } else {
        attackDir = { x: playerMain.scaleX, y: 0 };
    }
    scene.tweens.add({
        targets: { val: 0 }, val: 1, duration: type === 'stab' ? 300 : 250,
        onUpdate: (t) => { attackProgress = t.getValue(); },
        onComplete: () => { isAttacking = false; }
    });
}

function update() {
    let moveX = joyInput.x;
    let side = playerMain.scaleX;

    // --- 自然なモーション: 移動方向への傾き ---
    let targetAngle = 0;
    if (!isAttacking) {
        if (Math.abs(moveX) > 0.2) {
            playerMain.body.setAccelerationX(moveX * 4000);
            playerMain.setScale(moveX < 0 ? -1 : 1, 1);
            targetAngle = moveX * 15; // 進行方向に最大15度傾く
        } else {
            playerMain.body.setAccelerationX(0);
        }
    } else {
        playerMain.body.setAccelerationX(moveX * 4000);
    }
    // 傾きを滑らかに適用
    playerMain.angle = Phaser.Math.Linear(playerMain.angle, targetAngle, 0.1);

    if (playerMain.body.touching.down) jumpCount = 0;

    let bounceY = (Math.abs(playerMain.body.velocity.x) > 20) ? Math.sin(this.time.now / 100) * 8 : 0;
    body.y = bounceY;
    head.y = -32 + bounceY;

    let px = playerMain.x, py = playerMain.y;
    leftHand.setPosition(px - (40 * side), py + 10 + bounceY);
    leftHand.setScale(side, 1);

    if (!isAttacking) {
        rightHand.setPosition(px + (40 * side), py + 10 + bounceY);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setAngle(playerMain.angle);
        sword.setScale(side, 1.3);
    } else {
        if (attackType === 'stab') {
            let p = (attackProgress * 2) % 1; 
            let thrust = Math.sin(p * Math.PI) * 70;
            rightHand.setPosition(px + ((40 + thrust) * side), py + 10 + bounceY);
            sword.setAngle(90 * side);
        } else {
            let p = attackProgress;
            let startAng, endAng;
            // 上下判定を少し広めにして出しやすく修正
            if (attackDir.y < -0.3) { 
                startAng = 180; endAng = -40; // 上
            } else if (attackDir.y > 0.3) {
                startAng = 0; endAng = 200; // 下
            } else {
                startAng = -60; endAng = 220; // 横
            }
            let curAng = startAng + (p * (endAng - startAng));
            let rx = Math.cos(Phaser.Math.DegToRad(curAng)) * 60;
            let ry = Math.sin(Phaser.Math.DegToRad(curAng)) * 60;
            rightHand.setPosition(px + (rx * side), py + ry + bounceY);
            sword.setAngle((curAng + 90) * side);
        }
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setScale(side, 1.6);
    }
}
</script>
</body>
</html>
