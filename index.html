<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joystick Sentou</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87ceeb; touch-action: none; }
        canvas { display: block; }
        /* ジョイスティックの見た目 */
        #ui { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; 
              background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: none; visibility: hidden; }
        #knob { position: absolute; width: 40px; height: 40px; background: white; 
                border-radius: 50%; top: 30px; left: 30px; }
    </style>
</head>
<body>
    <div id="ui"><div id="knob"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 5);
    sun.castShadow = true;
    scene.add(sun);

    // 地面
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x7cfc00 }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    let playerGroup = new THREE.Group();
    scene.add(playerGroup);
    let parts = {};

    new THREE.GLTFLoader().load('Base.glb', (gltf) => {
        const model = gltf.scene;
        playerGroup.add(model);
        const names = ['Body', 'Arm_L', 'Arm_R', 'Leg_L', 'Leg_R'];
        names.forEach(n => {
            const p = model.getObjectByName(n);
            if (p) { parts[n] = p; p.userData.initRot = p.rotation.clone(); }
        });
        playerGroup.position.y = 1.2;
    });

    // --- ジョイスティックの処理 ---
    const ui = document.getElementById('ui');
    const knob = document.getElementById('knob');
    let input = { x: 0, y: 0, active: false };
    let startPos = { x: 0, y: 0 };

    window.addEventListener('touchstart', (e) => {
        input.active = true;
        const t = e.touches[0];
        startPos = { x: t.clientX, y: t.clientY };
        ui.style.visibility = 'visible';
        ui.style.left = (startPos.x - 50) + 'px';
        ui.style.bottom = (window.innerHeight - startPos.y - 50) + 'px';
    });

    window.addEventListener('touchmove', (e) => {
        if (!input.active) return;
        const t = e.touches[0];
        let dx = t.clientX - startPos.x;
        let dy = t.clientY - startPos.y;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);
        
        input.x = (Math.cos(angle) * dist) / 50;
        input.y = (Math.sin(angle) * dist) / 50;
        
        knob.style.transform = `translate(${input.x * 40}px, ${input.y * 40}px)`;
    });

    window.addEventListener('touchend', () => {
        input = { x: 0, y: 0, active: false };
        ui.style.visibility = 'hidden';
    });

    // --- アニメーション ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        const moveSpeed = 0.15;

        if (parts['Body']) {
            // 移動
            playerGroup.position.x += input.x * moveSpeed;
            playerGroup.position.z += input.y * moveSpeed;

            // 向きを変える
            if (input.active) {
                playerGroup.rotation.y = Math.atan2(-input.x, -input.y);
            }

            // ふにゃふにゃアニメ
            const isMoving = input.active;
            const wave = Math.sin(t * 10) * (isMoving ? 1 : 0.2);
            
            parts['Leg_L'].rotation.x = parts['Leg_L'].userData.initRot.x + wave * 0.8;
            parts['Leg_R'].rotation.x = parts['Leg_R'].userData.initRot.x - wave * 0.8;
            parts['Arm_L'].rotation.z = parts['Arm_L'].userData.initRot.z + wave * 0.3;
            parts['Arm_R'].rotation.z = parts['Arm_R'].userData.initRot.z - wave * 0.3;
            parts['Body'].position.y = Math.abs(wave) * 0.2;
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
