<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Refined Mechanics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; touch-action: none; }
    </style>
</head>
<body>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());

// --- 調整用パラメータ定数 ---
const CHARGE_TIME_THRESHOLD = 250; 
const NORMAL_MOVE_ACCEL = 2200;
const NORMAL_MAX_VELOCITY = 400;
const NORMAL_DRAG = 3500;
const JUMP_VELOCITY_MAX = -1350; 
const JUMP_VELOCITY_MIN = -1200;  
const SUPER_DASH_SPEED = 1000;
const SUPER_DASH_DURATION = 400;
const SUPER_UP_VELOCITY = -1200;
const METEOR_SPEED = 1300;
const ATTACK_RECOIL = 200; 
const DUST_COLOR = 0xd2b48c; 

// ガード・回避用定数
const SHIELD_SCALE_MAX = 1.7;   
const SHIELD_SCALE_MIN = 0.8;   
const SHIELD_DECAY = 0.006;     
const SHIELD_RECOVERY = 0.004;  

// 回避設定
const DODGE_DURATION = 300;       
const DODGE_SPEED_GROUND = 2800;
const DODGE_SPEED_AIR = 350;      
const DODGE_COOLDOWN = 500;       
const FAST_FALL_SPEED = 800;     

const BOUNCE_AMPLITUDE_MOVE = 4; 
const BOUNCE_AMPLITUDE_IDLE = 2; 
// -----------------------

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2600 }, debug: false, overlapBias: 64 }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let playerMain, body, head, leftHand, rightHand, sword, platforms;
let shieldSprite;
let jumpCount = 0;
let isAttacking = false;
let isGuarding = false;
let isDodging = false;
let canAttackInAir = true; 
let airDodgeUsed = false; 
let shieldValue = 1.0; 
let lastDodgeTime = 0; 

let attackType = 'slash'; 
let attackDir = { x: 1, y: 0 };
let attackLockedSide = 1; 
let facingSide = 1; 
let attackProgress = 0;
let currentTween = null;

let chargeTimer = 0;
let isCharging = false;
let joyInput = { x: 0, y: 0 };
let atkJoyInput = { x: 0, y: 0 };
let movePointerId = null;
let atkPointerId = null;
let isJumpPressed = false; 
let isShieldPressed = false; 
let dustGroup; 

// --- 追加フラグ ---
let waitingForJoyReset = false; 
let wasShieldPressed = false; 

// キャラクター全体のアルファ値を設定する関数
function setAlphaAll(a) {
    if (playerMain) playerMain.setAlpha(a);
    if (leftHand) leftHand.setAlpha(a);
    if (rightHand) rightHand.setAlpha(a);
    if (sword) sword.setAlpha(a);
}

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'rabbit_sword.png');
    this.load.image('tile', 'tile_top.png');
    this.load.image('shield', 'shield.png');
}

function create() {
    const scene = this;
    this.input.addPointer(3);
    const worldWidth = 2000;
    const worldHeight = 800;
    dustGroup = this.add.group();

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 32; i++) platforms.create(32 + (i * 64), 750, 'tile');
    platforms.create(400, 550, 'tile');
    platforms.create(800, 400, 'tile');
    platforms.create(1200, 550, 'tile');

    playerMain = this.add.container(400, 600);
    body = this.add.sprite(0, 8, 'body');
    head = this.add.sprite(0, -24, 'head');
    
    shieldSprite = this.add.sprite(0, 0, 'shield');
    shieldSprite.setAlpha(0); 
    shieldSprite.setTint(0x88ccff);
    
    playerMain.add([body, head, shieldSprite]);
    playerMain.setDepth(11);

    this.physics.world.enable(playerMain);
    playerMain.body.setCollideWorldBounds(true);
    playerMain.body.setDragX(NORMAL_DRAG); 
    playerMain.body.setMaxVelocity(NORMAL_MAX_VELOCITY, 1800); 
    playerMain.body.setSize(50, 85);
    playerMain.body.setOffset(-25, -42);

    leftHand = this.add.sprite(0, 0, 'hand').setDepth(10);
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 0.85).setDepth(12);
    rightHand = this.add.sprite(0, 0, 'hand').setDepth(13);

    this.physics.add.collider(playerMain, platforms, (p, platform) => {
        if (!isAttacking) return;
        const b = playerMain.body;
        if (attackType === 'super_dash' && (b.blocked.left || b.blocked.right)) {
            b.setVelocityX(-b.velocity.x * 0.2);
            stopAttack();
        } else if (attackType === 'super_up' && b.blocked.up) {
            b.setVelocityY(ATTACK_RECOIL);
            stopAttack();
        } else if (attackType === 'super_meteor' && b.blocked.down) {
            b.setVelocityY(-450); 
            stopAttack();
        }
    });

    this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.startFollow(playerMain, true, 0.1, 0.1);

    const setupUI = () => {
        const uiY = 510, joyX = 110, atkX = 690, radius = 45;
        this.add.circle(joyX, uiY, radius, 0x000000, 0.1).setScrollFactor(0).setDepth(100);
        const joyStick = this.add.circle(joyX, uiY, 20, 0x000000, 0.2).setScrollFactor(0).setDepth(101);
        this.add.circle(atkX, uiY, radius, 0xff0000, 0.1).setScrollFactor(0).setDepth(100);
        const atkStick = this.add.circle(atkX, uiY, 20, 0xff0000, 0.2).setScrollFactor(0).setDepth(102);
        
        const btnJ = this.add.circle(atkX - 95, uiY + 10, 35, 0x0000ff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(atkX - 95, uiY + 10, 'JUMP', {fontSize:'12px', color:'#000', fontWeight:'bold'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

        const btnS = this.add.circle(atkX - 40, uiY - 75, 35, 0x00ffff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(atkX - 40, uiY - 75, 'SHIELD', {fontSize:'10px', color:'#000', fontWeight:'bold'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

        this.input.on('pointerdown', (p) => {
            if (airDodgeUsed) {
                if (Phaser.Math.Distance.Between(p.x, p.y, joyX, uiY) < radius + 20) movePointerId = p.id;
                return;
            }
            if (Phaser.Math.Distance.Between(p.x, p.y, atkX - 95, uiY + 10) < 35) return;
            if (Phaser.Math.Distance.Between(p.x, p.y, atkX - 40, uiY - 75) < 35) return;
            if (Phaser.Math.Distance.Between(p.x, p.y, joyX, uiY) < radius + 20) movePointerId = p.id;
            if (Phaser.Math.Distance.Between(p.x, p.y, atkX, uiY) < radius) {
                atkPointerId = p.id;
                chargeTimer = scene.time.now;
                isCharging = false;
            }
        });

        this.input.on('pointermove', (p) => {
            if (p.id === movePointerId) {
                const ang = Phaser.Math.Angle.Between(joyX, uiY, p.x, p.y);
                const d = Math.min(Phaser.Math.Distance.Between(joyX, uiY, p.x, p.y), radius);
                joyStick.setPosition(joyX + Math.cos(ang) * d, uiY + Math.sin(ang) * d);
                joyInput = { x: Math.cos(ang) * (d/radius), y: Math.sin(ang) * (d/radius) };
            }
            if (p.id === atkPointerId && !airDodgeUsed) {
                const ang = Phaser.Math.Angle.Between(atkX, uiY, p.x, p.y);
                const d = Math.min(Phaser.Math.Distance.Between(atkX, uiY, p.x, p.y), radius);
                atkStick.setPosition(atkX + Math.cos(ang) * d, uiY + Math.sin(ang) * d);
                atkJoyInput = { x: Math.cos(ang) * (d/radius), y: Math.sin(ang) * (d/radius) };
            }
        });

        const releasePointer = (p) => {
            if (p.id === movePointerId) {
                joyStick.setPosition(joyX, uiY);
                joyInput = { x: 0, y: 0 };
                movePointerId = null;
            }
            if (p.id === atkPointerId) {
                if (!isAttacking && !isGuarding && !isDodging && canAttackInAir && !airDodgeUsed) {
                    const d = Phaser.Math.Distance.Between(atkX, uiY, atkStick.x, atkStick.y);
                    if (isCharging && d > 20) {
                        if (atkJoyInput.y < -0.6) startAttack(scene, 'super_up', {x: 0, y: -1});
                        else if (atkJoyInput.y > 0.6) startAttack(scene, 'super_meteor', {x: 0, y: 1});
                        else if (Math.abs(atkJoyInput.x) > 0.5) startAttack(scene, 'super_dash', {x: atkJoyInput.x > 0 ? 1 : -1, y: 0});
                        else startAttack(scene, 'slash', {x: atkJoyInput.x, y: atkJoyInput.y});
                    } else {
                        if (d > 20) startAttack(scene, 'slash', {x: atkJoyInput.x, y: atkJoyInput.y});
                        else startAttack(scene, 'stab');
                    }
                }
                atkStick.setPosition(atkX, uiY);
                atkJoyInput = { x: 0, y: 0 };
                atkPointerId = null;
                isCharging = false;
            }
        };

        this.input.on('pointerup', releasePointer);
        this.input.on('pointercancel', releasePointer);

        btnJ.on('pointerdown', () => {
            if (isGuarding || isDodging || airDodgeUsed) return;
            isJumpPressed = true;
            if (playerMain.body.touching.down) {
                jumpCount = 1;
                playerMain.body.setVelocityY(JUMP_VELOCITY_MAX);
            } else if (jumpCount < 2) {
                jumpCount++;
                playerMain.body.setVelocityY(JUMP_VELOCITY_MIN);
            }
        });
        btnJ.on('pointerup', () => isJumpPressed = false);

        btnS.on('pointerdown', () => {
            if (isAttacking || isDodging) return;
            if (playerMain.body.touching.down && scene.time.now - lastDodgeTime < DODGE_COOLDOWN) return;
            isShieldPressed = true;
            // 空中かつ移動中、またはガードボタンが押された瞬間の空中回避判定
            if (!playerMain.body.touching.down && !airDodgeUsed) {
                startDodge(scene, joyInput.x, joyInput.y, true);
            }
        });
        btnS.on('pointerup', () => isShieldPressed = false);
    };
    setupUI();
    this.cursors = this.input.keyboard.createCursorKeys();
}

function startDodge(scene, dx, dy, isAir) {
    if (isDodging) return;
    isDodging = true;
    isGuarding = false;
    isShieldPressed = false; 
    
    if (isAir) {
        airDodgeUsed = true;
        canAttackInAir = false; 
    }

    let speed = isAir ? DODGE_SPEED_AIR : DODGE_SPEED_GROUND;
    let vx = dx * speed;
    let vy = dy * speed;
    if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) vx = facingSide * speed;

    playerMain.body.setDragX(0);
    playerMain.body.setVelocity(vx, vy * 0.5);
    playerMain.body.setAcceleration(0, 0);

    setAlphaAll(0.5);

    scene.time.delayedCall(DODGE_DURATION, () => {
        isDodging = false;
        setAlphaAll(1.0);
        playerMain.body.setDragX(NORMAL_DRAG);
        if (playerMain.body.touching.down) {
            playerMain.body.setVelocityX(0);
            lastDodgeTime = scene.time.now;
        }
    });
}

function stopAttack() {
    isAttacking = false;
    if (currentTween) currentTween.stop();
    playerMain.body.setMaxVelocity(NORMAL_MAX_VELOCITY, 1800);
    playerMain.body.setDragX(NORMAL_DRAG); 
}

function startAttack(scene, type, dir = null) {
    if (isAttacking || isGuarding || isDodging || !canAttackInAir || airDodgeUsed) return;
    
    isAttacking = true;
    attackType = type;
    attackProgress = 0;
    attackLockedSide = facingSide;

    if (dir && Math.abs(dir.x) > 0.5) {
        attackLockedSide = dir.x > 0 ? 1 : -1;
        facingSide = attackLockedSide;
    }
    
    playerMain.setScale(facingSide, 1);
    attackDir = { x: dir ? dir.x : 0, y: dir ? dir.y : 0 };

    if (!playerMain.body.touching.down && (type === 'slash' || type === 'stab')) {
        playerMain.body.setDragX(0);
    }

    let duration = 150;
    if (type === 'stab') duration = 250;
    if (type === 'super_dash') {
        duration = SUPER_DASH_DURATION;
        playerMain.body.setMaxVelocity(SUPER_DASH_SPEED, 1800);
        playerMain.body.setDragX(0); 
    }
    if (type === 'super_up') {
        duration = 500;
        playerMain.body.setMaxVelocity(NORMAL_MAX_VELOCITY, Math.abs(SUPER_UP_VELOCITY));
    }
    if (type === 'super_meteor') {
        duration = 3000;
        playerMain.body.setMaxVelocity(NORMAL_MAX_VELOCITY, METEOR_SPEED);
    }

    currentTween = scene.tweens.add({
        targets: { val: 0 },
        val: 1,
        duration: duration,
        onUpdate: (tween) => { 
            attackProgress = tween.getValue();
            if (type === 'super_dash') {
                playerMain.body.setVelocityX(attackLockedSide * SUPER_DASH_SPEED);
                playerMain.body.setVelocityY(0);
            } else if (type === 'super_up') {
                playerMain.body.setVelocityY(SUPER_UP_VELOCITY);
            } else if (type === 'super_meteor') {
                playerMain.body.setVelocityY(METEOR_SPEED);
            }
        },
        onComplete: () => { if (isAttacking) stopAttack(); }
    });
}

function update() {
    let time = this.time.now;
    let isOnGround = playerMain.body.touching.down;

    if (isOnGround) {
        airDodgeUsed = false;
        canAttackInAir = true;
        jumpCount = 0;
    } else {
        if (joyInput.y > 0.5) playerMain.body.setVelocityY(FAST_FALL_SPEED);
    }

    let moveX = (this.cursors.left.isDown ? -1 : (this.cursors.right.isDown ? 1 : joyInput.x));
    let justGuarded = isShieldPressed && !wasShieldPressed;

    // --- ガード・回避ロジック修正 ---
    if (isShieldPressed && !isAttacking && !isDodging) {
        if (isOnGround) {
            // 地上：ガード優先（静止）
            playerMain.body.setAccelerationX(0);
            playerMain.body.setVelocityX(0);
            
            if (justGuarded && Math.abs(moveX) > 0.2) {
                waitingForJoyReset = true;
            }
            if (Math.abs(moveX) < 0.1) {
                waitingForJoyReset = false;
            }
            
            if (Math.abs(moveX) > 0.5 && !waitingForJoyReset) {
                startDodge(this, moveX > 0 ? 1 : -1, 0, false);
                isGuarding = false;
            } else if (shieldValue > 0.05) { 
                isGuarding = true;
            } else {
                isGuarding = false;
            }
        } else {
            // 空中：移動入力があれば即座に回避を実行
            if (!airDodgeUsed && Math.abs(moveX) > 0.1) {
                startDodge(this, moveX > 0 ? 1 : -1, joyInput.y, true);
                isGuarding = false;
            } else {
                isGuarding = false; // 空中では移動入力なしのガード不可
            }
            waitingForJoyReset = false;
        }
    } else {
        isGuarding = false;
        waitingForJoyReset = false; 
    }

    wasShieldPressed = isShieldPressed;

    if (isGuarding) {
        shieldValue = Math.max(0, shieldValue - SHIELD_DECAY);
        shieldSprite.setAlpha(1.0); 
        let s = SHIELD_SCALE_MIN + (shieldValue * (SHIELD_SCALE_MAX - SHIELD_SCALE_MIN));
        shieldSprite.setScale(s);
        setAlphaAll(0.5); 
    } else {
        shieldValue = Math.min(1.0, shieldValue + SHIELD_RECOVERY);
        shieldSprite.setAlpha(0);
        if (!isDodging) {
            setAlphaAll(1.0); 
        }
    }

    if (!isJumpPressed && playerMain.body.velocity.y < -100) {
        playerMain.body.setVelocityY(playerMain.body.velocity.y * 0.9); 
    }

    if (atkPointerId !== null && !isAttacking) {
        let elapsed = time - chargeTimer;
        isCharging = (elapsed >= CHARGE_TIME_THRESHOLD);
    }

    if (!isAttacking && !isGuarding) {
        if (!isDodging) {
            playerMain.body.setDragX(NORMAL_DRAG);
            if (Math.abs(moveX) > 0.2) {
                playerMain.body.setAccelerationX(moveX * NORMAL_MOVE_ACCEL);
                if (!airDodgeUsed || isOnGround) {
                    facingSide = moveX < 0 ? -1 : 1;
                    playerMain.setScale(facingSide, 1);
                }
                if (isOnGround && time % 5 === 0) createDustEffect(this, playerMain.x, playerMain.y);
            } else {
                playerMain.body.setAccelerationX(0);
            }
        } else {
            playerMain.body.setAccelerationX(0);
        }
    } else if (isAttacking) {
        if (attackType === 'super_up' || attackType === 'super_meteor') {
            playerMain.body.setAccelerationX(moveX * NORMAL_MOVE_ACCEL);
            if (Math.abs(moveX) > 0.2) {
                facingSide = moveX < 0 ? -1 : 1;
                attackLockedSide = facingSide; 
            }
        } else {
            playerMain.body.setAccelerationX(0);
        }
        playerMain.setScale(attackLockedSide, 1); 
    }
    
    // --- 描写ロジック ---
    let isMoving = Math.abs(playerMain.body.velocity.x) > 20;
    let side = isAttacking ? attackLockedSide : facingSide;
    let totalBounceY = (!isOnGround) ? -4 : (isMoving ? Math.sin(time / 100) * BOUNCE_AMPLITUDE_MOVE : Math.sin(time / 350) * BOUNCE_AMPLITUDE_IDLE);
    let leanAngle = isMoving ? (playerMain.body.velocity.x / NORMAL_MAX_VELOCITY) * 12 : 0;

    body.y = 8 + totalBounceY;
    head.y = -24 + totalBounceY;
    playerMain.setAngle(leanAngle);

    let px = playerMain.x, py = playerMain.y;
    leftHand.setPosition(px - (40 * side), py + 18 + totalBounceY);
    leftHand.setScale(side, 1);
    leftHand.setAngle(playerMain.angle);

    if (!isAttacking) {
        rightHand.setPosition(px + (40 * side), py + 18 + totalBounceY);
        rightHand.setAngle(playerMain.angle);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setAngle(playerMain.angle);
        sword.setScale(side, 1.3);
    } else {
        rightHand.setAngle(0); 
        if (attackType === 'stab' || attackType === 'super_dash') {
            let p = (attackType === 'super_dash') ? 1 : (attackProgress * 2) % 1;
            let thrust = (attackType === 'super_dash') ? 60 : Math.sin(p * Math.PI) * 75;
            rightHand.setPosition(px + ((40 + thrust) * side), py + 18 + totalBounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle(90 * side);
            sword.setScale(side, attackType === 'super_dash' ? 1.5 : 2.0);
        } else if (attackType === 'super_up') {
            rightHand.setPosition(px, py - 80 + totalBounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle(0);
            sword.setScale(side, 1.8);
        } else if (attackType === 'super_meteor') {
            rightHand.setPosition(px, py + 80 + totalBounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle(180);
            sword.setScale(side, 1.8);
        } else {
            let p = attackProgress;
            let startAng = (attackDir.y < -0.4) ? -150 : (attackDir.y > 0.4 ? 20 : -60);
            let endAng = (attackDir.y < -0.4) ? -30 : (attackDir.y > 0.4 ? 160 : 60);
            let currentAng = startAng + (p * (endAng - startAng));
            let sweepX = Math.cos(Phaser.Math.DegToRad(currentAng)) * 65;
            let sweepY = Math.sin(Phaser.Math.DegToRad(currentAng)) * 65;
            rightHand.setPosition(px + (sweepX * side), py + sweepY + 18 + totalBounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle((currentAng + 90) * side);
            sword.setScale(side, 1.6);
        }
    }
}

function createDustEffect(scene, x, y) {
    const dust = scene.add.circle(x, y + 40, Phaser.Math.Between(4, 10), DUST_COLOR, 0.6);
    dust.setDepth(5);
    dustGroup.add(dust);
    scene.tweens.add({
        targets: dust,
        x: x + Phaser.Math.Between(-20, 20),
        y: y + 20 + Phaser.Math.Between(-5, 5),
        alpha: 0,
        scale: 0.2,
        duration: Phaser.Math.Between(400, 700),
        onComplete: () => dust.destroy()
    });
}
</script>
</body>
</html>
