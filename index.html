<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>銭闘 Ragdoll Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
import * as CANNON from 'cannon-es';

// --- シーン設定 ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 6);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5, 10, 5);
light.castShadow = true;
scene.add(light);
scene.add(new THREE.AmbientLight(0x606060));

// --- 物理ワールド (貫通対策版) ---
const world = new CANNON.World();
world.gravity.set(0, -15, 0); // 重力を少し強めてキビキビ動かす
world.solver.iterations = 20; // 計算回数を増やして爆発を防ぐ

// 地面を「厚みのある箱」にする (貫通防止のコツ)
const groundShape = new CANNON.Box(new CANNON.Vec3(20, 1, 20)); 
const groundBody = new CANNON.Body({ mass: 0 });
groundBody.addShape(groundShape);
groundBody.position.set(0, -1, 0); // 表面を0の高さにする
world.addBody(groundBody);

const groundMesh = new THREE.Mesh(
    new THREE.BoxGeometry(40, 2, 40),
    new THREE.MeshStandardMaterial({ color: 0x7cfc00 })
);
groundMesh.position.y = -1;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// --- キャラクター生成 ---
const GROUP_PLAYER = 1;
const GROUP_OTHERS = 2;

const loader = new GLTFLoader();
const parts = {}; // 物理ボディとメッシュを格納

loader.load('Base.glb', (gltf) => {
    const model = gltf.scene;
    scene.add(model);

    // 1. 胴体の作成 (Body)
    const bodyM = model.getObjectByName('Body');
    const bodyB = new CANNON.Body({
        mass: 5,
        position: new CANNON.Vec3(0, 3, 0),
        shape: new CANNON.Box(new CANNON.Vec3(0.5, 0.7, 0.4)),
        collisionFilterGroup: GROUP_PLAYER,
        collisionFilterMask: GROUP_OTHERS,
        angularDamping: 0.95
    });
    world.addBody(bodyB);
    parts['Body'] = { mesh: bodyM, body: bodyB };

    // 2. 他の全パーツをループで接続 (Arm_L, Arm_R, Leg_L, Leg_R)
    const configs = [
        { name: 'Arm_L', pos: [-0.7, 0.5, 0], anchor: [0.6, 0.5, 0], size: [0.15, 0.4, 0.15] },
        { name: 'Arm_R', pos: [0.7, 0.5, 0], anchor: [-0.6, 0.5, 0], size: [0.15, 0.4, 0.15] },
        { name: 'Leg_L', pos: [-0.3, -0.7, 0], anchor: [0.3, -0.6, 0], size: [0.2, 0.3, 0.2] },
        { name: 'Leg_R', pos: [0.3, -0.7, 0], anchor: [-0.3, -0.6, 0], size: [0.2, 0.3, 0.2] }
    ];

    configs.forEach(conf => {
        const mesh = model.getObjectByName(conf.name);
        if (!mesh) return;

        const limbB = new CANNON.Body({
            mass: 1,
            position: new CANNON.Vec3(conf.pos[0], 3 + conf.pos[1], conf.pos[2]),
            shape: new CANNON.Box(new CANNON.Vec3(conf.size[0], conf.size[1], conf.size[2])),
            collisionFilterGroup: GROUP_PLAYER,
            collisionFilterMask: GROUP_OTHERS
        });
        world.addBody(limbB);
        
        // 胴体とパーツをバネのように繋ぐ
        const constraint = new CANNON.PointToPointConstraint(
            bodyB, new CANNON.Vec3(-conf.pos[0], conf.pos[1], 0), 
            limbB, new CANNON.Vec3(0, conf.size[1], 0)
        );
        world.addConstraint(constraint);
        parts[conf.name] = { mesh, body: limbB };
    });
});

// --- 操作系 ---
let joystick = { x: 0, z: 0 };
window.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    joystick.x = (t.clientX / window.innerWidth - 0.5) * 2;
    joystick.z = (t.clientY / window.innerHeight - 0.5) * 2;
}, { passive: false });
window.addEventListener('touchend', () => joystick = { x: 0, z: 0 });

// --- ループ ---
function animate() {
    requestAnimationFrame(animate);
    world.fixedStep();

    Object.values(parts).forEach(p => {
        p.mesh.position.copy(p.body.position);
        p.mesh.quaternion.copy(p.body.quaternion);
    });

    if (parts['Body']) {
        const b = parts['Body'].body;
        // 移動力
        b.velocity.x = joystick.x * 6;
        b.velocity.z = joystick.z * 6;
        
        // 起き上がり魔法 (Quaternionから直接姿勢を補正)
        const uprightTorque = new CANNON.Vec3(
            -b.quaternion.x * 50,
            0,
            -b.quaternion.z * 50
        );
        b.applyTorque(uprightTorque);
    }

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
