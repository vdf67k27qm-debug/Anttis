<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pig Game - Independent Parts Tuning</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; font-family: sans-serif; }
        #ui-layer {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: rgba(0,0,0,0.85);
            color: white; padding: 15px; border-radius: 15px; z-index: 1000;
        }
        .control-row { margin-bottom: 10px; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; color: #00ff88; }
        select { width: 100%; padding: 8px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; font-size: 14px; margin-bottom: 10px; }
        input[type="range"] { width: 100%; height: 25px; margin-bottom: 5px; }
        #joystick-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: none; z-index: 100; border: 2px solid rgba(255,255,255,0.2);
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 40px; height: 40px; background: #00ff88;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="control-row">
        <label style="font-size: 12px;">調整対象を選択</label>
        <select id="partSelect">
            <option value="Arm">腕 (Arm L/R)</option>
            <option value="Hand">手 (Hand L/R)</option>
            <option value="Body">体 (Body)</option>
        </select>
    </div>
    <div class="control-row">
        <div class="label-row"><span>左右 (X)</span><span id="valX">0.35</span></div>
        <input type="range" id="posX" min="-2.0" max="2.0" step="0.01" value="0.35">
        
        <div class="label-row"><span>上下 (Y)</span><span id="valY">0.75</span></div>
        <input type="range" id="posY" min="0" max="2.5" step="0.01" value="0.75">
        
        <div class="label-row"><span>奥行 (Z)</span><span id="valZ">0.78</span></div>
        <input type="range" id="posZ" min="-2.0" max="2.0" step="0.01" value="0.78">
    </div>
</div>

<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x334455);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 10, 5);
    scene.add(sun);
    scene.add(new THREE.GridHelper(100, 50));

    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    const loader = new GLTFLoader();
    const models = { Body: null, Arm_L: null, Arm_R: null, Hand_L: null, Hand_R: null };

    // パーツごとの個別座標データ
    const config = {
        Arm: { x: 0.35, y: 0.75, z: 0.78 },
        Hand: { x: 0.35, y: 0.75, z: 0.78 },
        Body: { x: 0, y: 0, z: 0 }
    };

    async function setupPlayer() {
        const load = (f) => new Promise(r => loader.load(f, g => r(g.scene)));
        models.Body = await load('Pig_Body.glb');
        models.Arm_L = await load('Pig_Arm.glb');
        models.Arm_R = await load('Pig_Arm.glb');
        models.Hand_L = await load('Pig_Hand.glb');
        models.Hand_R = await load('Pig_Hand.glb');

        Object.values(models).forEach(m => playerGroup.add(m));
        applyPositions();
    }
    setupPlayer();

    const partSelect = document.getElementById('partSelect');
    const sliders = { X: document.getElementById('posX'), Y: document.getElementById('posY'), Z: document.getElementById('posZ') };
    const valLabels = { X: document.getElementById('valX'), Y: document.getElementById('valY'), Z: document.getElementById('valZ') };

    // 現在の選択パーツの座標をモデルに反映
    function applyPositions() {
        if (!models.Body) return;
        
        // 腕の反映
        models.Arm_L.position.set(-config.Arm.x, config.Arm.y, config.Arm.z);
        models.Arm_R.position.set(config.Arm.x, config.Arm.y, config.Arm.z);
        
        // 手の反映
        models.Hand_L.position.set(-config.Hand.x, config.Hand.y, config.Hand.z);
        models.Hand_R.position.set(config.Hand.x, config.Hand.y, config.Hand.z);
        
        // 体の反映
        models.Body.position.set(config.Body.x, config.Body.y, config.Body.z);
    }

    // スライダーを動かした時
    function onSliderInput() {
        const p = partSelect.value;
        config[p].x = parseFloat(sliders.X.value);
        config[p].y = parseFloat(sliders.Y.value);
        config[p].z = parseFloat(sliders.Z.value);
        
        valLabels.X.innerText = config[p].x;
        valLabels.Y.innerText = config[p].y;
        valLabels.Z.innerText = config[p].z;
        
        applyPositions();
    }

    // パーツを切り替えた時、スライダーの位置をそのパーツの保存値に戻す
    partSelect.addEventListener('change', () => {
        const p = partSelect.value;
        sliders.X.value = config[p].x;
        sliders.Y.value = config[p].y;
        sliders.Z.value = config[p].z;
        
        valLabels.X.innerText = config[p].x;
        valLabels.Y.innerText = config[p].y;
        valLabels.Z.innerText = config[p].z;
    });

    Object.values(sliders).forEach(s => s.addEventListener('input', onSliderInput));

    // ジョイスティック (進行方向修正済み)
    const wrapper = document.getElementById('joystick-wrapper');
    const stick = document.getElementById('joystick-stick');
    let moveDir = new THREE.Vector2(0, 0);
    let isMoving = false;

    window.addEventListener('touchstart', e => {
        const t = e.touches[0];
        if (t.clientX < window.innerWidth / 2 && t.clientY > 250) {
            isMoving = true;
            wrapper.style.display = 'block';
            wrapper.style.left = `${t.clientX - 50}px`;
            wrapper.style.top = `${t.clientY - 50}px`;
        }
    });

    window.addEventListener('touchmove', e => {
        if (!isMoving) return;
        const t = e.touches[0];
        const rect = wrapper.getBoundingClientRect();
        const dx = t.clientX - (rect.left + 50);
        const dy = t.clientY - (rect.top + 50);
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
        const angle = Math.atan2(dy, dx);
        
        stick.style.left = `${50 + Math.cos(angle) * dist}px`;
        stick.style.top = `${50 + Math.sin(angle) * dist}px`;
        moveDir.set(dx / 40, -(dy / 40));
    });

    window.addEventListener('touchend', () => {
        isMoving = false;
        wrapper.style.display = 'none';
        moveDir.set(0, 0);
    });

    function animate() {
        requestAnimationFrame(animate);
        if (moveDir.length() > 0.1) {
            playerGroup.position.x += moveDir.x * 0.08;
            playerGroup.position.z -= moveDir.y * 0.08;
            const angle = Math.atan2(moveDir.x, moveDir.y);
            playerGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, angle, 0)), 0.2);
        }
        camera.position.lerp(playerGroup.position.clone().add(new THREE.Vector3(0, 7, 7)), 0.1);
        camera.lookAt(playerGroup.position);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
