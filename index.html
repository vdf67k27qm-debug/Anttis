<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2400 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let playerMain, body, head, leftHand, rightHand, sword, platforms;
let jumpCount = 0;
let isAttacking = false;
let attackType = 'slash'; 
let attackDir = { x: 1, y: 0 };
let attackProgress = 0;

// アニメーション制御用フラグ
let wasOnGround = true;
let landingTimer = 0;

// 入力管理用
let joyInput = { x: 0, y: 0 };
let atkJoyInput = { x: 0, y: 0 };
let movePointerId = null;
let atkPointerId = null;

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'rabbit_sword.png');
    this.load.image('tile', 'tile_top.png');
}

function create() {
    const scene = this;
    this.input.addPointer(3);

    const worldWidth = 2000;
    const worldHeight = 800;

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 32; i++) platforms.create(32 + (i * 64), 750, 'tile');
    platforms.create(400, 550, 'tile');
    platforms.create(800, 400, 'tile');
    platforms.create(1200, 550, 'tile');

    playerMain = this.add.container(400, 600);
    
    body = this.add.sprite(0, 8, 'body');
    head = this.add.sprite(0, -24, 'head');
    playerMain.add([body, head]);
    playerMain.setDepth(11);

    this.physics.world.enable(playerMain);
    playerMain.body.setCollideWorldBounds(true);
    playerMain.body.setDragX(3500); 
    playerMain.body.setMaxVelocity(400, 1200);
    
    playerMain.body.setSize(60, 90);
    playerMain.body.setOffset(-30, -45);

    leftHand = this.add.sprite(0, 0, 'hand').setDepth(10);
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 0.9).setDepth(12);
    rightHand = this.add.sprite(0, 0, 'hand').setDepth(13);

    this.physics.add.collider(playerMain, platforms);

    this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.startFollow(playerMain, true, 0.1, 0.1);

    const setupUI = () => {
        const uiY = 510;
        const joyX = 110;
        const atkX = 690;
        const radius = 45;

        this.add.circle(joyX, uiY, radius, 0x000000, 0.1).setScrollFactor(0).setDepth(100);
        const joyStick = this.add.circle(joyX, uiY, 20, 0x000000, 0.2).setScrollFactor(0).setDepth(101);

        this.add.circle(atkX, uiY, radius, 0xff0000, 0.1).setScrollFactor(0).setDepth(100);
        const atkStick = this.add.circle(atkX, uiY, 20, 0xff0000, 0.2).setScrollFactor(0).setDepth(101);

        const btnJ = this.add.circle(atkX - 95, uiY + 10, 35, 0x0000ff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(atkX - 95, uiY + 10, 'JUMP', {fontSize:'12px', color:'#000', fontWeight:'bold'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

        this.input.on('pointerdown', (p) => {
            if (Phaser.Math.Distance.Between(p.x, p.y, atkX - 95, uiY + 10) < 35) return;
            if (Phaser.Math.Distance.Between(p.x, p.y, joyX, uiY) < radius + 20) movePointerId = p.id;
            if (Phaser.Math.Distance.Between(p.x, p.y, atkX, uiY) < radius) atkPointerId = p.id;
        });

        this.input.on('pointermove', (p) => {
            if (p.id === movePointerId) {
                const ang = Phaser.Math.Angle.Between(joyX, uiY, p.x, p.y);
                const d = Math.min(Phaser.Math.Distance.Between(joyX, uiY, p.x, p.y), radius);
                joyStick.setPosition(joyX + Math.cos(ang) * d, uiY + Math.sin(ang) * d);
                joyInput = { x: Math.cos(ang) * (d/radius), y: Math.sin(ang) * (d/radius) };
            }
            if (p.id === atkPointerId) {
                const ang = Phaser.Math.Angle.Between(atkX, uiY, p.x, p.y);
                const d = Math.min(Phaser.Math.Distance.Between(atkX, uiY, p.x, p.y), radius);
                atkStick.setPosition(atkX + Math.cos(ang) * d, uiY + Math.sin(ang) * d);
                atkJoyInput = { x: Math.cos(ang) * (d/radius), y: Math.sin(ang) * (d/radius) };
            }
        });

        this.input.on('pointerup', (p) => {
            if (p.id === movePointerId) {
                joyStick.setPosition(joyX, uiY);
                joyInput = { x: 0, y: 0 };
                movePointerId = null;
            }
            if (p.id === atkPointerId) {
                if (!isAttacking) {
                    const d = Phaser.Math.Distance.Between(atkX, uiY, atkStick.x, atkStick.y);
                    if (d > 20) startAttack(scene, 'slash', {x: atkJoyInput.x, y: atkJoyInput.y});
                    else startAttack(scene, 'stab');
                }
                atkStick.setPosition(atkX, uiY);
                atkJoyInput = { x: 0, y: 0 };
                atkPointerId = null;
            }
        });

        btnJ.on('pointerdown', () => {
            if (playerMain.body.touching.down) {
                jumpCount = 1;
                playerMain.body.setVelocityY(-1000);
            } else if (jumpCount < 2) {
                jumpCount++;
                playerMain.body.setVelocityY(-900);
            }
        });
    };
    setupUI();
    this.cursors = this.input.keyboard.createCursorKeys();
}

function startAttack(scene, type, dir = null) {
    if (isAttacking) return;
    isAttacking = true;
    attackType = type;
    attackProgress = 0;
    
    if (dir && (Math.abs(dir.x) > 0.1 || Math.abs(dir.y) > 0.1)) {
        if (Math.abs(dir.x) > 0.1) playerMain.setScale(dir.x > 0 ? 1 : -1, 1);
        attackDir = dir;
    } else {
        attackDir = { x: playerMain.scaleX, y: 0 };
    }

    scene.tweens.add({
        targets: { val: 0 },
        val: 1,
        duration: type === 'stab' ? 300 : 250,
        onUpdate: (tween) => { attackProgress = tween.getValue(); },
        onComplete: () => { isAttacking = false; }
    });
}

function update() {
    let moveX = (this.cursors.left.isDown ? -1 : (this.cursors.right.isDown ? 1 : joyInput.x));
    
    if (!isAttacking) {
        if (Math.abs(moveX) > 0.2) {
            playerMain.body.setAccelerationX(moveX * 4000);
            playerMain.setScale(moveX < 0 ? -1 : 1, 1);
        } else {
            playerMain.body.setAccelerationX(0);
        }
    } else {
        playerMain.body.setAccelerationX(moveX * 4000);
    }
    
    let time = this.time.now;
    let isMoving = Math.abs(playerMain.body.velocity.x) > 20;
    let isOnGround = playerMain.body.touching.down;
    
    // 着地瞬間の検知
    if (isOnGround && !wasOnGround) {
        landingTimer = 10; // 10フレーム踏ん張る
    }
    wasOnGround = isOnGround;

    let bounceY = 0;
    let headOffset = 0;
    let leanAngle = 0;

    // 前傾姿勢の計算
    if (isMoving) {
        // 進行方向に傾く (最大10度程度)
        leanAngle = (playerMain.body.velocity.x / 400) * 10 * playerMain.scaleX;
    }

    if (!isOnGround) {
        // 空中姿勢
        bounceY = -4;
        // 上昇中は伸び、下降中は少し縮む
        headOffset = playerMain.body.velocity.y < 0 ? -6 : 2;
    } else if (landingTimer > 0) {
        // 着地踏ん張り
        bounceY = 10; // グッと沈み込む
        headOffset = 4;
        landingTimer--;
    } else if (isMoving) {
        // 歩行時
        bounceY = Math.sin(time / 100) * 8;
        headOffset = bounceY;
    } else {
        // 静止時
        let breathe = Math.sin(time / 350);
        bounceY = breathe * 2; 
        headOffset = breathe * 4; 
    }
    
    // スプライトに反映
    body.y = 8 + bounceY;
    head.y = -24 + headOffset;
    
    // 前傾姿勢を適用 (攻撃中は無効化して見栄えを保つ)
    if (!isAttacking) {
        playerMain.setAngle(leanAngle);
    } else {
        playerMain.setAngle(0);
    }

    if (playerMain.body.touching.down) jumpCount = 0;

    let side = playerMain.scaleX;
    let px = playerMain.x, py = playerMain.y;

    // 手の位置
    leftHand.setPosition(px - (40 * side), py + 18 + bounceY);
    leftHand.setScale(side, 1);
    leftHand.setAngle(playerMain.angle);

    if (!isAttacking) {
        rightHand.setPosition(px + (40 * side), py + 18 + bounceY);
        rightHand.setAngle(playerMain.angle);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setAngle(playerMain.angle);
        sword.setScale(side, 1.3);
    } else {
        rightHand.setAngle(0); // 攻撃時はコンテナの角度を無視して制御
        if (attackType === 'stab') {
            let p = (attackProgress * 2) % 1; 
            let thrust = Math.sin(p * Math.PI) * 70;
            rightHand.setPosition(px + ((40 + thrust) * side), py + 18 + bounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle(90 * side);
        } else {
            let p = attackProgress;
            let startAng, endAng;
            
            if (attackDir.y < -0.4) { 
                startAng = -150; endAng = -30;
            } else if (attackDir.y > 0.4) { 
                startAng = 20; endAng = 160;
            } else { 
                startAng = -60; endAng = 60;
            }
            
            let currentAng = startAng + (p * (endAng - startAng));
            let radius = 65;
            let sweepX = Math.cos(Phaser.Math.DegToRad(currentAng)) * radius;
            let sweepY = Math.sin(Phaser.Math.DegToRad(currentAng)) * radius;
            
            rightHand.setPosition(px + (sweepX * side), py + sweepY + 18 + bounceY);
            sword.setPosition(rightHand.x, rightHand.y);
            sword.setAngle((currentAng + 90) * side);
        }
        sword.setScale(side, 1.6);
    }
}
</script>
</body>
</html>
