<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snail Model Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #2F2F2F; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2F2F2F);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        const loader = new THREE.GLTFLoader();

        // 正確なファイル名で読み込み
        const files = ['Snail.glb', 'Shell.glb'];

        files.forEach(file => {
            loader.load(file, (gltf) => {
                scene.add(gltf.scene);
                console.log('Success:', file);
                
                // モデルがどこにいても中央に持ってくる調整
                const box = new THREE.Box3().setFromObject(gltf.scene);
                const center = box.getCenter(new THREE.Vector3());
                gltf.scene.position.sub(center); 
            }, undefined, (err) => {
                console.error('Error loading ' + file + ':', err);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            // モデルが読み込まれたらゆっくり回転させて生存確認しやすくする
            scene.children.forEach(child => {
                if(child.type === "Group") child.rotation.y += 0.01;
            });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
