<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Combat Slash</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2200 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, leftHand, rightHand, sword, platforms;
let isLeft = false, isRight = false;
let jumpCount = 0;
let isAttacking = false;

function preload() {
    this.load.image('body', 'character_roundRed.png');
    this.load.image('hand', 'character_handRed.png');
    this.load.image('tile', 'tile_top.png');
    this.load.image('sword', 'item_sword.png');
}

function create() {
    this.input.addPointer(3); // マルチタッチを有効化

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 13; i++) {
        platforms.create(32 + (i * 64), 568, 'tile');
    }
    platforms.create(200, 350, 'tile');
    platforms.create(600, 350, 'tile');

    player = this.physics.add.sprite(400, 400, 'body');
    player.setCollideWorldBounds(true);
    player.setDragX(3000); 
    player.setMaxVelocity(350, 1000); 

    leftHand = this.add.sprite(0, 0, 'hand');
    rightHand = this.add.sprite(0, 0, 'hand');
    // 支点を剣の根元にする (重要)
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 0.8);

    this.physics.add.collider(player, platforms);

    const uiY = 520;
    const createBtn = (x, y, radius, color, label, size) => {
        const btn = this.add.circle(x, y, radius, color, 0.2).setInteractive();
        this.add.text(x, y, label, {fontSize: size, color:'#000', fontWeight:'bold'}).setOrigin(0.5);
        return btn;
    };

    const btnL = createBtn(80, uiY, 45, 0x000000, '←', '30px');
    const btnR = createBtn(180, uiY, 45, 0x000000, '→', '30px');
    const btnJ = createBtn(620, uiY, 50, 0x0000ff, 'JUMP', '18px');
    const btnA = createBtn(730, uiY, 50, 0xff0000, 'ATK', '18px');

    btnL.on('pointerdown', () => isLeft = true);
    btnL.on('pointerup', () => isLeft = false);
    btnL.on('pointerout', () => isLeft = false);
    btnR.on('pointerdown', () => isRight = true);
    btnR.on('pointerup', () => isRight = false);
    btnR.on('pointerout', () => isRight = false);
    
    btnJ.on('pointerdown', () => {
        if (player.body.touching.down) {
            jumpCount = 1;
            player.setVelocityY(-900);
        } else if (jumpCount < 2) {
            jumpCount++;
            player.setVelocityY(-800);
        }
    });

    btnA.on('pointerdown', () => attack(this));

    this.cursors = this.input.keyboard.createCursorKeys();
}

function attack(scene) {
    if (isAttacking) return;
    isAttacking = true;

    const direction = player.flipX ? -1 : 1;
    
    // アニメーション用のタイムラインを作成
    const timeline = scene.tweens.createTimeline();

    // 1. 斜め上へ構える (タメ)
    timeline.add({
        targets: [sword, rightHand],
        angle: direction * -45, // 斜め上
        y: '+=20', // 少し沈み込む
        x: '-=' + (direction * 15), // 少し引く
        duration: 100,
        ease: 'Power1'
    });

    // 2. 斜め下へ大きく振り下ろす (攻撃)
    timeline.add({
        targets: [sword, rightHand],
        angle: direction * 135, // 斜め下まで約180度
        y: '+=10', // さらに沈み込む
        x: '+= ' + (direction * 60), // 前方へ大きく振る
        duration: 150,
        ease: 'Circ.easeOut'
    });

    // 3. 元に戻す (硬直)
    timeline.add({
        targets: [sword, rightHand, player],
        angle: 0,
        y: player.y, // プレイヤーの位置を元に戻す
        x: '+=0', // 手を戻す (update関数で処理されるため、ここは0でOK)
        duration: 150,
        ease: 'Power1',
        onComplete: () => {
            isAttacking = false;
        }
    });

    timeline.play();
}

function update() {
    let accel = 3500;
    if (isLeft || this.cursors.left.isDown) {
        player.setAccelerationX(-accel);
        player.setFlipX(true);
    } else if (isRight || this.cursors.right.isDown) {
        player.setAccelerationX(accel);
        player.setFlipX(false);
    } else {
        player.setAccelerationX(0);
    }

    if (player.body.touching.down) {
        jumpCount = 0;
    }

    let walkCycle = Math.sin(this.time.now / 80) * 5;
    let isMoving = Math.abs(player.body.velocity.x) > 20;
    
    // 攻撃中でない時だけ上下揺れ
    let currentY = player.y;
    if (!isAttacking && isMoving && player.body.touching.down) {
        currentY += walkCycle;
    }
    
    let side = player.flipX ? 1 : -1;
    leftHand.setPosition(player.x + (32 * side), currentY + 12);
    
    // 攻撃中でない時だけ右手を追従させる
    if (!isAttacking) {
        rightHand.setPosition(player.x - (32 * side), currentY + 12);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setFlipX(player.flipX);
        sword.angle = 0;
    } else {
        // 攻撃中は剣のXY座標を常に右手に合わせる (Tweensで角度等は制御)
        sword.setPosition(rightHand.x, rightHand.y);
    }
    
    if (isMoving && player.body.touching.down) {
        player.angle = player.body.velocity.x / 15;
    } else {
        player.angle = 0;
    }
}
</script>
</body>
</html>
