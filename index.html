<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Rabbit Knight Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2400 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let playerContainer, body, head, leftHand, rightHand, sword, platforms;
let jumpCount = 0;
let isAttacking = false;
let attackProgress = 0;
let joyInput = { x: 0, y: 0, active: false };

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'sword.png');
    this.load.image('tile', 'tile_top.png');
}

function create() {
    this.input.addPointer(3);

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 13; i++) {
        platforms.create(32 + (i * 64), 568, 'tile');
    }
    platforms.create(200, 350, 'tile');
    platforms.create(600, 350, 'tile');

    // --- コンテナの作成 ---
    playerContainer = this.add.container(400, 400);

    // パーツをコンテナ内の相対座標で作成（追加順が重なり順）
    leftHand = this.add.sprite(-40, 10, 'hand').setFlipX(true);
    sword = this.add.sprite(40, 10, 'sword').setOrigin(0.5, 0.9);
    body = this.add.sprite(0, 0, 'body');
    head = this.add.sprite(0, -32, 'head'); // 胴体の上に固定
    rightHand = this.add.sprite(40, 10, 'hand');

    playerContainer.add([leftHand, sword, body, head, rightHand]);

    // コンテナに物理演算を適用
    this.physics.world.enable(playerContainer);
    playerContainer.body.setCollideWorldBounds(true);
    playerContainer.body.setDragX(3500); 
    playerContainer.body.setMaxVelocity(400, 1200);
    playerContainer.body.setSize(60, 80);
    playerContainer.body.setOffset(-30, -40);

    this.physics.add.collider(playerContainer, platforms, null, (p, tile) => {
        if (joyInput.y > 0.5 && tile.y > p.y) return false;
        return true;
    });

    const uiY = 480;
    const joyBase = this.add.circle(120, uiY, 60, 0x000000, 0.1).setDepth(100);
    const joyStick = this.add.circle(120, uiY, 30, 0x000000, 0.2).setDepth(101);

    this.input.on('pointermove', (pointer) => {
        if (pointer.x < 400 && pointer.isDown) {
            const dist = Phaser.Math.Distance.Between(joyBase.x, joyBase.y, pointer.x, pointer.y);
            const angle = Phaser.Math.Angle.Between(joyBase.x, joyBase.y, pointer.x, pointer.y);
            const limitedDist = Math.min(dist, 60);
            joyStick.x = joyBase.x + Math.cos(angle) * limitedDist;
            joyStick.y = joyBase.y + Math.sin(angle) * limitedDist;
            joyInput.x = Math.cos(angle) * (limitedDist / 60);
            joyInput.y = Math.sin(angle) * (limitedDist / 60);
        }
    });

    this.input.on('pointerup', () => {
        joyStick.setPosition(joyBase.x, joyBase.y);
        joyInput = { x: 0, y: 0, active: false };
    });

    const btnJ = this.add.circle(620, uiY - 40, 55, 0x0000ff, 0.2).setInteractive().setDepth(100);
    this.add.text(620, uiY - 40, 'JUMP', {fontSize:'20px', color:'#000'}).setOrigin(0.5).setDepth(101);

    const btnA = this.add.circle(710, uiY + 40, 55, 0xff0000, 0.3).setInteractive().setDepth(100);
    this.add.text(710, uiY + 40, 'ATK', {fontSize:'20px', color:'#000'}).setOrigin(0.5).setDepth(101);

    btnJ.on('pointerdown', () => {
        if (playerContainer.body.touching.down) { jumpCount = 1; playerContainer.body.setVelocityY(-950); }
        else if (jumpCount < 2) { jumpCount++; playerContainer.body.setVelocityY(-850); }
    });

    btnA.on('pointerdown', () => { if (!isAttacking) startAttack(this); });

    this.cursors = this.input.keyboard.createCursorKeys();
}

function startAttack(scene) {
    isAttacking = true;
    attackProgress = 0;
    scene.tweens.add({
        targets: { val: 0 },
        val: 1,
        duration: 250,
        ease: 'Cubic.easeOut',
        onUpdate: (tween) => { attackProgress = tween.getValue(); },
        onComplete: () => { isAttacking = false; attackProgress = 0; }
    });
}

function update() {
    let moveX = (this.cursors.left.isDown ? -1 : (this.cursors.right.isDown ? 1 : joyInput.x));
    
    if (Math.abs(moveX) > 0.2) {
        playerContainer.body.setAccelerationX(moveX * 4000);
        // コンテナごとは反転させる
        playerContainer.setScale(moveX < 0 ? -1 : 1, 1);
    } else {
        playerContainer.body.setAccelerationX(0);
    }
    
    if (playerContainer.body.touching.down) jumpCount = 0;

    let time = this.time.now;
    let isMoving = Math.abs(playerContainer.body.velocity.x) > 20;
    
    // 呼吸・歩行の揺れ
    let bounceY = isMoving ? Math.sin(time / 100) * 8 : Math.sin(time / 400) * 2;
    
    // コンテナ内の各パーツの位置調整
    body.y = bounceY;
    head.y = -32 + bounceY; // 頭は常に胴体の上
    leftHand.y = 10 + bounceY;

    // 攻撃モーションの計算
    if (!isAttacking) {
        rightHand.setPosition(40, 10 + bounceY);
        sword.setPosition(40, 10 + bounceY);
        sword.setAngle(0);
    } else {
        let swingAngle, offsetX, offsetY;
        if (attackProgress < 0.2) {
            let p = attackProgress / 0.2;
            swingAngle = p * -60; 
            offsetX = 40 - (p * 15);
            offsetY = 10 - (p * 20);
        } else {
            let p = (attackProgress - 0.2) / 0.8;
            swingAngle = -60 + (p * 180); 
            offsetX = 25 + (p * 60);
            offsetY = -10 + (p * 40);
        }
        rightHand.setPosition(offsetX, offsetY + bounceY);
        sword.setPosition(offsetX, offsetY + bounceY);
        sword.setAngle(swingAngle);
    }

    // 体全体の傾き
    playerContainer.setAngle(isMoving ? playerContainer.body.velocity.x / 20 : 0);
}
</script>
</body>
</html>
