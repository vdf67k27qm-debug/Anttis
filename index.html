<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anttis - 右腕位置調整</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        #ui { 
            position: absolute; top: 10px; left: 10px; color: white; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px;
            font-family: sans-serif; width: 250px;
        }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
        .val { color: #00ffcc; float: right; font-family: monospace; }
    </style>
</head>
<body>
    <div id="ui">
        <b>右腕（Arm_R）の位置調整</b><br><br>
        
        <div class="control-group">
            <label>Scale (一括サイズ): <span class="val" id="v_scale">1.00</span></label>
            <input type="range" id="scaleAll" min="0.01" max="1.0" step="0.01" value="0.1">
        </div>

        <div class="control-group">
            <label>右腕 X (左右): <span class="val" id="v_armRX">0.00</span></label>
            <input type="range" id="armRX" min="-20" max="20" step="0.1" value="-5.0">
        </div>

        <div class="control-group">
            <label>右腕 Y (高さ): <span class="val" id="v_armRY">0.00</span></label>
            <input type="range" id="armRY" min="-20" max="20" step="0.1" value="4.0">
        </div>

        <div class="control-group">
            <label>右腕 Z (前後): <span class="val" id="v_armRZ">0.00</span></label>
            <input type="range" id="armRZ" min="-10" max="10" step="0.1" value="0.0">
        </div>

        <p style="font-size: 11px; color: #aaa;">
            ※右腕が胴体にピッタリつく数値をメモしてください。
        </p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 10, 15);

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(5, 10, 7);
        scene.add(light, new THREE.AmbientLight(0x404040, 2));
        scene.add(new THREE.GridHelper(20, 20));

        const bodyGroup = new THREE.Group();
        scene.add(bodyGroup);

        const loader = new GLTFLoader();
        let parts = {};

        function loadPart(name) {
            loader.load(`./${name}.glb`, (gltf) => {
                parts[name] = gltf.scene;
                bodyGroup.add(parts[name]);
                update();
            });
        }

        ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'].forEach(loadPart);

        function update() {
            const s = parseFloat(document.getElementById('scaleAll').value);
            const rx = parseFloat(document.getElementById('armRX').value);
            const ry = parseFloat(document.getElementById('armRY').value);
            const rz = parseFloat(document.getElementById('armRZ').value);

            // UIの数値表示更新
            document.getElementById('v_scale').innerText = s.toFixed(2);
            document.getElementById('v_armRX').innerText = rx.toFixed(1);
            document.getElementById('v_armRY').innerText = ry.toFixed(1);
            document.getElementById('v_armRZ').innerText = rz.toFixed(1);

            Object.keys(parts).forEach(name => {
                const p = parts[name];
                p.scale.set(s, s, s);

                // 右腕だけスライダーの値で動かす
                if(name === 'Arm_R') {
                    p.position.set(rx, ry, rz);
                } else if (name === 'Body') {
                    p.position.set(0, 0, 0);
                } else {
                    // 他のパーツは一旦非表示にするか、端に寄せておくと調整しやすいです
                    // p.visible = false; 
                }
            });
        }

        document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
