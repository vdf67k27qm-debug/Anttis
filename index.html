<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Touch Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: {
        mode: Phaser.Scale.FIT, // 画面サイズに合わせて自動調整
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1600 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, leftHand, rightHand, platforms;
let isLeft = false;
let isRight = false;
let isJump = false;

function preload() {
    this.load.image('body', 'character_roundRed.png');
    this.load.image('hand', 'character_handRed.png');
    this.load.image('ground', 'item_shield.png');
}

function create() {
    // 【足場】
    platforms = this.physics.add.staticGroup();
    platforms.create(400, 580, 'ground').setScale(10, 1).refreshBody();
    platforms.create(200, 400, 'ground').setScale(3, 0.5).refreshBody();
    platforms.create(600, 400, 'ground').setScale(3, 0.5).refreshBody();

    // 【プレイヤー】
    player = this.physics.add.sprite(400, 400, 'body');
    player.setCollideWorldBounds(true);
    player.setDragX(1200);

    leftHand = this.add.sprite(0, 0, 'hand');
    rightHand = this.add.sprite(0, 0, 'hand');

    this.physics.add.collider(player, platforms);

    // 【画面内コントローラーの実装】
    const uiY = 500; // ボタンの高さ
    
    // 左移動ボタン
    const btnLeft = this.add.circle(100, uiY, 50, 0x000000, 0.2).setInteractive();
    this.add.text(85, uiY - 15, '←', { fontSize: '32px', color: '#000' });

    // 右移動ボタン
    const btnRight = this.add.circle(220, uiY, 50, 0x000000, 0.2).setInteractive();
    this.add.text(205, uiY - 15, '→', { fontSize: '32px', color: '#000' });

    // ジャンプボタン
    const btnJump = this.add.circle(700, uiY, 60, 0xff0000, 0.3).setInteractive();
    this.add.text(660, uiY - 15, 'JUMP', { fontSize: '24px', color: '#000', fontWeight: 'bold' });

    // タッチイベントの登録
    btnLeft.on('pointerdown', () => { isLeft = true; });
    btnLeft.on('pointerup', () => { isLeft = false; });
    btnLeft.on('pointerout', () => { isLeft = false; });

    btnRight.on('pointerdown', () => { isRight = true; });
    btnRight.on('pointerup', () => { isRight = false; });
    btnRight.on('pointerout', () => { isRight = false; });

    btnJump.on('pointerdown', () => { isJump = true; });
    btnJump.on('pointerup', () => { isJump = false; });

    // キーボード操作も一応残しておく
    this.cursors = this.input.keyboard.createCursorKeys();
}

function update() {
    // 左右移動（タッチまたはキーボード）
    if (isLeft || this.cursors.left.isDown) {
        player.setAccelerationX(-1800);
        player.setFlipX(true);
    } else if (isRight || this.cursors.right.isDown) {
        player.setAccelerationX(1800);
        player.setFlipX(false);
    } else {
        player.setAccelerationX(0);
    }

    // ジャンプ
    if ((isJump || this.cursors.up.isDown) && player.body.touching.down) {
        player.setVelocityY(-900);
        isJump = false; // 押しっぱなし防止
    }

    // 手の追従処理
    let offsetX = 35;
    let offsetY = 10;
    if (player.flipX) {
        leftHand.x = player.x + offsetX;
        rightHand.x = player.x - offsetX;
        leftHand.flipX = true;
        rightHand.flipX = true;
    } else {
        leftHand.x = player.x - offsetX;
        rightHand.x = player.x + offsetX;
        leftHand.flipX = false;
        rightHand.flipX = false;
    }
    
    let bobbing = Math.sin(this.time.now / 200) * 3;
    leftHand.y = player.y + offsetY + bobbing;
    rightHand.y = player.y + offsetY - bobbing;
}
</script>
</body>
</html>
