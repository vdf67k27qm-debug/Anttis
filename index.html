<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penguin Quest - Fix Vol.3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.3);
            border-radius: 50%; touch-action: none; border: 3px solid white; z-index: 10;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: white; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="joystick-container"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x90ee90 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        let dummy, mixer, walkAction, penguin;
        let moveDir = { x: 0, z: 0 };
        const gltfLoader = new GLTFLoader();
        const fbxLoader = new FBXLoader();
        const textureLoader = new THREE.TextureLoader();

        const penguinTex = textureLoader.load('colormap 2.png');
        penguinTex.colorSpace = THREE.SRGBColorSpace;
        penguinTex.flipY = false;

        // ペンギン読み込み
        gltfLoader.load('animal-penguin.glb', (gltf) => {
            penguin = gltf.scene;
            penguin.traverse(child => {
                if (child.isMesh) {
                    child.material.map = penguinTex;
                }
            });

            // 骨組みFBX読み込み
            fbxLoader.load('Walking.fbx', (object) => {
                dummy = object;
                dummy.scale.set(0.01, 0.01, 0.01);
                dummy.visible = false; 
                scene.add(dummy);

                mixer = new THREE.AnimationMixer(dummy);
                if (dummy.animations.length > 0) {
                    walkAction = mixer.clipAction(dummy.animations[0]);
                    walkAction.play();
                    walkAction.setEffectiveWeight(0);
                }

                // --- 合体ロジックの強化 ---
                // パーツ名が Body でも body でも見つけられるようにする
                const findAndAttach = (regex, boneName) => {
                    const bone = dummy.getObjectByName(boneName);
                    if (!bone) return;
                    penguin.traverse(child => {
                        if (child.isMesh && regex.test(child.name)) {
                            child.position.set(0, 0, 0);
                            bone.add(child);
                        }
                    });
                };

                // 正規表現で名前を曖昧に検索して接着
                findAndAttach(/body/i, 'mixamorig_Spine');
                findAndAttach(/head/i, 'mixamorig_Head');
                findAndAttach(/leg.*l/i, 'mixamorig_LeftLeg');
                findAndAttach(/leg.*r/i, 'mixamorig_RightLeg');
                findAndAttach(/wing.*l/i, 'mixamorig_LeftArm');
                findAndAttach(/wing.*r/i, 'mixamorig_RightArm');

                scene.add(penguin);
            });
        });

        // ジョイスティック
        const stick = document.getElementById('joystick-stick');
        const container = document.getElementById('joystick-container');
        let isTouching = false;

        container.addEventListener('touchstart', (e) => { isTouching = true; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', () => {
            isTouching = false;
            moveDir = { x: 0, z: 0 };
            stick.style.transform = `translate(0, 0)`;
            if (walkAction) walkAction.setEffectiveWeight(0);
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            const rect = container.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveDir.x = Math.cos(angle) * (dist/40);
            moveDir.z = Math.sin(angle) * (dist/40);
            if (walkAction) walkAction.setEffectiveWeight(1);
        }, { passive: false });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (dummy && (moveDir.x !== 0 || moveDir.z !== 0)) {
                // ペンギンの移動速度
                dummy.position.x += moveDir.x * 0.05;
                dummy.position.z += moveDir.z * 0.05;
                dummy.rotation.y = Math.atan2(-moveDir.x, -moveDir.z) + Math.PI;
            }

            if (dummy) {
                // カメラがペンギンの後ろを追従
                const targetPos = new THREE.Vector3(dummy.position.x, 3, dummy.position.z + 5);
                camera.position.lerp(targetPos, 0.1);
                camera.lookAt(dummy.position.x, 1, dummy.position.z);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
