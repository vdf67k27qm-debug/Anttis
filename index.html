<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Pig Game - Brawl Style</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; }
        /* ジョイスティックの見た目 */
        #joystick-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: none; z-index: 100;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px; background: white;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<div id="joystick-wrapper"><div id="joystick-stick"></div></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // シーン・カメラ・レンダラー
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x334455); // 少し明るい外の世界風

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 光源
    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // 地面
    const grid = new THREE.GridHelper(100, 50, 0x000000, 0x888888);
    scene.add(grid);

    // キャラクターのグループ化
    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    const loader = new GLTFLoader();
    const parts = {};

    // 画像から取得した座標
    const POS = { x: 0.35, y: 0.75, z: 0.78 };

    async function loadParts() {
        const load = (file) => new Promise(res => loader.load(file, g => res(g.scene)));
        
        const body = await load('Pig_Body.glb');
        const armL = await load('Pig_Arm.glb');
        const armR = await load('Pig_Arm.glb');
        const handL = await load('Pig_Hand.glb');
        const handR = await load('Pig_Hand.glb');

        // 位置の適用（画像に基づいた調整）
        armL.position.set(-POS.x, POS.y, POS.z);
        armR.position.set(POS.x, POS.y, POS.z);
        handL.position.set(-POS.x, POS.y, POS.z);
        handR.position.set(POS.x, POS.y, POS.z);

        playerGroup.add(body, armL, armR, handL, handR);
    }
    loadParts();

    // ジョイスティック制御
    const wrapper = document.getElementById('joystick-wrapper');
    const stick = document.getElementById('joystick-stick');
    let moveDir = new THREE.Vector2(0, 0);
    let isMoving = false;

    window.addEventListener('touchstart', e => {
        const touch = e.touches[0];
        if (touch.clientX < window.innerWidth / 2) { // 画面左側なら表示
            isMoving = true;
            wrapper.style.display = 'block';
            wrapper.style.left = `${touch.clientX - 60}px`;
            wrapper.style.top = `${touch.clientY - 60}px`;
        }
    });

    window.addEventListener('touchmove', e => {
        if (!isMoving) return;
        const touch = e.touches[0];
        const rect = wrapper.getBoundingClientRect();
        const centerX = rect.left + 60;
        const centerY = rect.top + 60;

        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxDist = 50;

        if (dist > maxDist) {
            dx *= maxDist / dist;
            dy *= maxDist / dist;
        }

        stick.style.left = `${50 + (dx/60)*100}%`;
        stick.style.top = `${50 + (dy/60)*100}%`;
        
        moveDir.set(dx / maxDist, -(dy / maxDist));
    });

    window.addEventListener('touchend', () => {
        isMoving = false;
        wrapper.style.display = 'none';
        moveDir.set(0, 0);
    });

    // アニメーションループ
    const playerSpeed = 0.1;
    const targetRotation = new THREE.Quaternion();
    
    function animate() {
        requestAnimationFrame(animate);

        if (moveDir.length() > 0.1) {
            // 移動
            playerGroup.position.x += moveDir.x * playerSpeed;
            playerGroup.position.z -= moveDir.y * playerSpeed;

            // 回転（進行方向を向く）
            const angle = Math.atan2(moveDir.x, moveDir.y);
            const targetRotation = new THREE.Euler(0, angle, 0);
            playerGroup.quaternion.slerp(new THREE.Quaternion().setFromEuler(targetRotation), 0.2);
        }

        // ブロスタ風カメラ（斜め上から追従）
        const camOffset = new THREE.Vector3(0, 8, 8); 
        camera.position.lerp(playerGroup.position.clone().add(camOffset), 0.1);
        camera.lookAt(playerGroup.position);

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
