<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Project</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; }
        .joy-base { position: absolute; bottom: 50px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
        .joy-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #FFD700; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="joy" class="joy-base"><div class="joy-knob" id="knob"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, snailGroup, motionGroup;
        let moveDir = { x: 0, z: 0 };
        const loader = new THREE.GLTFLoader();

        // 成功の鍵：Promiseで読み込みを完全に同期させる
        const loadModel = (url) => new Promise(res => loader.load(url, g => res(g.scene), undefined, () => res(null)));

        async function start() {
            // シーン準備
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 5);
            scene.add(sun);
            scene.add(new THREE.GridHelper(20, 20));

            // モデル読み込み
            const [body, shell] = await Promise.all([
                loadModel('Snail.glb'),
                loadModel('Shell.glb')
            ]);

            // カタツムリ組み立て
            snailGroup = new THREE.Group();
            motionGroup = new THREE.Group(); 
            snailGroup.add(motionGroup);

            if(body) motionGroup.add(body);
            if(shell) motionGroup.add(shell);
            
            scene.add(snailGroup);

            setupJoy();
            loop();
        }

        function setupJoy() {
            const btn = document.getElementById('joy');
            const knb = document.getElementById('knob');
            const move = (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const r = btn.getBoundingClientRect();
                const dx = t.clientX - (r.left + 60);
                const dz = t.clientY - (r.top + 60);
                const d = Math.min(Math.sqrt(dx*dx+dz*dz), 40);
                const a = Math.atan2(dz, dx);
                knb.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                moveDir = { x: Math.cos(a) * (d/40), z: Math.sin(a) * (d/40) };
            };
            btn.addEventListener('touchstart', move);
            btn.addEventListener('touchmove', move);
            btn.addEventListener('touchend', () => {
                knb.style.transform = 'translate(0,0)';
                moveDir = { x: 0, z: 0 };
            });
        }

        let clock = new THREE.Clock();
        function loop() {
            requestAnimationFrame(loop);
            const t = clock.getElapsedTime();

            if (moveDir.x !== 0 || moveDir.z !== 0) {
                snailGroup.position.x += moveDir.x * 0.15;
                snailGroup.position.z += moveDir.z * 0.15;
                snailGroup.rotation.y = Math.atan2(-moveDir.x, -moveDir.z);

                // ドキュメント準拠の「自然な揺れ」
                motionGroup.rotation.x = Math.sin(t * 10) * 0.1;
                motionGroup.position.y = Math.abs(Math.sin(t * 10)) * 0.1;
            }

            camera.position.lerp(new THREE.Vector3(snailGroup.position.x, 5, snailGroup.position.z + 8), 0.1);
            camera.lookAt(snailGroup.position);
            renderer.render(scene, camera);
        }

        start();
    </script>
</body>
</html>
