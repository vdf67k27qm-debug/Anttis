<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Load Check</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; padding: 20px; }
        #log { white-space: pre-wrap; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="log">【ログ開始】</div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const logElement = document.getElementById('log');
        function logger(msg) {
            logElement.innerText += "\n" + msg;
            console.log(msg);
        }

        try {
            logger("1. Three.js 起動...");
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 2));
            camera.position.z = 3;

            logger("2. Base.glb 読み込み開始...");
            const loader = new GLTFLoader();

            loader.load('./Base.glb', 
                (gltf) => {
                    logger("✅ 成功！モデルを表示します。");
                    scene.add(gltf.scene);
                },
                (xhr) => {
                    const p = (xhr.loaded / xhr.total * 100);
                    if(p > 0) logger(`...通信中: ${Math.round(p)}%`);
                },
                (err) => {
                    logger("❌ エラー発生！原因: " + err.message);
                }
            );

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();

        } catch (e) {
            logger("⚠️ 致命的エラー: " + e.message);
        }
    </script>
</body>
</html>
