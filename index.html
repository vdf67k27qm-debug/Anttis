<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pig Physics - Ground Zero</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">物理演算テスト: 重力で落下し、地面で止まります。</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- シーン基本設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222233);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // --- 地面 ---
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20), 
        new THREE.MeshPhongMaterial({ color: 0x444444 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    scene.add(new THREE.GridHelper(20, 20));

    // --- キャラクター構造 (PlayerRoot) ---
    const player = new THREE.Group();
    player.position.y = 10; // 空中に配置
    scene.add(player);

    // モデルパーツ用のコンテナ（ここに読み込んだGLBを入れる）
    const bodyContainer = new THREE.Group();
    const armLContainer = new THREE.Group();
    const armRContainer = new THREE.Group();
    player.add(bodyContainer, armLContainer, armRContainer);

    // --- 物理パラメータ ---
    let velocityY = 0;      // 垂直方向の速度
    const gravity = -0.01;  // 重力加速度
    const bounce = 0.3;     // 跳ね返り係数（0なら跳ねない）
    const bodyRadius = 0.6; // キャラクターの半径（当たり判定）

    // --- モデル読み込み ---
    const loader = new GLTFLoader();
    async function loadModels() {
        const load = (url) => new Promise(res => loader.load(url, g => res(g.scene)));
        
        const body = await load('Pig_Body.glb');
        const armL = await load('Pig_Arm.glb');
        const armR = await load('Pig_Arm.glb');

        if(body) bodyContainer.add(body);
        
        // 腕の位置を一旦「体の横」にリセット
        if(armL) {
            armL.position.set(-0.6, 0, 0); 
            armLContainer.add(armL);
        }
        if(armR) {
            armR.position.set(0.6, 0, 0);
            armRContainer.add(armR);
        }
    }
    loadModels();

    // カメラ位置
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 2, 0);

    // --- ループ処理 ---
    function animate() {
        requestAnimationFrame(animate);

        // 1. 重力を適用
        velocityY += gravity;
        player.position.y += velocityY;

        // 2. 接地判定（当たり判定）
        // 地面の高さは 0。足元（中心からbodyRadius分下）が 0 以下になったら衝突
        if (player.position.y - bodyRadius <= 0) {
            player.position.y = bodyRadius; // 位置を地面の上に固定
            
            // 速度を反転させて少し跳ねさせる（または 0 にして止める）
            if (Math.abs(velocityY) > 0.05) {
                velocityY *= -bounce; 
            } else {
                velocityY = 0;
            }
        }

        renderer.render(scene, camera);
    }

    animate();

    // リサイズ対応
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
