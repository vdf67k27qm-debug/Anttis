<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail Project - Final Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; touch-action: none; font-family: monospace; }
        /* デバッグログ：iPadの画面上でエラーを直接確認できる */
        #debug-log { position: absolute; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 10px; font-size: 12px; pointer-events: none; z-index: 1000; }
        .joy-base { position: absolute; bottom: 50px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid #fff; }
        .joy-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #FFD700; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="debug-log">SYSTEM BOOTING...</div>
    <div id="move-joy" class="joy-base"><div class="joy-knob"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const logUI = document.getElementById('debug-log');
        const log = (m) => { logUI.innerHTML += `<br>> ${m}`; console.log(m); };

        // 1. 設定（ドキュメントの構成を再現）
        const config = {
            game: { speed: 0.1, rotation: 0.15 },
            model: { scale: 5.0 }, // あなたのモデルは小さいので、5倍に拡大して表示
            files: ['Snail.glb', 'Shell.glb'] // 1文字目大文字。GitHub上のファイル名と合わせてください
        };

        let scene, camera, renderer, playerGroup, motionGroup;
        let moveInput = { x: 0, z: 0 };

        async function init() {
            log("Initializing Three.js...");
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10); // モデルが小さいので少し近づける

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // ライト（明るくする）
            const ambient = new THREE.AmbientLight(0xffffff, 1.0);
            const directional = new THREE.DirectionalLight(0xffffff, 1.5);
            directional.position.set(5, 10, 5);
            scene.add(ambient, directional, new THREE.GridHelper(20, 20, 0x444444));

            // グループ作成
            playerGroup = new THREE.Group();
            motionGroup = new THREE.Group();
            playerGroup.add(motionGroup);
            scene.add(playerGroup);

            // 2. モデル読み込み（ドキュメント流のPromise管理）
            const loader = new THREE.GLTFLoader();
            log("Loading Snail and Shell...");

            const loadPromises = config.files.map(file => {
                return new Promise((resolve) => {
                    loader.load(file, 
                        (gltf) => {
                            log(`SUCCESS: ${file}`);
                            const model = gltf.scene;
                            model.scale.setScalar(config.model.scale);
                            motionGroup.add(model);
                            resolve(true);
                        },
                        undefined,
                        (err) => {
                            log(`FAILED: ${file} (404?)`);
                            // 失敗したら赤いダミーを表示（プログラムが動いている証明）
                            const dummy = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshBasicMaterial({color: 0xff0000}));
                            motionGroup.add(dummy);
                            resolve(false);
                        }
                    );
                });
            });

            await Promise.all(loadPromises);
            setupJoystick();
            animate();
            log("System Ready. Move Joystick!");
        }

        // 3. ジョイスティック（自然な動きの元）
        function setupJoystick() {
            const joy = document.getElementById('move-joy');
            const knob = joy.querySelector('.joy-knob');
            const handle = (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + 60);
                const dy = t.clientY - (r.top + 60);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                const a = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                moveInput = { x: Math.cos(a) * (d/40), z: Math.sin(a) * (d/40) };
            };
            joy.addEventListener('touchstart', handle);
            joy.addEventListener('touchmove', handle);
            joy.addEventListener('touchend', () => {
                knob.style.transform = 'translate(0,0)';
                moveInput = { x: 0, z: 0 };
            });
        }

        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getElapsedTime();

            if (moveInput.x !== 0 || moveInput.z !== 0) {
                // 移動
                playerGroup.position.x += moveInput.x * config.game.speed;
                playerGroup.position.z += moveInput.z * config.game.speed;
                
                // 回転
                const targetAngle = Math.atan2(-moveInput.x, -moveInput.z);
                playerGroup.rotation.y = THREE.MathUtils.lerp(playerGroup.rotation.y, targetAngle, config.game.rotation);

                // モーション（ドキュメントを参考に揺れを追加）
                motionGroup.rotation.x = Math.sin(dt * 10) * 0.1;
                motionGroup.position.y = Math.abs(Math.sin(dt * 10)) * 0.15;
            } else {
                // 待機中
                motionGroup.position.y = Math.sin(dt * 2) * 0.05;
            }

            // カメラ追従
            camera.position.lerp(new THREE.Vector3(playerGroup.position.x, 5, playerGroup.position.z + 10), 0.1);
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
