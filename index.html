<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Purge Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 移動ジョイスティック */
        .joystick-base {
            position: absolute; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.1); border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; opacity: 0.6; pointer-events: auto;
        }
        .joystick-knob {
            position: absolute; top: 35px; left: 35px; width: 60px; height: 60px;
            background: radial-gradient(circle, #fff, #ccc); border-radius: 50%;
        }
        #move-joy { bottom: 50px; left: 40px; }
        
        /* アクションボタン共通 */
        .action-btn {
            position: absolute; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; border: 2px solid #fff; border-radius: 50%;
            text-align: center;
        }

        /* ダッシュボタン（右上） */
        #dash-btn {
            bottom: 180px; right: 40px; width: 90px; height: 90px;
            background: rgba(255, 100, 100, 0.4);
        }

        /* 捨てるボタン（右下） */
        #drop-btn {
            bottom: 50px; right: 40px; width: 110px; height: 110px;
            background: rgba(100, 200, 255, 0.4);
            font-size: 14px;
        }
        
        .cd-svg { width: 90px; height: 90px; transform: rotate(-90deg); position: absolute; pointer-events: none; }
        .cd-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .cd-bar { fill: none; stroke: #fff; stroke-width: 6; stroke-dasharray: 264; stroke-dashoffset: 264; }
        
        .side-btn {
            position: absolute; left: 20px; width: 60px; height: 45px;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff;
            border-radius: 5px; pointer-events: auto; font-size: 10px;
        }
        #camera-btn { top: 20px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <!-- 左：移動 -->
        <div id="move-joy" class="joystick-base"><div id="move-knob" class="joystick-knob"></div></div>
        
        <!-- 右上：ダッシュ -->
        <div id="dash-btn" class="action-btn">
            <svg class="cd-svg"><circle class="cd-bg" cx="45" cy="45" r="42"/><circle id="cd-gauge" class="cd-bar" cx="45" cy="45" r="42"/></svg>
            <span id="dash-label">DASH</span>
        </div>

        <!-- 右下：捨てる -->
        <div id="drop-btn" class="action-btn">DROP<br>ITEM</div>

        <button id="camera-btn" class="side-btn">視点切替</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const config = {
            models: {
                body: { file: 'Snail.glb', pos: [0, 0, 0] },
                shell: { file: 'Shell.glb', pos: [0, 0.25, -0.25] },
                dashShell: { file: 'Shell_dash.glb', scale: 1.2, pivotPos: [0, 0.65, 0], modelOffset: [0, -0.3, 0], rotateSpeed: 15.0 }
            },
            items: {
                club: { file: 'Club.glb', scale: 0.7, mass: 1.8, pivotOffset: [0, 1.2, -0.3], groundRot: [Math.PI/2, Math.PI/2, 0] },
                corn: { file: 'Corn.glb', scale: 1.0, mass: 1.0, pivotOffset: [0, 1.2, -0.3], groundRot: [0, 0, 0], equipRot: [Math.PI/2, 0, 0] }
            },
            game: {
                dashDuration: 0.4, dashCooldown: 3.0, dashSpeed: 18.0,
                pickupTime: 0.8, gravity: 35.0, purgeForce: 12.0
            }
        };

        const state = {
            isLoaded: false, camMode: 1,
            isDashing: false, dashTimer: 0, dashCooldownTimer: 0, dashRot: 0,
            moveInput: { x: 0, z: 0 },
            equippedKey: null, pickupTimer: 0, nearbyItemKey: null
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(15, 30, 15); dirLight.castShadow = true;
        scene.add(dirLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(100, 50, 0x444444, 0x444444));

        const snailPlayer = new THREE.Group();
        scene.add(snailPlayer);
        const dashPivot = new THREE.Group();
        snailPlayer.add(dashPivot);

        const pickupGauge = new THREE.Mesh(
            new THREE.RingGeometry(0.8, 1.0, 32, 1, 0, 0),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
        );
        pickupGauge.rotation.x = -Math.PI/2;
        scene.add(pickupGauge);

        const loadedModels = {};
        const itemModels = {};
        const manager = new THREE.LoadingManager();
        manager.onLoad = () => { state.isLoaded = true; };
        const gltfLoader = new GLTFLoader(manager);

        Object.entries(config.models).forEach(([key, info]) => {
            gltfLoader.load(info.file, (gltf) => {
                const model = gltf.scene;
                model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                if (info.scale) model.scale.setScalar(info.scale);
                loadedModels[key] = model;
                if (key === 'body' || key === 'shell') {
                    snailPlayer.add(model);
                    model.position.set(...(info.pos || [0,0,0]));
                }
                if (key === 'dashShell') {
                    dashPivot.add(model);
                    model.position.set(...info.modelOffset);
                    dashPivot.position.set(...info.pivotPos);
                }
            });
        });

        Object.entries(config.items).forEach(([key, info]) => {
            gltfLoader.load(info.file, (gltf) => {
                const model = gltf.scene;
                model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                model.scale.setScalar(info.scale);
                const guide = new THREE.Mesh(
                    new THREE.RingGeometry(0.8, 1.0, 32),
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
                );
                guide.rotation.x = -Math.PI/2;
                scene.add(guide);
                itemModels[key] = { mesh: model, guide: guide, state: 'ground', vel: new THREE.Vector3(), rotVel: 0 };
                model.position.set(key === 'club' ? 5 : -5, 0.3, 5);
                model.rotation.set(...info.groundRot);
                scene.add(model);
            });
        });

        const dustParticles = [];

        // ジョイスティック設定
        const moveJoy = document.getElementById('move-joy'), moveKnob = document.getElementById('move-knob');
        let moveActive = false, moveTid = null;
        moveJoy.addEventListener('touchstart', (e) => { moveActive = true; moveTid = e.changedTouches[0].identifier; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => {
            const t = Array.from(e.touches).find(v => v.identifier === moveTid);
            if (!moveActive || !t) return;
            const r = moveJoy.getBoundingClientRect(), dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50), ang = Math.atan2(dy, dx);
            moveKnob.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
            state.moveInput = { x: Math.cos(ang)*(d/50), z: Math.sin(ang)*(d/50) };
        }, {passive: false});
        window.addEventListener('touchend', (e) => { if (Array.from(e.changedTouches).some(v => v.identifier === moveTid)) { moveActive = false; moveKnob.style.transform = "translate(0,0)"; state.moveInput = {x:0,z:0}; }});

        // 捨てる物理アクション
        function dropItem() {
            if (!state.equippedKey) return;
            const key = state.equippedKey, item = itemModels[key], itemConf = config.items[key];
            item.state = 'dropped';
            const worldPos = new THREE.Vector3();
            item.mesh.getWorldPosition(worldPos);
            scene.attach(item.mesh);
            item.mesh.position.copy(worldPos);

            // キャラクターが向いている方向に投げる
            const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(snailPlayer.quaternion);
            const force = config.game.purgeForce / itemConf.mass; 
            item.vel.copy(forward).multiplyScalar(force).add(new THREE.Vector3(0, 6, 0));
            item.rotVel = 8.0;
            state.equippedKey = null;
        }

        // ダッシュボタン（現在向いている方向に突進）
        document.getElementById('dash-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (state.dashCooldownTimer <= 0 && !state.isDashing) {
                state.isDashing = true;
                state.dashTimer = config.game.dashDuration;
                state.dashCooldownTimer = config.game.dashCooldown;
                // 向いている方向をダッシュ方向に固定
                const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(snailPlayer.quaternion);
                state.dashDir = { x: forward.x, z: forward.z };
            }
        });

        document.getElementById('drop-btn').addEventListener('touchstart', (e) => { e.preventDefault(); dropItem(); });
        document.getElementById('camera-btn').addEventListener('click', () => { state.camMode = (state.camMode + 1) % 3; });

        const clock = new THREE.Clock(), camOffsets = [{h:7, d:6}, {h:12, d:10}, {h:22, d:18}];

        function animate() {
            requestAnimationFrame(animate);
            if (!state.isLoaded) return;
            const dt = clock.getDelta(), elapsed = clock.getElapsedTime(), isMoving = Math.abs(state.moveInput.x) > 0.1 || Math.abs(state.moveInput.z) > 0.1;

            // クールダウンUI
            const gauge = document.getElementById('cd-gauge');
            if (state.dashCooldownTimer > 0) {
                state.dashCooldownTimer -= dt;
                gauge.style.strokeDashoffset = (state.dashCooldownTimer / config.game.dashCooldown) * 264;
                document.getElementById('dash-label').innerText = state.dashCooldownTimer.toFixed(1);
            } else { gauge.style.strokeDashoffset = 264; document.getElementById('dash-label').innerText = "DASH"; }

            if (state.dashTimer > 0) {
                state.dashTimer -= dt;
                if (state.dashTimer <= 0) { state.isDashing = false; dashPivot.rotation.set(0,0,0); }
            }

            // 移動計算
            let currentSpeed = state.isDashing ? config.game.dashSpeed : 6.0;
            let moveX = state.isDashing ? state.dashDir.x : state.moveInput.x;
            let moveZ = state.isDashing ? state.dashDir.z : state.moveInput.z;
            
            snailPlayer.position.x += moveX * currentSpeed * dt;
            snailPlayer.position.z += moveZ * currentSpeed * dt;

            // 回転（ダッシュ中以外は入力方向に、ダッシュ中は固定）
            if (isMoving && !state.isDashing) {
                const targetRot = Math.atan2(moveX, moveZ);
                let diff = (targetRot - snailPlayer.rotation.y + Math.PI) % (Math.PI * 2) - Math.PI;
                snailPlayer.rotation.y += diff * 0.15;
            }

            // 表示切り替え
            loadedModels.body.visible = !state.isDashing;
            loadedModels.shell.visible = !state.isDashing;
            dashPivot.visible = state.isDashing;
            pickupGauge.visible = false;

            if (state.isDashing) {
                state.dashRot += dt * config.models.dashShell.rotateSpeed;
                dashPivot.rotation.x = state.dashRot;
                if (Math.random() > 0.2) createDust(0.2);
            } else {
                const animSpeed = isMoving ? 12 : 1.5;
                const bodyWave = Math.sin(elapsed * animSpeed);
                const shellWave = Math.sin(elapsed * animSpeed - 0.8);
                loadedModels.body.scale.y = 1 + bodyWave * (isMoving ? 0.12 : 0.03);
                loadedModels.shell.position.y = 0.25 + shellWave * 0.04;

                // 装備中アイテム
                if (state.equippedKey) {
                    const item = itemModels[state.equippedKey], itemConf = config.items[state.equippedKey];
                    item.mesh.position.set(itemConf.pivotOffset[0], itemConf.pivotOffset[1] + loadedModels.shell.position.y, itemConf.pivotOffset[2]);
                    item.mesh.rotation.set(0, 0, 0);
                    if (itemConf.equipRot) item.mesh.rotation.set(...itemConf.equipRot);
                }

                // 地面・落下アイテムの物理
                state.nearbyItemKey = null;
                Object.entries(itemModels).forEach(([key, item]) => {
                    if (item.state === 'ground') {
                        item.guide.visible = true; item.guide.position.set(item.mesh.position.x, 0.05, item.mesh.position.z);
                        if (snailPlayer.position.distanceTo(item.mesh.position) < 1.5) state.nearbyItemKey = key;
                    } else if (item.state === 'dropped') {
                        item.guide.visible = false;
                        item.vel.y -= config.game.gravity * dt;
                        item.mesh.position.add(item.vel.clone().multiplyScalar(dt));
                        item.mesh.rotateX(item.rotVel * dt);
                        if (item.mesh.position.y < 0.3) {
                            item.mesh.position.y = 0.3; item.vel.set(0,0,0);
                            item.state = 'ground';
                            item.mesh.rotation.set(...config.items[key].groundRot);
                        }
                    } else { item.guide.visible = false; }
                });

                // アイテム回収（持っている場合は自動で捨てる）
                if (state.nearbyItemKey) {
                    state.pickupTimer += dt; pickupGauge.visible = true;
                    const itemPos = itemModels[state.nearbyItemKey].mesh.position;
                    pickupGauge.position.set(itemPos.x, 0.06, itemPos.z);
                    const progress = Math.min(state.pickupTimer / config.game.pickupTime, 1);
                    pickupGauge.geometry.dispose(); 
                    pickupGauge.geometry = new THREE.RingGeometry(0.8, 1.0, 32, 1, 0, progress * Math.PI * 2);
                    if (progress >= 1) {
                        if (state.equippedKey) dropItem(); // 既に持っていれば捨てる
                        state.equippedKey = state.nearbyItemKey;
                        itemModels[state.equippedKey].state = 'equipped';
                        snailPlayer.add(itemModels[state.equippedKey].mesh);
                        state.pickupTimer = 0;
                    }
                } else state.pickupTimer = 0;
            }

            dustParticles.forEach((p, i) => {
                p.life -= dt * 2.2; p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); dustParticles.splice(i, 1); }
            });
            const cfg = camOffsets[state.camMode];
            camera.position.lerp(new THREE.Vector3(snailPlayer.position.x, cfg.h, snailPlayer.position.z + cfg.d), 0.1);
            camera.lookAt(snailPlayer.position); renderer.render(scene, camera);
        }

        function createDust(size) {
            const dust = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), new THREE.MeshBasicMaterial({color: 0x888888, transparent: true, opacity: 0.4}));
            dust.position.copy(snailPlayer.position).add(new THREE.Vector3((Math.random()-0.5)*0.5, 0.05, (Math.random()-0.5)*0.5));
            scene.add(dust); dustParticles.push({mesh: dust, life: 1.0});
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
