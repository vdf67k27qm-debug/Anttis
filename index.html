<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Inertia & Dual Stick</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .joystick-base {
            position: absolute; width: 110px; height: 110px;
            background: rgba(255, 255, 255, 0.1); border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; opacity: 0.7; pointer-events: auto;
        }
        .joystick-knob {
            position: absolute; top: 30px; left: 30px; width: 50px; height: 50px;
            background: radial-gradient(circle, #fff, #ccc); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #move-joy { bottom: 40px; left: 30px; }
        /* ダッシュ専用（上） */
        #dash-joy { bottom: 160px; right: 30px; border-color: rgba(255, 100, 100, 0.4); }
        /* 攻撃専用（下） */
        #attack-joy { bottom: 40px; right: 30px; border-color: rgba(100, 200, 255, 0.4); }
        
        .cd-svg { width: 50px; height: 50px; transform: rotate(-90deg); position: absolute; }
        .cd-bar { fill: none; stroke: #ff4444; stroke-width: 6; stroke-dasharray: 140; stroke-dashoffset: 0; }

        .side-btn {
            position: absolute; left: 20px; width: 60px; height: 40px;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff;
            border-radius: 5px; pointer-events: auto; font-size: 10px;
        }
        #camera-btn { top: 20px; }
        #weapon-btn { top: 70px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="move-joy" class="joystick-base"><div id="move-knob" class="joystick-knob"></div></div>
        <div id="dash-joy" class="joystick-base">
            <div id="dash-knob" class="joystick-knob">
                <svg class="cd-svg"><circle id="cd-gauge" class="cd-bar" cx="25" cy="25" r="22"/></svg>
                <span id="dash-label" style="font-size:9px; font-weight:bold; z-index:11;">DASH</span>
            </div>
        </div>
        <div id="attack-joy" class="joystick-base"><div id="attack-knob" class="joystick-knob"><span style="font-size:9px; font-weight:bold;">ATTACK</span></div></div>
        
        <button id="camera-btn" class="side-btn">視点切替</button>
        <button id="weapon-btn" class="side-btn">武器切替</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const config = {
            models: {
                body: { file: 'Snail.glb', pos: [0, 0, 0] },
                shell: { file: 'Shell.glb', pos: [0, 0.25, -0.25] },
                shellEquip: { file: 'Shell equip.glb', pos: [0, 0.25, -0.25] },
                gun: { file: 'Gun.glb', pos: [0, 1.2, -0.3], scale: 0.7 },
                dashShell: { file: 'Shell_dash.glb', scale: 1.2, pivotPos: [0, 0.65, 0], modelOffset: [0, -0.3, 0], rotateAxis: 'x', rotateSpeed: 20.0 }
            },
            game: {
                fireRate: 8.0,
                bulletRange: 20.0,
                bulletSpeed: 50.0,
                dashCooldown: 6.0,
                dashSpeed: 18.0,
                dashDuration: 0.4
            }
        };

        const state = {
            isLoaded: false, currentWeapon: 'normal', camMode: 1,
            isAimingDash: false, isAimingAttack: false,
            isDashing: false, dashTimer: 0, dashCooldownTimer: 0, dashRot: 0,
            lastFireTime: 0, dashDir: { x: 0, z: 0 },
            moveInput: { x: 0, z: 0 }, dashInput: { x: 0, z: 0 }, attackInput: { x: 0, z: 0 },
            // 慣性アニメーション用
            currentTilt: { x: 0, z: 0 },
            targetTilt: { x: 0, z: 0 },
            partOffsets: { shell: new THREE.Vector3(), gun: new THREE.Vector3() }
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(15, 30, 15);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(100, 50, 0x444444, 0x444444));

        const snailPlayer = new THREE.Group();
        scene.add(snailPlayer);
        const dashPivot = new THREE.Group();
        snailPlayer.add(dashPivot);

        const loadedModels = {};
        const loader = new GLTFLoader();

        async function loadModels() {
            for (const [key, info] of Object.entries(config.models)) {
                const gltf = await loader.loadAsync(info.file);
                const model = gltf.scene;
                model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                if (info.scale) model.scale.setScalar(info.scale);
                loadedModels[key] = model;
                if (key !== 'dashShell') {
                    snailPlayer.add(model);
                    model.position.set(...(info.pos || [0,0,0]));
                }
            }
            if (loadedModels.dashShell) {
                dashPivot.add(loadedModels.dashShell);
                loadedModels.dashShell.position.set(...config.models.dashShell.modelOffset);
                dashPivot.position.set(...config.models.dashShell.pivotPos);
            }
            state.isLoaded = true;
        }
        loadModels();

        const bullets = [], dustParticles = [];
        // エイム線（共通）
        const createAimLine = (color) => {
            const line = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.3, 1, 8).rotateX(Math.PI/2).translate(0, 0, 0.5),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.2 })
            );
            line.visible = false;
            scene.add(line);
            return line;
        };
        const shootAimLine = createAimLine(0xffffff);
        const dashAimLine = createAimLine(0xffffff);

        function setupJoy(id, knobId, onMove, onEnd) {
            const joy = document.getElementById(id), knob = document.getElementById(knobId);
            let active = false, tid = null;
            joy.addEventListener('touchstart', (e) => { active = true; tid = e.changedTouches[0].identifier; e.preventDefault(); }, {passive: false});
            window.addEventListener('touchmove', (e) => {
                const t = Array.from(e.touches).find(v => v.identifier === tid);
                if (!active || !t) return;
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + r.width/2), dy = t.clientY - (r.top + r.height/2);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40), ang = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
                onMove(Math.cos(ang)*(d/40), Math.sin(ang)*(d/40), d);
            }, {passive: false});
            window.addEventListener('touchend', (e) => {
                if (Array.from(e.changedTouches).some(v => v.identifier === tid)) {
                    active = false; knob.style.transform = "translate(0,0)"; onEnd();
                }
            });
        }

        setupJoy('move-joy', 'move-knob', (x, z) => { state.moveInput = {x, z}; }, () => { state.moveInput = {x:0,z:0}; });
        setupJoy('dash-joy', 'dash-knob', (x, z, d) => { 
            state.dashInput = {x, z}; state.isAimingDash = d > 10; 
        }, () => { 
            if (state.isAimingDash && state.dashCooldownTimer <= 0 && !state.isDashing) {
                state.isDashing = true; state.dashTimer = config.game.dashDuration;
                state.dashCooldownTimer = config.game.dashCooldown; state.dashDir = { ...state.dashInput };
            }
            state.isAimingDash = false; 
        });
        setupJoy('attack-joy', 'attack-knob', (x, z, d) => { 
            state.attackInput = {x, z}; state.isAimingAttack = d > 10; 
        }, () => { state.isAimingAttack = false; });

        document.getElementById('weapon-btn').addEventListener('click', () => { state.currentWeapon = (state.currentWeapon === "normal" ? "gun" : "normal"); });
        document.getElementById('camera-btn').addEventListener('click', () => { state.camMode = (state.camMode + 1) % 3; });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (!state.isLoaded) return;
            const dt = clock.getDelta(), elapsed = clock.getElapsedTime();

            // CDゲージ
            const progress = state.dashCooldownTimer / config.game.dashCooldown;
            document.getElementById('cd-gauge').style.strokeDashoffset = Math.max(0, progress * 140);
            state.dashCooldownTimer = Math.max(0, state.dashCooldownTimer - dt);

            if (state.dashTimer > 0) {
                state.dashTimer -= dt;
                if (state.dashTimer <= 0) state.isDashing = false;
            }

            // 移動と慣性の計算
            const isMoving = Math.abs(state.moveInput.x) > 0.1 || Math.abs(state.moveInput.z) > 0.1;
            let moveSpeed = state.isDashing ? config.game.dashSpeed : 6.5;
            let currentDir = state.isDashing ? state.dashDir : state.moveInput;

            if (isMoving || state.isDashing) {
                snailPlayer.position.x += currentDir.x * moveSpeed * dt;
                snailPlayer.position.z += currentDir.z * moveSpeed * dt;
                snailPlayer.rotation.y = THREE.MathUtils.lerp(snailPlayer.rotation.y, Math.atan2(currentDir.x, currentDir.z), 0.15);
                // 進行方向への傾き
                state.targetTilt.x = moveSpeed * 0.02;
            } else {
                state.targetTilt.x = 0;
            }
            state.currentTilt.x = THREE.MathUtils.lerp(state.currentTilt.x, state.targetTilt.x, 0.1);

            // モデル表示と「慣性追従」アニメーション
            Object.values(loadedModels).forEach(m => m.visible = false);
            dashPivot.visible = false; shootAimLine.visible = false; dashAimLine.visible = false;

            if (state.isDashing) {
                dashPivot.visible = true;
                state.dashRot += dt * config.models.dashShell.rotateSpeed;
                dashPivot.rotation.x = state.dashRot;
                if (Math.random() > 0.3) createDust(0.3);
            } else {
                loadedModels.body.visible = true;
                const wave = Math.sin(elapsed * (isMoving ? 14 : 2));
                const shellWave = Math.sin(elapsed * (isMoving ? 14 : 2) - 0.5) * 0.06; // 胴体より少し遅れる波

                // 胴体の基本変形
                loadedModels.body.scale.y = 1 + wave * (isMoving ? 0.15 : 0.03);
                loadedModels.body.rotation.x = state.currentTilt.x;

                const activeShell = state.currentWeapon === 'normal' ? loadedModels.shell : loadedModels.shellEquip;
                activeShell.visible = true;
                
                // 慣性による遅延追従
                activeShell.position.y = 0.25 + shellWave;
                activeShell.position.z = -0.25 - (state.currentTilt.x * 0.5); // 動くと後ろにズレる
                activeShell.rotation.x = state.currentTilt.x * 0.8;

                if (state.currentWeapon === 'gun') {
                    loadedModels.gun.visible = true;
                    loadedModels.gun.position.y = 1.2 + shellWave * 1.2;
                    loadedModels.gun.position.z = -0.3 - (state.currentTilt.x * 0.8);
                    loadedModels.gun.rotation.x = state.currentTilt.x * 0.5;

                    if (state.isAimingAttack) {
                        loadedModels.gun.rotation.y = Math.atan2(state.attackInput.x, state.attackInput.z) - snailPlayer.rotation.y;
                        shootAimLine.visible = true;
                        shootAimLine.position.set(snailPlayer.position.x, 0.1, snailPlayer.position.z);
                        shootAimLine.rotation.y = Math.atan2(state.attackInput.x, state.attackInput.z);
                        shootAimLine.scale.y = config.game.bulletRange;
                        if (elapsed - state.lastFireTime > (1.0 / config.game.fireRate)) { fireBullet(); state.lastFireTime = elapsed; }
                    }
                }

                if (state.isAimingDash && state.dashCooldownTimer <= 0) {
                    dashAimLine.visible = true;
                    dashAimLine.position.set(snailPlayer.position.x, 0.1, snailPlayer.position.z);
                    dashAimLine.rotation.y = Math.atan2(state.dashInput.x, state.dashInput.z);
                    dashAimLine.scale.y = config.game.dashSpeed * config.game.dashDuration;
                }
            }

            updateEffects(dt);
            const cfg = camOffsets[state.camMode];
            camera.position.lerp(new THREE.Vector3(snailPlayer.position.x, cfg.h, snailPlayer.position.z + cfg.d), 0.1);
            camera.lookAt(snailPlayer.position);
            renderer.render(scene, camera);
        }

        function updateEffects(dt) {
            bullets.forEach((b, i) => {
                b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                b.life -= dt;
                if (b.life < 0.2) b.mesh.material.opacity = b.life / 0.2;
                if (b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
            });
            dustParticles.forEach((p, i) => {
                p.life -= dt * 2; p.mesh.scale.setScalar(p.life);
                if (p.life <= 0) { scene.remove(p.mesh); dustParticles.splice(i, 1); }
            });
        }

        function createDust(size) {
            const dust = new THREE.Mesh(new THREE.SphereGeometry(size, 8), new THREE.MeshBasicMaterial({color: 0x888888, transparent: true, opacity: 0.4}));
            dust.position.copy(snailPlayer.position).add(new THREE.Vector3((Math.random()-0.5), 0.1, (Math.random()-0.5)));
            scene.add(dust); dustParticles.push({mesh: dust, life: 1.0});
        }

        function fireBullet() {
            const gunWorldPos = new THREE.Vector3();
            loadedModels.gun.getWorldPosition(gunWorldPos);
            const dir = new THREE.Vector3(state.attackInput.x, 0, state.attackInput.z).normalize();
            const bMesh = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xffff00, blending: THREE.AdditiveBlending }));
            bMesh.scale.setScalar(0.6); bMesh.position.copy(gunWorldPos);
            scene.add(bMesh);
            bullets.push({ mesh: bMesh, vel: dir.multiplyScalar(config.game.bulletSpeed), life: 0.5 });
        }

        const camOffsets = [{h:7, d:6}, {h:12, d:10}, {h:22, d:18}];
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
