<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Display Test</title>
    <style>
        body { margin: 0; background-color: #222; color: white; }
        canvas { display: block; }
        #debug { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="debug">状態: 準備中...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const debug = document.getElementById('debug');
        
        // --- 1. シーン作成 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2));

        // --- 2. モデル読み込み ---
        const loader = new THREE.GLTFLoader();
        
        debug.innerText = "状態: Base.glb を読み込み中...";

        loader.load('Base.glb', 
            (gltf) => {
                scene.add(gltf.scene);
                debug.innerText = "状態: 読み込み成功！表示中";
                console.log("Success", gltf);
            },
            (xhr) => {
                const percent = (xhr.loaded / xhr.total * 100);
                if(percent > 0) debug.innerText = "状態: ダウンロード中 " + Math.round(percent) + "%";
            },
            (error) => {
                debug.style.color = "red";
                debug.innerText = "状態: エラー発生！\n" + error.message + "\n\n※ファイル名が大文字の 'Base.glb' か、index.htmlと同じ場所にあるか確認してください。";
            }
        );

        // --- 3. ループ ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
