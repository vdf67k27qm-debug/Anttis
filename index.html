<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Parts Adjuster for Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white;
            padding: 20px; border-radius: 15px; width: 90%; max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #00ff88; font-weight: bold; }
        select { width: 100%; padding: 10px; border-radius: 5px; background: #333; color: white; border: 1px solid #555; font-size: 16px; }
        input[type="range"] { width: 100%; height: 30px; margin: 5px 0; }
        .pos-label { display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #0088ff; color: white; font-weight: bold; cursor: pointer; }
        button:active { background: #0055aa; }
    </style>
</head>
<body>

<div id="ui">
    <div class="control-group">
        <label>操作対象のパーツ</label>
        <select id="partSelect">
            <option value="Body">Body (体)</option>
            <option value="Hand_L">Hand L (左手)</option>
            <option value="Hand_R">Hand R (右手)</option>
        </select>
    </div>
    
    <div class="control-group">
        <div class="pos-label"><span>左右 (X)</span><span id="valX">0</span></div>
        <input type="range" id="posX" min="-2" max="2" step="0.01" value="0">
        
        <div class="pos-label"><span>上下 (Y)</span><span id="valY">0</span></div>
        <input type="range" id="posY" min="-2" max="2" step="0.01" value="0">
        
        <div class="pos-label"><span>奥行 (Z)</span><span id="valZ">0</span></div>
        <input type="range" id="posZ" min="-2" max="2" step="0.01" value="0">
    </div>

    <div class="btn-group">
        <button id="cloneBtn">左手を右手にコピー</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio); // スマホの高解像度対応
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);
    
    const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
    scene.add(grid);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; // 操作に滑らかさを追加

    // モデル保持用オブジェクト
    const models = { Body: null, Hand_L: null, Hand_R: null };

    // ダミーの形状作成
    function createPart(name, color, size = [1, 1, 1]) {
        const geo = new THREE.BoxGeometry(...size);
        const mat = new THREE.MeshStandardMaterial({ color: color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name = name;
        models[name] = mesh;
        scene.add(mesh);
    }

    // 初期配置
    createPart('Body', 0x00ff88, [1, 2, 0.5]);
    createPart('Hand_L', 0xff4400, [0.3, 0.3, 0.3]);
    createPart('Hand_R', 0xff4400, [0.3, 0.3, 0.3]);
    
    models.Hand_L.position.set(-1, 1, 0);
    models.Hand_R.position.set(1, 1, 0);

    // UI要素の取得
    const partSelect = document.getElementById('partSelect');
    const sliders = { X: document.getElementById('posX'), Y: document.getElementById('posY'), Z: document.getElementById('posZ') };
    const labels = { X: document.getElementById('valX'), Y: document.getElementById('valY'), Z: document.getElementById('valZ') };

    function updatePosition() {
        const target = models[partSelect.value];
        if (target) {
            target.position.x = parseFloat(sliders.X.value);
            target.position.y = parseFloat(sliders.Y.value);
            target.position.z = parseFloat(sliders.Z.value);
            
            labels.X.innerText = sliders.X.value;
            labels.Y.innerText = sliders.Y.value;
            labels.Z.innerText = sliders.Z.value;
        }
    }

    // 「左手を右手にコピー」機能
    document.getElementById('cloneBtn').addEventListener('click', () => {
        if (models.Hand_L && models.Hand_R) {
            // X軸だけ反転させ、YとZは同じ位置にする
            models.Hand_R.position.x = -models.Hand_L.position.x;
            models.Hand_R.position.y = models.Hand_L.position.y;
            models.Hand_R.position.z = models.Hand_L.position.z;
            alert("左手の位置を右手に反転コピーしました");
        }
    });

    Object.values(sliders).forEach(s => s.addEventListener('input', updatePosition));
    
    // アニメーション
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
