<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penguin Quest - Final System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.3);
            border-radius: 50%; touch-action: none; border: 3px solid white; z-index: 10;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: white; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="joystick-container"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x90ee90 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        let dummy, mixer, walkAction;
        let penguinParts = {}; // ペンギンの各パーツを格納
        let boneMap = {};      // ダミー人間の骨を格納
        let moveDir = { x: 0, z: 0 };
        const clock = new THREE.Clock();

        const gltfLoader = new GLTFLoader();
        const fbxLoader = new FBXLoader();
        const texLoader = new THREE.TextureLoader();

        // 1. テクスチャ
        const tex = texLoader.load('colormap 2.png');
        tex.colorSpace = THREE.SRGBColorSpace;
        tex.flipY = false;

        // 2. ペンギン読み込み
        gltfLoader.load('animal-penguin.glb', (gltf) => {
            const penguinGroup = gltf.scene;
            scene.add(penguinGroup);

            // 全パーツをスキャンして保存
            penguinGroup.traverse(child => {
                if (child.isMesh) {
                    child.material.map = tex;
                    const name = child.name.toLowerCase();
                    if (name.includes('body')) penguinParts.body = child;
                    if (name.includes('head')) penguinParts.head = child;
                    if (name.includes('leg') && name.includes('l')) penguinParts.legL = child;
                    if (name.includes('leg') && name.includes('r')) penguinParts.legR = child;
                    if (name.includes('wing') && name.includes('l')) penguinParts.wingL = child;
                    if (name.includes('wing') && name.includes('r')) penguinParts.wingR = child;
                }
            });

            // 3. 骨組み（FBX）読み込み
            fbxLoader.load('Walking.fbx', (fbx) => {
                dummy = fbx;
                dummy.scale.set(0.01, 0.01, 0.01);
                dummy.visible = false;
                scene.add(dummy);

                // 骨を探してマップ化
                dummy.traverse(child => {
                    if (child.isBone) {
                        const n = child.name;
                        if (n.includes('Spine')) boneMap.body = child;
                        if (n.includes('Head')) boneMap.head = child;
                        if (n.includes('LeftLeg')) boneMap.legL = child;
                        if (n.includes('RightLeg')) boneMap.legR = child;
                        if (n.includes('LeftArm')) boneMap.wingL = child;
                        if (n.includes('RightArm')) boneMap.wingR = child;
                    }
                });

                mixer = new THREE.AnimationMixer(dummy);
                if (fbx.animations.length > 0) {
                    walkAction = mixer.clipAction(fbx.animations[0]);
                    walkAction.play();
                    walkAction.setEffectiveWeight(0);
                }
            });
        });

        // ジョイスティック
        const stick = document.getElementById('joystick-stick');
        const container = document.getElementById('joystick-container');
        let touching = false;

        container.addEventListener('touchstart', (e) => { touching = true; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', () => {
            touching = false;
            moveDir = { x: 0, z: 0 };
            stick.style.transform = `translate(0, 0)`;
            if (walkAction) walkAction.setEffectiveWeight(0);
        });

        window.addEventListener('touchmove', (e) => {
            if (!touching) return;
            const rect = container.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveDir.x = Math.cos(angle) * (dist/40);
            moveDir.z = Math.sin(angle) * (dist/40);
            if (walkAction) walkAction.setEffectiveWeight(1);
        }, { passive: false });

        const tempV = new THREE.Vector3();
        const tempQ = new THREE.Quaternion();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (dummy && (moveDir.x !== 0 || moveDir.z !== 0)) {
                dummy.position.x += moveDir.x * 0.08;
                dummy.position.z += moveDir.z * 0.08;
                dummy.rotation.y = Math.atan2(-moveDir.x, -moveDir.z) + Math.PI;
            }

            // 【重要】ペンギンの各パーツを骨の位置に同期させる
            for (let key in penguinParts) {
                if (boneMap[key] && penguinParts[key]) {
                    // 骨の世界座標と回転を取得してパーツにコピー
                    boneMap[key].getWorldPosition(tempV);
                    boneMap[key].getWorldQuaternion(tempQ);
                    penguinParts[key].position.copy(tempV);
                    penguinParts[key].quaternion.copy(tempQ);
                }
            }

            if (dummy) {
                const targetCam = new THREE.Vector3(dummy.position.x, 4, dummy.position.z + 6);
                camera.position.lerp(targetCam, 0.1);
                camera.lookAt(dummy.position.x, 1, dummy.position.z);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
