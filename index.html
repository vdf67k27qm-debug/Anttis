<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Fixed Motion</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; font-family: monospace; pointer-events: none; }
        #joystick-base { 
            position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 10;
        }
        #joystick-stick { 
            position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; 
            background: rgba(255,255,255,0.4); border-radius: 50%; 
        }
    </style>
</head>
<body>
    <div id="ui">Loading Assets...</div>
    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // --- 確定した黄金の数値 ---
        const S = 0.5;
        const POS = {
            Arm_R: { x: -0.25, y: -0.15 },
            Arm_L: { x: 0.25,  y: -0.15 },
            Leg_R: { x: -0.12, y: -0.2 },
            Leg_L: { x: 0.12,  y: -0.2 }
        };

        const loader = new GLTFLoader();
        const pivots = {};
        const models = {};
        const fileNames = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];
        let loadedCount = 0;

        fileNames.forEach(name => {
            loader.load(`./${name}.glb`, (gltf) => {
                const model = gltf.scene;
                model.scale.set(S, S, S);
                
                const pivot = new THREE.Group();
                if (name === 'Body') {
                    pivot.position.set(0, 0, 0);
                } else {
                    pivot.position.set(POS[name].x, POS[name].y, 0);
                    // 【重要】回転軸をパーツの「上端」にするため、モデルのみ少し下へ
                    model.position.y = -0.1; 
                }

                pivot.add(model);
                pivots[name] = pivot;
                models[name] = model;
                playerGroup.add(pivot);

                loadedCount++;
                if (loadedCount === 5) {
                    document.getElementById('ui').innerText = "Ready to Walk";
                    startAnimating();
                }
            });
        });

        let moveX = 0, moveZ = 0, power = 0;
        const stick = document.getElementById('joystick-stick');
        const base = document.getElementById('joystick-base');

        window.addEventListener('touchstart', (e) => handleTouch(e));
        window.addEventListener('touchmove', (e) => handleTouch(e));
        window.addEventListener('touchend', () => {
            stick.style.transform = `translate(0,0)`;
            moveX = 0; moveZ = 0; power = 0;
        });

        function handleTouch(e) {
            const touch = e.touches[0];
            const rect = base.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = touch.clientX - cx;
            const dy = touch.clientY - cy;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);

            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            power = dist / 50;
            moveX = Math.cos(angle) * power * 0.1;
            moveZ = Math.sin(angle) * power * 0.1;
        }

        let time = 0;
        function startAnimating() {
            function animate() {
                requestAnimationFrame(animate);

                if (power > 0.1) {
                    playerGroup.position.x += moveX;
                    playerGroup.position.z += moveZ;
                    playerGroup.rotation.y = Math.atan2(-moveX, -moveZ) + Math.PI;

                    time += power * 0.15;
                    const walkFreq = 12;
                    const swing = Math.sin(time * walkFreq);

                    // 足：付け根から交互に回転
                    pivots['Leg_R'].rotation.x = swing * 0.6;
                    pivots['Leg_L'].rotation.x = -swing * 0.6;

                    // 腕：足と逆の動き
                    pivots['Arm_R'].rotation.x = -swing * 0.4;
                    pivots['Arm_L'].rotation.x = swing * 0.4;

                    // 胴体：歩行に合わせたバウンドとわずかな傾き
                    pivots['Body'].position.y = Math.abs(swing) * 0.08;
                    pivots['Body'].rotation.z = -swing * 0.05;
                } else {
                    // 停止時：ゆっくりとした呼吸モーション
                    const idle = Math.sin(Date.now() * 0.002) * 0.03;
                    pivots['Body'].position.y = idle;
                    ['Leg_R', 'Leg_L', 'Arm_R', 'Arm_L'].forEach(n => pivots[n].rotation.x = 0);
                }

                camera.position.lerp(new THREE.Vector3(
                    playerGroup.position.x, 
                    playerGroup.position.y + 4, 
                    playerGroup.position.z + 7
                ), 0.1);
                camera.lookAt(playerGroup.position);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
