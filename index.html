<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anttis - 緊急表示テスト</title>
    <style>
        body { margin: 0; background-color: #111; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; color: #f00; background: white; padding: 10px; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">確認中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // カメラを思いっきり引いた位置に
        camera.position.set(0, 5, 20);
        const controls = new OrbitControls(camera, renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 3)); 
        scene.add(new THREE.GridHelper(100, 100, 0xffffff, 0x333333));

        const loader = new GLTFLoader();
        // GitHubにアップロードされている正確なファイル名を確認してください
        const parts = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];
        let count = 0;

        parts.forEach(name => {
            loader.load(`./${name}.glb`, (gltf) => {
                const model = gltf.scene;
                // さっきのスクショの正解に近い設定
                model.scale.set(0.5, 0.5, 0.5); 
                
                // 全パーツをあえて「原点」に重ねて表示（これで映るか確認）
                model.position.set(0, 0, 0); 
                scene.add(model);

                count++;
                document.getElementById('ui').innerText = `成功: ${count}/5`;
                document.getElementById('ui').style.color = "blue";
            }, undefined, (err) => {
                document.getElementById('ui').innerText = `${name}が読み込めません！`;
                console.error(err);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
