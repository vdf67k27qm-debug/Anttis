<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kunya Player</title>
<style>
body { margin: 0; overflow: hidden; background:#111; }
#joy {
  position: fixed; bottom: 60px; left: 60px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}
#knob {
  position: absolute; top: 30px; left: 30px;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: white;
}
</style>
</head>
<body>

<div id="joy"><div id="knob"></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// === 基本 ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 6, 8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// 地面
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x222222})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// === プレイヤー ===
const loader = new GLTFLoader();
const player = new THREE.Group();
scene.add(player);

let parts = {};

loader.load("Base.glb", (gltf)=>{
  const root = gltf.scene;
  player.add(root);

  // 名前で取得
  root.traverse(obj=>{
    if(obj.name.includes("body")) parts.body = obj;
    if(obj.name.includes("head")) parts.head = obj;
    if(obj.name.includes("arm_L")) parts.armL = obj;
    if(obj.name.includes("arm_R")) parts.armR = obj;
    if(obj.name.includes("leg_L")) parts.legL = obj;
    if(obj.name.includes("leg_R")) parts.legR = obj;
  });
});

// === 入力 ===
let input = {x:0, z:0};

const joy = document.getElementById("joy");
const knob = document.getElementById("knob");

let active = false;

joy.addEventListener("touchstart", ()=>active=true);

window.addEventListener("touchmove", (e)=>{
  if(!active) return;

  const t = e.touches[0];
  const rect = joy.getBoundingClientRect();

  let dx = t.clientX - (rect.left + 60);
  let dy = t.clientY - (rect.top + 60);

  const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
  const ang = Math.atan2(dy, dx);

  knob.style.transform =
    `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;

  input.x = Math.cos(ang)*(dist/50);
  input.z = Math.sin(ang)*(dist/50);
});

window.addEventListener("touchend", ()=>{
  active=false;
  knob.style.transform="translate(0,0)";
  input.x=0; input.z=0;
});

// === くにゃ動き ===
let velocity = new THREE.Vector3();
let targetVelocity = new THREE.Vector3();

const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // 目標速度
  targetVelocity.set(input.x*6,0,input.z*6);

  // ぬるっと加速
  velocity.lerp(targetVelocity, 0.1);

  // 減衰
  velocity.multiplyScalar(0.95);

  // 移動
  player.position.add(velocity.clone().multiplyScalar(dt));

  const speed = velocity.length();

  // 回転（遅延）
  if(speed > 0.01){
    const targetRot = Math.atan2(velocity.x, velocity.z);
    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetRot, 0.15);
  }

  // ===== くにゃ表現 =====

  // 体伸縮
  if(parts.body){
    parts.body.scale.y = 1 + speed*0.3;
    parts.body.scale.x = 1 - speed*0.15;
    parts.body.scale.z = 1 - speed*0.15;
  }

  // バウンド
  player.position.y = Math.abs(Math.sin(t*10))*speed*0.2;

  // 頭遅延
  if(parts.head){
    parts.head.rotation.y = Math.sin(t*5)*0.1;
  }

  // 腕スイング
  if(parts.armL){
    parts.armL.rotation.x = Math.sin(t*10)*speed;
  }
  if(parts.armR){
    parts.armR.rotation.x = -Math.sin(t*10)*speed;
  }

  // 足スイング
  if(parts.legL){
    parts.legL.rotation.x = -Math.sin(t*10)*speed;
  }
  if(parts.legR){
    parts.legR.rotation.x = Math.sin(t*10)*speed;
  }

  // カメラ追従
  camera.position.lerp(
    new THREE.Vector3(
      player.position.x,
      6,
      player.position.z + 8
    ), 0.1
  );
  camera.lookAt(player.position);

  renderer.render(scene,camera);
}
animate();
