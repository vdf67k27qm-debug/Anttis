<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anttis - サイズ調整テスト</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; }
        #ui { 
            position: absolute; top: 10px; left: 10px; color: white; 
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            font-family: sans-serif; line-height: 1.6;
        }
        input[type="range"] { width: 200px; }
        .val { font-family: monospace; color: #00ffcc; }
    </style>
</head>
<body>
    <div id="ui">
        <b>一括サイズ調整 (Scale)</b><br>
        <input type="range" id="scaleAll" min="0.01" max="2.0" step="0.01" value="1.0">
        <span class="val" id="scaleVal">1.00</span><br>
        <hr>
        <b>股下からの位置 (マス目)</b><br>
        足の長さ: <input type="number" id="legL" value="6.5" step="0.1" style="width:50px;"><br>
        肩(X, Y): <input type="number" id="shX" value="5" step="0.1" style="width:40px;">, 
                  <input type="number" id="shY" value="4" step="0.1" style="width:40px;"><br>
        股(X): <input type="number" id="hipX" value="2.5" step="0.1" style="width:40px;"><br>
        <p style="font-size: 12px;">※マウスドラッグで回転、ホイールでズーム</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 10, 20);

        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(5, 10, 7);
        scene.add(light, new THREE.AmbientLight(0x404040, 2));
        scene.add(new THREE.GridHelper(20, 20));

        const bodyGroup = new THREE.Group();
        scene.add(bodyGroup);

        const loader = new GLTFLoader();
        let parts = {};

        function loadPart(name) {
            loader.load(`./${name}.glb`, (gltf) => {
                parts[name] = gltf.scene;
                bodyGroup.add(parts[name]);
                update();
            });
        }

        ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'].forEach(loadPart);

        function update() {
            const s = parseFloat(document.getElementById('scaleAll').value);
            document.getElementById('scaleVal').innerText = s.toFixed(2);

            const legL = parseFloat(document.getElementById('legL').value);
            const shX = parseFloat(document.getElementById('shX').value);
            const shY = parseFloat(document.getElementById('shY').value);
            const hipX = parseFloat(document.getElementById('hipX').value);

            bodyGroup.position.y = legL; // 全体を浮かす

            // 各パーツにサイズと位置を適用
            Object.keys(parts).forEach(name => {
                const p = parts[name];
                p.scale.set(s, s, s); // 全パーツ一括サイズ変更

                // 位置の適用（計算にスケールを掛け合わせるのがコツ！）
                if(name === 'Body') p.position.set(0, 0, 0);
                if(name === 'Arm_R') p.position.set(-shX * s, shY * s, 0);
                if(name === 'Arm_L') p.position.set( shX * s, shY * s, 0);
                if(name === 'Leg_R') p.position.set(-hipX * s, 0, 0);
                if(name === 'Leg_L') p.position.set( hipX * s, 0, 0);
            });
        }

        // 全ての入力にイベントを設定
        document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
