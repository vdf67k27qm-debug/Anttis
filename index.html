<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anttis - パーツ分離成功版</title>
    <style>
        body { margin: 0; background-color: #222; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="ui">読み込み中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 2, 5); // キャラクターの正面近くに配置

        scene.add(new THREE.AmbientLight(0xffffff, 3));
        scene.add(new THREE.GridHelper(20, 20, 0x888888, 0x444444));

        const loader = new GLTFLoader();
        
        // --- あなたが調整した「正解」の数値 ---
        const S = 0.5;    // Scale
        const AX = 0.3;   // 右腕のX（絶対値）
        const AY = -0.15; // 右腕のY

        const fileNames = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];
        let count = 0;

        fileNames.forEach(name => {
            loader.load(`./${name}.glb`, (gltf) => {
                const model = gltf.scene;
                model.scale.set(S, S, S);

                // 各パーツを「埋まらない位置」に配置
                if(name === 'Body')  model.position.set(0, 0, 0);
                if(name === 'Arm_R') model.position.set(-AX, AY, 0);
                if(name === 'Arm_L') model.position.set( AX, AY, 0);
                
                // 足は腕より少し内側、かつ胴体の下
                if(name === 'Leg_R') model.position.set(-0.15, -0.4, 0);
                if(name === 'Leg_L') model.position.set( 0.15, -0.4, 0);

                scene.add(model);
                count++;
                document.getElementById('ui').innerText = `合体完了: ${count}/5`;
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
