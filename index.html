<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui-layer { position: fixed; top: 10px; left: 10px; color: #0f0; z-index: 100; pointer-events: none; font-family: monospace; font-size: 14px; }
        .joy-base { position: absolute; bottom: 50px; left: 40px; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border: 4px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        .joy-knob { position: absolute; top: 35px; left: 35px; width: 60px; height: 60px; background: radial-gradient(circle, #fff, #ccc); border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui-layer">Status: Initializing...</div>
    <div id="move-joy" class="joy-base"><div class="joy-knob"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const ui = document.getElementById('ui-layer');
        const log = (m) => { ui.innerHTML = `Status: ${m}`; console.log(m); };

        // --- ドキュメント基準のConfig設定 ---
        const config = {
            game: { speed: 0.12, rotationSpeed: 0.15 },
            model: { scale: 0.5 }, // VoxelMaxのモデルサイズに合わせて調整
            files: {
                body: 'Snail.glb', // あなたのファイル名に修正
                shell: 'Shell.glb'
            }
        };

        let scene, camera, renderer, snailPlayer, motionContainer;
        let moveInput = { x: 0, z: 0 };
        const loader = new THREE.GLTFLoader();

        // Promiseによる同期ロード関数
        const loadAsset = (url) => new Promise((res, rej) => {
            loader.load(url, (gltf) => res(gltf.scene), undefined, (e) => rej(url));
        });

        async function init() {
            try {
                log("Loading Assets...");
                // 1. 全てのモデルを同時にロード（ドキュメントの肝）
                const [body, shell] = await Promise.all([
                    loadAsset(config.files.body),
                    loadAsset(config.files.shell)
                ]);

                log("Assets Loaded. Setting up scene...");
                setupScene();

                // 2. カタツムリの組み立て
                snailPlayer = new THREE.Group();
                motionContainer = new THREE.Group(); // 揺れモーション用の中間階層
                
                body.scale.setScalar(config.model.scale);
                shell.scale.setScalar(config.model.scale);
                
                motionContainer.add(body);
                motionContainer.add(shell);
                snailPlayer.add(motionContainer);
                scene.add(snailPlayer);

                setupJoystick();
                animate();
                log("Game Ready. Move the joystick!");

            } catch (err) {
                log(`ERROR: File "${err}" not found. Check GitHub Filename!`);
            }
        }

        function setupScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 15); // 少し遠めから俯瞰

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(10, 20, 10);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));
            scene.add(new THREE.GridHelper(50, 50, 0x444444, 0x222222));
        }

        function setupJoystick() {
            const joy = document.getElementById('move-joy');
            const knob = joy.querySelector('.joy-knob');
            const handle = (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + 65);
                const dy = t.clientY - (r.top + 65);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 45);
                const a = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                moveInput = { x: Math.cos(a) * (d/45), z: Math.sin(a) * (d/45) };
            };
            joy.addEventListener('touchstart', handle);
            joy.addEventListener('touchmove', handle);
            joy.addEventListener('touchend', () => {
                knob.style.transform = `translate(0,0)`;
                moveInput = { x: 0, z: 0 };
            });
        }

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;

            if (moveInput.x !== 0 || moveInput.z !== 0) {
                // 移動と回転（ドキュメントの自然な動き）
                snailPlayer.position.x += moveInput.x * config.game.speed;
                snailPlayer.position.z += moveInput.z * config.game.speed;
                const targetAngle = Math.atan2(-moveInput.x, -moveInput.z);
                snailPlayer.rotation.y = THREE.MathUtils.lerp(snailPlayer.rotation.y, targetAngle, config.game.rotationSpeed);

                // 自然なモーション（motionContainerを揺らす）
                motionContainer.rotation.x = Math.sin(time * 10) * 0.1; // 前後
                motionContainer.position.y = Math.abs(Math.sin(time * 10)) * 0.1; // 跳ね
            } else {
                // 待機中
                motionContainer.position.y = Math.sin(time * 2) * 0.02;
            }

            // カメラの追従
            camera.position.lerp(new THREE.Vector3(snailPlayer.position.x, 10, snailPlayer.position.z + 15), 0.1);
            camera.lookAt(snailPlayer.position);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
