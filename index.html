<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Dash Attack</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .joystick-base {
            position: absolute; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.1); border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; opacity: 0.6; pointer-events: auto;
        }
        .joystick-knob {
            position: absolute; top: 35px; left: 35px; width: 60px; height: 60px;
            background: radial-gradient(circle, #fff, #ccc); border-radius: 50%;
        }
        #move-joy { bottom: 50px; left: 40px; }
        #attack-joy { bottom: 180px; right: 40px; border-color: rgba(255, 100, 100, 0.3); }
        #dash-btn {
            position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.15); border: 3px solid #fff; border-radius: 50%;
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center;
            pointer-events: auto; user-select: none; transition: opacity 0.2s, background 0.2s;
        }
        /* スタミナバー関連のCSSは不要になったため削除 */
        .side-btn {
            position: absolute; left: 20px; width: 60px; height: 45px;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff;
            border-radius: 5px; pointer-events: auto; font-size: 10px;
        }
        #camera-btn { top: 20px; }
        #weapon-btn { top: 75px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="move-joy" class="joystick-base"><div id="move-knob" class="joystick-knob"></div></div>
        <div id="attack-joy" class="joystick-base"><div id="attack-knob" class="joystick-knob"></div></div>
        <div id="dash-btn">DASH</div>
        <button id="camera-btn" class="side-btn">視点切替</button>
        <button id="weapon-btn" class="side-btn">武器切替</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const config = {
            models: {
                body: { file: 'Snail.glb', pos: [0, 0, 0] },
                shell: { file: 'Shell.glb', pos: [0, 0.25, -0.25] },
                dashShell: { file: 'Shell dash.glb', pos: [0, 0.65, 0], scale: 1.2 },
                shellEquip: { file: 'Shell equip.glb', pos: [0, 0.25, -0.25] },
                gun: { file: 'Gun.glb', pos: [0, 1.2, -0.3], scale: 0.7 }
            },
            game: {
                fireRate: 6.0,
                bulletRange: 20.0,
                bulletSpeed: 45.0,
                aimLineWidth: 0.30,
                // --- 突進（ダッシュ）の調整パラメータ ---
                dashDuration: 0.6,    // 突進している時間（秒）
                dashCooldown: 2.0,    // 次に使えるまでの待ち時間（秒）
                dashSpeed: 25.0       // 突進時の移動速度
            }
        };

        const state = {
            isLoaded: false,
            currentWeapon: 'normal',
            isAiming: false,
            camMode: 1,
            // --- 突進の状態管理 ---
            isDashing: false,       // 現在突進中か
            dashTimer: 0,          // 突進の残り時間
            dashCooldownTimer: 0,  // クールタイムの残り時間
            dashRot: 0,
            lastFireTime: 0
        };

        // 基本設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(15, 30, 15);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(100, 50, 0x444444, 0x444444));

        const snailPlayer = new THREE.Group();
        scene.add(snailPlayer);
        const dashPivot = new THREE.Group();
        snailPlayer.add(dashPivot);

        const loadedModels = {};
        const manager = new THREE.LoadingManager();
        const loader = new GLTFLoader(manager);

        manager.onLoad = () => { 
            state.isLoaded = true;
            if (loadedModels.dashShell) {
                dashPivot.add(loadedModels.dashShell);
                loadedModels.dashShell.position.set(0, -0.3, 0); 
                dashPivot.position.set(0, 0.65, 0);
            }
        };

        Object.entries(config.models).forEach(([key, info]) => {
            loader.load(info.file, (gltf) => {
                const model = gltf.scene;
                model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                if (info.scale) model.scale.setScalar(info.scale);
                loadedModels[key] = model;
                if (key !== 'dashShell') {
                    snailPlayer.add(model);
                    model.position.set(...(info.pos || [0,0,0]));
                    model.visible = false;
                }
            });
        });

        const bullets = [], muzzleFlashes = [], dustParticles = [];
        const aimLine = new THREE.Mesh(
            new THREE.CylinderGeometry(config.game.aimLineWidth, config.game.aimLineWidth, config.game.bulletRange, 8).rotateX(Math.PI/2).translate(0, 0, config.game.bulletRange/2),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 })
        );
        aimLine.visible = false;
        scene.add(aimLine);

        let moveInput = { x: 0, z: 0 }, attackInput = { x: 0, z: 0 };

        function setupJoy(id, knobId, onMove, onEnd) {
            const joy = document.getElementById(id), knob = document.getElementById(knobId);
            let active = false, tid = null;
            joy.addEventListener('touchstart', (e) => { active = true; tid = e.changedTouches[0].identifier; e.preventDefault(); }, {passive: false});
            window.addEventListener('touchmove', (e) => {
                const t = Array.from(e.touches).find(v => v.identifier === tid);
                if (!active || !t) return;
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50), ang = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
                onMove(Math.cos(ang)*(d/50), Math.sin(ang)*(d/50), d);
            }, {passive: false});
            window.addEventListener('touchend', (e) => {
                if (Array.from(e.changedTouches).some(v => v.identifier === tid)) {
                    active = false; knob.style.transform = "translate(0,0)"; onEnd();
                }
            });
        }

        setupJoy('move-joy', 'move-knob', (x, z) => { moveInput = {x, z}; }, () => { moveInput = {x:0,z:0}; });
        setupJoy('attack-joy', 'attack-knob', (x, z, d) => { attackInput = {x, z}; state.isAiming = d > 15; }, () => { state.isAiming = false; });

        const dashBtn = document.getElementById('dash-btn');
        dashBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            // 突進中でなく、かつクールタイムが終わっていれば発動
            if (!state.isDashing && state.dashCooldownTimer <= 0) {
                state.isDashing = true;
                state.dashTimer = config.game.dashDuration;
                state.dashCooldownTimer = config.game.dashCooldown;
            }
        });

        document.getElementById('weapon-btn').addEventListener('click', () => { state.currentWeapon = (state.currentWeapon === "normal" ? "gun" : "normal"); });
        document.getElementById('camera-btn').addEventListener('click', () => { state.camMode = (state.camMode + 1) % 3; });

        const clock = new THREE.Clock();
        const camOffsets = [{h:7, d:6}, {h:12, d:10}, {h:22, d:18}];

        function animate() {
            requestAnimationFrame(animate);
            if (!state.isLoaded) return;
            const dt = clock.getDelta(), elapsed = clock.getElapsedTime();
            const isMoving = Math.abs(moveInput.x) > 0.1 || Math.abs(moveInput.z) > 0.1;

            // --- 突進・クールタイムのタイマー処理 ---
            if (state.dashTimer > 0) {
                state.dashTimer -= dt;
                if (state.dashTimer <= 0) state.isDashing = false;
            }
            if (state.dashCooldownTimer > 0) {
                state.dashCooldownTimer -= dt;
                // クールタイム中はボタンを暗くし、終わったら戻す
                dashBtn.style.opacity = "0.3";
                dashBtn.style.background = "rgba(0, 0, 0, 0.5)";
            } else {
                dashBtn.style.opacity = "1.0";
                dashBtn.style.background = "rgba(255, 255, 255, 0.15)";
            }

            // 速度の決定
            let currentSpeed = 6;
            if (state.isDashing) {
                currentSpeed = config.game.dashSpeed;
                if (Math.random() > 0.2) createDust(0.2); // 突進中は土煙を多めに出す
            } else if (isMoving && Math.random() > 0.8) {
                createDust(0.1);
            }

            // 移動処理
            // 突進中は操作を受け付けず、向いている方向に進む（または入力方向に固定）
            const moveX = moveInput.x * currentSpeed * dt;
            const moveZ = moveInput.z * currentSpeed * dt;
            snailPlayer.position.x += moveX;
            snailPlayer.position.z += moveZ;

            if (isMoving) {
                snailPlayer.rotation.y = THREE.MathUtils.lerp(snailPlayer.rotation.y, Math.atan2(moveInput.x, moveInput.z), 0.15);
            }

            // --- モデルの表示・アニメーション切り替え ---
            Object.values(loadedModels).forEach(m => { if(m && m.parent === snailPlayer) m.visible = false; });
            dashPivot.visible = false;

            if (state.isDashing) {
                // 突進中（回転状態）
                dashPivot.visible = true;
                state.dashRot += dt * 20; // 回転スピード
                dashPivot.rotation.x = state.dashRot;
            } else {
                // 通常時
                loadedModels.body.visible = true;
                const wave = Math.sin(elapsed * (isMoving ? 12 : 1.5));
                loadedModels.body.scale.y = 1 + wave * (isMoving ? 0.12 : 0.03);
                
                if (state.currentWeapon === 'normal') {
                    loadedModels.shell.visible = true;
                } else {
                    loadedModels.shellEquip.visible = true;
                    loadedModels.gun.visible = true;
                    if (state.isAiming) {
                        loadedModels.gun.rotation.y = Math.atan2(attackInput.x, attackInput.z) - snailPlayer.rotation.y;
                        aimLine.visible = true;
                        aimLine.position.set(snailPlayer.position.x, 0.01, snailPlayer.position.z);
                        aimLine.rotation.y = Math.atan2(attackInput.x, attackInput.z);
                    } else {
                        loadedModels.gun.rotation.y = THREE.MathUtils.lerp(loadedModels.gun.rotation.y, 0, 0.04);
                        aimLine.visible = false;
                    }
                }
            }

            // 弾・エフェクトの更新
            updateEffects(dt, elapsed);

            // カメラ
            const cfg = camOffsets[state.camMode];
            camera.position.lerp(new THREE.Vector3(snailPlayer.position.x, cfg.h, snailPlayer.position.z + cfg.d), 0.1);
            camera.lookAt(snailPlayer.position);
            renderer.render(scene, camera);
        }

        function updateEffects(dt, elapsed) {
            // 射撃
            if (state.isAiming && state.currentWeapon === 'gun' && !state.isDashing) {
                if (elapsed - state.lastFireTime > (1.0 / config.game.fireRate)) {
                    fireBullet();
                    state.lastFireTime = elapsed;
                }
            }
            // 弾の移動
            bullets.forEach((b, i) => {
                b.mesh.position.add(b.vel.clone().multiplyScalar(dt));
                b.life -= dt;
                if (b.life < 0.2) b.mesh.material.opacity = Math.max(0, b.life / 0.2);
                if (b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); }
            });
            // 土煙
            dustParticles.forEach((p, i) => {
                p.life -= dt * 2.2; p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); dustParticles.splice(i, 1); }
            });
            // マズルフラッシュ
            muzzleFlashes.forEach((f, i) => {
                f.life -= dt; f.mesh.scale.multiplyScalar(0.85);
                if (f.life <= 0) { scene.remove(f.mesh); muzzleFlashes.splice(i, 1); }
            });
        }

        function createDust(size) {
            const dust = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), new THREE.MeshBasicMaterial({color: 0x888888, transparent: true, opacity: 0.4}));
            dust.position.copy(snailPlayer.position).add(new THREE.Vector3((Math.random()-0.5)*0.5, 0.05, (Math.random()-0.5)*0.5));
            scene.add(dust); dustParticles.push({mesh: dust, life: 1.0});
        }

        function fireBullet() {
            const gunWorldPos = new THREE.Vector3();
            loadedModels.gun.getWorldPosition(gunWorldPos);
            const dir = new THREE.Vector3(attackInput.x, 0, attackInput.z).normalize();
            const bMesh = new THREE.Sprite(new THREE.SpriteMaterial({ color: 0xffff00, blending: THREE.AdditiveBlending }));
            bMesh.scale.setScalar(0.5);
            bMesh.position.copy(gunWorldPos);
            scene.add(bMesh);
            bullets.push({ mesh: bMesh, vel: dir.multiplyScalar(config.game.bulletSpeed), life: 0.5 });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
