<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Anttis - 全パーツ合体・表示安定版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <div id="ui">読み込み中...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
            "three/examples/jsm/controls/OrbitControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        // カメラの初期位置を少し離す
        camera.position.set(5, 5, 10);

        scene.add(new THREE.DirectionalLight(0xffffff, 2.5).set(5, 10, 7));
        scene.add(new THREE.AmbientLight(0x404040, 3));
        scene.add(new THREE.GridHelper(50, 50, 0x888888, 0x444444)); // グリッドを大きく

        // --- 確定した数値（ここを少し小さくして表示を安定させます） ---
        const S = 0.5;   
        const AX = 0.3;  
        const AY = -0.15; 
        const LX = 0.15;  
        const LY = -0.4; 

        const bodyGroup = new THREE.Group();
        scene.add(bodyGroup);

        const loader = new GLTFLoader();
        const fileNames = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];
        let loadedCount = 0;

        function getPos(name) {
            if(name === 'Body')  return [0, 0, 0];
            if(name === 'Arm_R') return [-AX, AY, 0];
            if(name === 'Arm_L') return [ AX, AY, 0];
            if(name === 'Leg_R') return [-LX, LY, 0];
            if(name === 'Leg_L') return [ LX, LY, 0];
            return [0, 0, 0];
        }

        fileNames.forEach(name => {
            loader.load(`./${name}.glb`, (gltf) => {
                const model = gltf.scene;
                const [x, y, z] = getPos(name);
                model.scale.set(S, S, S);
                model.position.set(x, y, z);
                bodyGroup.add(model);

                loadedCount++;
                document.getElementById('ui').innerText = `読み込み: ${loadedCount} / 5`;
                
                if(loadedCount === 5) {
                    document.getElementById('ui').innerText = "組み立て完了！";
                    // 全パーツ読み込み後にカメラのターゲットをモデルに合わせる
                    controls.target.set(0, 0, 0);
                    controls.update();
                }
            }, undefined, (e) => {
                document.getElementById('ui').innerText = name + "の読み込みエラー";
                console.error(e);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
