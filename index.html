<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail Adventure - No Vibration</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; }
        #joystick-base { 
            position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
        }
        #joystick-stick { 
            position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; 
            background: rgba(255,255,255,0.4); border-radius: 50%; 
        }
    </style>
</head>
<body>
    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 3));
        scene.add(new THREE.GridHelper(100, 100, 0x333333, 0x222222));

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // --- あなたが調整した確定数値 ---
        const S = 0.5;
        const POS = {
            Arm_R: { x: -0.25, y: -0.15 }, Arm_L: { x: 0.25, y: -0.15 },
            Leg_R: { x: -0.12, y: -0.25 }, Leg_L: { x: 0.12, y: -0.25 }
        };

        const loader = new GLTFLoader();
        const parts = {}; // 軸となるGroupを格納

        async function init() {
            const names = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];
            for (const name of names) {
                const gltf = await loader.loadAsync(`./${name}.glb`);
                const model = gltf.scene;
                
                // 【重要】モデルの原点を「パーツの上端（付け根）」にオフセット
                const pivot = new THREE.Group();
                model.scale.set(S, S, S);
                
                if (name !== 'Body') {
                    pivot.position.set(POS[name].x, POS[name].y, 0);
                    model.position.y = -0.15; // ここで「肉」を「軸」から吊り下げる
                } else {
                    pivot.position.set(0, 0, 0);
                }

                pivot.add(model);
                parts[name] = pivot;
                playerGroup.add(pivot);
            }
            animate();
        }

        // --- ジョイスティック ---
        let moveX = 0, moveZ = 0, power = 0;
        const base = document.getElementById('joystick-base');
        const stick = document.getElementById('joystick-stick');

        const updateJS = (e) => {
            const touch = e.touches[0];
            const rect = base.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width / 2);
            const dy = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            power = dist / 50;
            moveX = Math.cos(angle) * power * 0.15;
            moveZ = Math.sin(angle) * power * 0.15;
        };

        window.addEventListener('touchstart', updateJS);
        window.addEventListener('touchmove', updateJS);
        window.addEventListener('touchend', () => {
            stick.style.transform = `translate(0,0)`;
            moveX = 0; moveZ = 0; power = 0;
        });

        let walkCycle = 0;
        function animate() {
            requestAnimationFrame(animate);

            if (power > 0.1 && parts['Body']) {
                playerGroup.position.x += moveX;
                playerGroup.position.z += moveZ;
                playerGroup.rotation.y = Math.atan2(-moveX, -moveZ) + Math.PI;

                walkCycle += power * 0.25;
                const swing = Math.sin(walkCycle * 10);

                // 交互に出る足
                parts['Leg_R'].rotation.x = swing * 0.6;
                parts['Leg_L'].rotation.x = -swing * 0.6;
                
                // 腕の振り
                parts['Arm_R'].rotation.x = -swing * 0.4;
                parts['Arm_L'].rotation.x = swing * 0.4;

                // 胴体の上下動（これが痙攣に見えないようスムーズに）
                parts['Body'].position.y = Math.abs(Math.cos(walkCycle * 10)) * 0.1;
            } else if (parts['Body']) {
                // 停止時はスッと戻る
                Object.values(parts).forEach(p => p.rotation.x *= 0.8);
                parts['Body'].position.y *= 0.8;
            }

            camera.position.set(playerGroup.position.x, 6, playerGroup.position.z + 8);
            camera.lookAt(playerGroup.position);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
