<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pig Physics - Adjusted Limbs</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">物理テスト：指定された数値で腕と手を配置しました。</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- シーン基本設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222233);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    // --- 地面 ---
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20), 
        new THREE.MeshPhongMaterial({ color: 0x444444 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    scene.add(new THREE.GridHelper(20, 20));

    // --- キャラクター構造 ---
    const player = new THREE.Group();
    player.position.y = 10; 
    scene.add(player);

    // パーツ用グループ
    const bodyGroup = new THREE.Group();
    const armL = new THREE.Group();
    const armR = new THREE.Group();
    const handL = new THREE.Group();
    const handR = new THREE.Group();
    
    player.add(bodyGroup, armL, armR, handL, handR);

    // --- 調整数値の適用 ---
    const POS = {
        arm:  { x: 0.35, y: 0.75, z: 0.49 },
        hand: { x: 0.35, y: 0.75, z: 0.8 }
    };

    // 左右対称に配置
    armL.position.set(-POS.arm.x, POS.arm.y, POS.arm.z);
    armR.position.set( POS.arm.x, POS.arm.y, POS.arm.z);
    handL.position.set(-POS.hand.x, POS.hand.y, POS.hand.z);
    handR.position.set( POS.hand.x, POS.hand.y, POS.hand.z);

    // --- 物理パラメータ ---
    let velocityY = 0;
    const gravity = -0.01;
    const bounce = 0.3;
    const bodyRadius = 0.6;

    // --- モデル読み込み ---
    const loader = new GLTFLoader();
    async function loadModels() {
        const load = (url) => new Promise(res => loader.load(url, g => res(g.scene)));
        
        const mBody = await load('Pig_Body.glb');
        const mArmL = await load('Pig_Arm.glb');
        const mArmR = await load('Pig_Arm.glb');
        const mHandL = await load('Pig_Hand.glb');
        const mHandR = await load('Pig_Hand.glb');

        if(mBody) bodyGroup.add(mBody);
        if(mArmL) armL.add(mArmL);
        if(mArmR) armR.add(mArmR);
        if(mHandL) handL.add(mHandL);
        if(mHandR) handR.add(mHandR);
    }
    loadModels();

    camera.position.set(0, 5, 10);
    camera.lookAt(0, 2, 0);

    // --- ループ処理 ---
    function animate() {
        requestAnimationFrame(animate);

        // 自由落下
        velocityY += gravity;
        player.position.y += velocityY;

        // 接地判定
        if (player.position.y - bodyRadius <= 0) {
            player.position.y = bodyRadius;
            if (Math.abs(velocityY) > 0.05) {
                velocityY *= -bounce; 
            } else {
                velocityY = 0;
            }
        }

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
