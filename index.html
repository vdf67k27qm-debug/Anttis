<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPad Pro Map Editor - Bottom UI</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background: #1a1a1a; overflow: hidden; touch-action: none; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<script>
// --- 設定 ---
const TILE_SIZE = 64;
const MAP_WIDTH = 60;
const MAP_HEIGHT = 20;
const WORLD_W = MAP_WIDTH * TILE_SIZE;
const WORLD_H = MAP_HEIGHT * TILE_SIZE;

let MAP_DATA = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(0));
let currentTileID = null; 

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

function preload() {
    this.load.image('bg', 'backgroundCastles.png');
    this.load.image('t1', 'ground_stone.png');
    this.load.image('t2', 'platform_wood.png');
    this.load.image('t3', 'flag_red.png');
}

let cam, marker, uiButtons = [];

function create() {
    const scene = this;
    cam = this.cameras.main;
    cam.setBounds(0, 0, WORLD_W, WORLD_H);
    cam.setZoom(0.4); // 最初はかなり引いた視点

    // 1. 背景
    this.add.image(0, 0, 'bg').setOrigin(0).setDisplaySize(WORLD_W, WORLD_H);

    // 2. グリッド (タイルより少し奥、背景より前)
    const grid = this.add.grid(WORLD_W/2, WORLD_H/2, WORLD_W, WORLD_H, TILE_SIZE, TILE_SIZE, 0, 0, 0xffffff, 0.3).setOrigin(0.5);
    grid.setDepth(0.5);

    // 3. マップレイヤー
    this.mapLayer = this.add.group();

    // 4. エディタマーカー
    marker = this.add.graphics().lineStyle(4, 0xffff00, 1).strokeRect(0, 0, TILE_SIZE, TILE_SIZE);
    marker.setDepth(10);

    // 5. UI（画面下部）
    createBottomUI.call(this);

    // 6. 入力制御
    this.input.addPointer(3);
    setupTouchControls.call(this);
}

function setupTouchControls() {
    let lastPinchDist = 0;
    const scene = this;

    this.input.on('pointermove', (p) => {
        const p1 = scene.input.pointer1;
        const p2 = scene.input.pointer2;
        const p3 = scene.input.pointer3;

        // 三本指：カメラ移動（いつでも可能）
        if (p1.isDown && p2.isDown && p3.isDown) {
            cam.scrollX -= (p.x - p.prevPosition.x) / cam.zoom;
            cam.scrollY -= (p.y - p.prevPosition.y) / cam.zoom;
        } 
        // 二本指：ピンチズーム
        else if (p1.isDown && p2.isDown) {
            let dist = Phaser.Math.Distance.Between(p1.x, p1.y, p2.x, p2.y);
            if (lastPinchDist > 0) {
                let zoomChange = dist / lastPinchDist;
                cam.setZoom(Phaser.Math.Clamp(cam.zoom * zoomChange, 0.1, 2.0));
            }
            lastPinchDist = dist;
        } 
        // 一本指
        else if (p1.isDown && p1.y < window.innerHeight - 120) {
            if (currentTileID !== null) {
                // 素材選択中：タイル配置
                placeTile.call(scene, p1);
            } else {
                // 素材未選択時：一本指でカメラ移動
                cam.scrollX -= (p.x - p.prevPosition.x) / cam.zoom;
                cam.scrollY -= (p.y - p.prevPosition.y) / cam.zoom;
            }
        }
    });

    this.input.on('pointerup', () => { lastPinchDist = 0; });
    
    this.input.on('pointerdown', (p) => {
        if (p.y < window.innerHeight - 120 && currentTileID !== null && !scene.input.pointer2.isDown) {
            placeTile.call(scene, p);
        }
    });
}

function createBottomUI() {
    const scene = this;
    const h = 120; // UIの高さ
    const uiY = window.innerHeight - h;

    const uiContainer = this.add.container(0, uiY).setScrollFactor(0).setDepth(100);
    const bottomBar = this.add.rectangle(0, 0, window.innerWidth, h, 0x000000, 0.85).setOrigin(0);
    uiContainer.add(bottomBar);

    const tiles = [
        { id: 1, key: 't1', label: 'SOLID' },
        { id: 2, key: 't2', label: 'PLAT' },
        { id: 3, key: 't3', label: 'DECO' }
    ];

    tiles.forEach((tile, i) => {
        const x = 80 + (i * 110);
        const btn = this.add.container(x, h / 2).setInteractive(new Phaser.Geom.Rectangle(-50, -50, 100, 100), Phaser.Geom.Rectangle.Contains);
        
        const bg = this.add.rectangle(0, 0, 90, 90, 0x333333).setStrokeStyle(2, 0x666666);
        const img = this.add.image(0, -10, tile.key).setDisplaySize(50, 50);
        const txt = this.add.text(0, 25, tile.label, {fontSize: '14px', fontWeight: 'bold'}).setOrigin(0.5);
        
        btn.add([bg, img, txt]);
        
        btn.on('pointerdown', (p) => {
            p.stopPropagation(); // ゲーム画面への浸透を防止
            selectTile.call(scene, tile.id);
        });
        
        uiContainer.add(btn);
        uiButtons.push({ id: tile.id, bg: bg });
    });

    // EXPORTボタン (右端)
    const exportBtn = this.add.container(window.innerWidth - 100, h / 2).setInteractive(new Phaser.Geom.Rectangle(-60, -40, 120, 80), Phaser.Geom.Rectangle.Contains);
    const exBg = this.add.rectangle(0, 0, 100, 60, 0x00aa00).setStrokeStyle(2, 0xffffff);
    const exTxt = this.add.text(0, 0, 'EXPORT', {fontWeight: 'bold'}).setOrigin(0.5);
    exportBtn.add([exBg, exTxt]);
    exportBtn.on('pointerdown', (p) => {
        p.stopPropagation();
        exportMapData();
    });
    uiContainer.add(exportBtn);

    // リサイズ対応
    this.scale.on('resize', () => {
        uiContainer.y = window.innerHeight - h;
        bottomBar.width = window.innerWidth;
        exportBtn.x = window.innerWidth - 100;
    });
}

function selectTile(id) {
    if (currentTileID === id) {
        currentTileID = null; // トグルで解除
    } else {
        currentTileID = id;
    }

    uiButtons.forEach(btn => {
        if (btn.id === currentTileID) {
            btn.bg.setStrokeStyle(4, 0xffff00);
            btn.bg.setFillStyle(0x555555);
        } else {
            btn.bg.setStrokeStyle(2, 0x666666);
            btn.bg.setFillStyle(0x333333);
        }
    });
}

function placeTile(pointer) {
    const worldPoint = pointer.positionToCamera(cam);
    const tx = Math.floor(worldPoint.x / TILE_SIZE);
    const ty = Math.floor(worldPoint.y / TILE_SIZE);

    if (tx >= 0 && tx < MAP_WIDTH && ty >= 0 && ty < MAP_HEIGHT) {
        MAP_DATA[ty][tx] = currentTileID;
        renderMap.call(this);
    }
}

function renderMap() {
    this.mapLayer.clear(true, true);
    const keys = { 1: 't1', 2: 't2', 3: 't3' };

    for (let r = 0; r < MAP_HEIGHT; r++) {
        for (let c = 0; c < MAP_WIDTH; c++) {
            const id = MAP_DATA[r][c];
            if (!id) continue;
            const img = this.mapLayer.create(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, keys[id]);
            img.setDisplaySize(TILE_SIZE, TILE_SIZE);
            img.setDepth(2);
        }
    }
}

function update() {
    const worldPoint = this.input.activePointer.positionToCamera(cam);
    marker.x = Math.floor(worldPoint.x / TILE_SIZE) * TILE_SIZE;
    marker.y = Math.floor(worldPoint.y / TILE_SIZE) * TILE_SIZE;
    marker.visible = (currentTileID !== null && this.input.activePointer.y < window.innerHeight - 120);
}

function exportMapData() {
    const res = JSON.stringify(MAP_DATA);
    console.log("--- COPY DATA START ---");
    console.log(res);
    console.log("--- COPY DATA END ---");
    alert("コンソールにJSONを出力しました。\n素材未選択の時は一本指でカメラ移動が可能です。");
}
</script>
</body>
</html>
