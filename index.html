<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Parts Coordinator</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 15px; border-radius: 8px; width: 250px;
        }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #aaa; }
        select, input { width: 100%; margin-bottom: 5px; }
        .pos-label { display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="ui">
    <h3>Parts Control</h3>
    <div class="control-group">
        <label>選択中のパーツ:</label>
        <select id="partSelect">
            <option value="Body">Body (体)</option>
            <option value="Hand">Hand (手)</option>
        </select>
    </div>
    
    <div class="control-group">
        <div class="pos-label"><span>Position X</span><span id="valX">0</span></div>
        <input type="range" id="posX" min="-2" max="2" step="0.01" value="0">
        
        <div class="pos-label"><span>Position Y</span><span id="valY">0</span></div>
        <input type="range" id="posY" min="-2" max="2" step="0.01" value="0">
        
        <div class="pos-label"><span>Position Z</span><span id="valZ">0</span></div>
        <input type="range" id="posZ" min="-2" max="2" step="0.01" value="0">
    </div>
    <p style="font-size: 11px; color: #888;">マウスドラッグでカメラ回転<br>ホイールでズーム</p>
</div>

<!-- Three.js Library -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // シーン設定
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 3);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 照明
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // グリッド
    const grid = new THREE.GridHelper(10, 10);
    scene.add(grid);

    // コントロール
    const controls = new OrbitControls(camera, renderer.domElement);

    // モデル保持用
    const models = { Body: null, Hand: null };

    // データ読み込み関数
    async function loadModel(name, dataString) {
        const loader = new GLTFLoader();
        // Base64またはバイナリ文字列をBlobに変換
        const buffer = Uint8Array.from(atob(dataString.split('base64,')[1] || dataString), c => c.charCodeAt(0));
        const blob = new Blob([buffer], { type: 'model/gltf-binary' });
        const url = URL.createObjectURL(blob);

        return new Promise((resolve) => {
            loader.load(url, (gltf) => {
                models[name] = gltf.scene;
                scene.add(gltf.scene);
                resolve();
            });
        });
    }

    // 提供されたソース（本来は外部ファイルにするのが望ましい）
    // ここでは構造を示すためにプレースホルダとして扱います
    const bodyData = "data:model/gltf-binary;base64,..."; // [source: 2]のバイナリ
    const handData = "data:model/gltf-binary;base64,..."; // [source: 1]のバイナリ

    // --- ダミーの形状作成 (ソースが巨大なため、実行用に簡易形状を生成します) ---
    function createDummy(color, name) {
        const geo = name === 'Body' ? new THREE.BoxGeometry(1, 1.5, 0.5) : new THREE.SphereGeometry(0.3);
        const mat = new THREE.MeshStandardMaterial({ color: color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name = name;
        models[name] = mesh;
        scene.add(mesh);
    }
    createDummy(0x00ff88, 'Body');
    createDummy(0xff4400, 'Hand');
    // ------------------------------------------------------------------

    // UI操作
    const partSelect = document.getElementById('partSelect');
    const sliders = {
        X: document.getElementById('posX'),
        Y: document.getElementById('posY'),
        Z: document.getElementById('posZ')
    };
    const labels = {
        X: document.getElementById('valX'),
        Y: document.getElementById('valY'),
        Z: document.getElementById('valZ')
    };

    function updatePosition() {
        const target = models[partSelect.value];
        if (target) {
            target.position.x = parseFloat(sliders.X.value);
            target.position.y = parseFloat(sliders.Y.value);
            target.position.z = parseFloat(sliders.Z.value);
            
            labels.X.innerText = sliders.X.value;
            labels.Y.innerText = sliders.Y.value;
            labels.Z.innerText = sliders.Z.value;
        }
    }

    Object.values(sliders).forEach(s => s.addEventListener('input', updatePosition));
    partSelect.addEventListener('change', () => {
        const target = models[partSelect.value];
        sliders.X.value = target.position.x;
        sliders.Y.value = target.position.y;
        sliders.Z.value = target.position.z;
        updatePosition();
    });

    // アニメーションループ
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // リサイズ対応
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
