<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Rabbit Knight Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2400 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// プレイヤーをコンテナ（Container）に変更
let playerContainer, body, head, leftHand, rightHand, sword;
let platforms;
let jumpCount = 0;
let isAttacking = false;
let attackTween; // アニメーションを管理

let joyInput = { x: 0, y: 0, active: false };

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'sword.png');
    this.load.image('tile', 'tile_top.png');
}

function create() {
    this.input.addPointer(3);

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 13; i++) {
        platforms.create(32 + (i * 64), 568, 'tile');
    }
    platforms.create(200, 350, 'tile');
    platforms.create(600, 350, 'tile');

    // --- プレイヤーのコンテナ構築 ---
    playerContainer = this.add.container(400, 400);

    // パーツを作成してコンテナに追加（追加順がレイヤー順になる）
    leftHand = this.add.sprite(-40, 10, 'hand').setFlipX(true); // 左手（奥側）
    sword = this.add.sprite(40, 10, 'sword').setOrigin(0.5, 0.9); // 剣（手の下）
    body = this.add.sprite(0, 0, 'body'); // 胴体
    head = this.add.sprite(0, -32, 'head'); // 頭（体の上）
    rightHand = this.add.sprite(40, 10, 'hand'); // 右手（手前側）

    // コンテナへ追加（下から順：左手、剣、胴体、頭、右手）
    playerContainer.add([leftHand, sword, body, head, rightHand]);

    // コンテナ全体に物理演算を適用
    this.physics.world.enable(playerContainer);
    playerContainer.body.setCollideWorldBounds(true);
    playerContainer.body.setDragX(3500); 
    playerContainer.body.setMaxVelocity(400, 1200);
    // 物理ボディのサイズを胴体に合わせる
    playerContainer.body.setSize(body.width, body.height);
    playerContainer.body.setOffset(-body.width/2, -body.height/2);


    this.physics.add.collider(playerContainer, platforms, null, (p, tile) => {
        if (joyInput.y > 0.5 && tile.y > p.y) return false;
        return true;
    });

    // UI作成
    const uiY = 480;
    const joyBase = this.add.circle(120, uiY, 60, 0x000000, 0.1).setDepth(100);
    const joyStick = this.add.circle(120, uiY, 30, 0x000000, 0.2).setDepth(101);

    this.input.on('pointermove', (pointer) => {
        if (pointer.x < 400 && pointer.isDown) {
            const dist = Phaser.Math.Distance.Between(joyBase.x, joyBase.y, pointer.x, pointer.y);
            const angle = Phaser.Math.Angle.Between(joyBase.x, joyBase.y, pointer.x, pointer.y);
            const limitedDist = Math.min(dist, 60);
            joyStick.x = joyBase.x + Math.cos(angle) * limitedDist;
            joyStick.y = joyBase.y + Math.sin(angle) * limitedDist;
            joyInput.x = Math.cos(angle) * (limitedDist / 60);
            joyInput.y = Math.sin(angle) * (limitedDist / 60);
        }
    });

    this.input.on('pointerup', () => {
        joyStick.setPosition(joyBase.x, joyBase.y);
        joyInput = { x: 0, y: 0, active: false };
    });

    const btnJ = this.add.circle(620, uiY - 40, 55, 0x0000ff, 0.2).setInteractive().setDepth(100);
    this.add.text(620, uiY - 40, 'JUMP', {fontSize:'20px', color:'#000'}).setOrigin(0.5).setDepth(101);

    const btnA = this.add.circle(710, uiY + 40, 55, 0xff0000, 0.3).setInteractive().setDepth(100);
    this.add.text(710, uiY + 40, 'ATK', {fontSize:'20px', color:'#000'}).setOrigin(0.5).setDepth(101);

    btnJ.on('pointerdown', () => {
        if (playerContainer.body.touching.down) { jumpCount = 1; playerContainer.body.setVelocityY(-950); }
        else if (jumpCount < 2) { jumpCount++; playerContainer.body.setVelocityY(-850); }
    });

    btnA.on('pointerdown', () => { if (!isAttacking) startAttack(this); });

    this.cursors = this.input.keyboard.createCursorKeys();
}

function startAttack(scene) {
    isAttacking = true;

    // 以前のアニメーションがあれば停止
    if (attackTween) attackTween.stop();

    // 攻撃アニメーション（右手と剣だけを動かす）
    // 斜め上から前方への「切り下ろし」軌道
    attackTween = scene.tweens.timeline({
        tweens: [
            {
                // 1. 振り上げ（タメ）
                targets: [rightHand, sword],
                x: { from: 40, to: 0 },
                y: { from: 10, to: -40 },
                angle: { from: 0, to: -60 }, // 剣を後ろ上へ傾ける
                duration: 60,
                ease: 'Cubic.easeOut'
            },
            {
                // 2. 切り下ろし
                targets: [rightHand, sword],
                x: { from: 0, to: 70 },
                y: { from: -40, to: 30 },
                angle: { from: -60, to: 120 }, // 前方斜め下へ一気に振る
                duration: 150,
                ease: 'Expo.easeOut',
                onComplete: () => {
                    // 3. 元の位置に戻る
                    scene.tweens.add({
                        targets: [rightHand, sword],
                        x: 40, y: 10, angle: 0,
                        duration: 100,
                        ease: 'Cubic.easeIn',
                        onComplete: () => { isAttacking = false; }
                    });
                }
            }
        ]
    });
}

function update() {
    let moveX = (this.cursors.left.isDown ? -1 : (this.cursors.right.isDown ? 1 : joyInput.x));
    if (Math.abs(moveX) > 0.2) {
        playerContainer.body.setAccelerationX(moveX * 4000);
        
        // --- 向き（Flip）の処理 ---
        // コンテナ全体の scaleX を変えることで、全パーツの向きを一括で反転
        if (moveX < 0) {
            playerContainer.setScale(-1, 1); // 左向き
        } else {
            playerContainer.setScale(1, 1); // 右向き
        }
    } else {
        playerContainer.body.setAccelerationX(0);
    }
    if (playerContainer.body.touching.down) jumpCount = 0;

    // --- モーション（アニメーション） ---
    let isMoving = Math.abs(playerContainer.body.velocity.x) > 20;
    let time = this.time.now;
    
    // 待機時の呼吸（コンテナ全体の上下動）
    let idleBounce = !isMoving ? Math.sin(time / 400) * 2 : 0;
    
    // 歩行時の上下動
    let walkCycle = Math.sin(time / 100) * 6;
    let bounceY = (isMoving && playerContainer.body.touching.down) ? walkCycle : idleBounce;
    
    // コンテナ全体の位置に bounceY を適用
    playerContainer.y = 400 + playerContainer.body.deltaY() + bounceY; // deltaYで物理位置補正
    
    // 移動時のわずかな傾き（コンテナ全体）
    let targetAngle = isMoving ? playerContainer.body.velocity.x / 30 : 0;
    playerContainer.setAngle(targetAngle);

    // --- 攻撃時以外の剣の初期位置を保証 ---
    if (!isAttacking) {
        rightHand.setPosition(40, 10);
        sword.setPosition(40, 10);
        sword.setAngle(0);
    }
}
</script>
</body>
</html>
