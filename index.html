<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Penguin Quest - Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.3);
            border-radius: 50%; touch-action: none; border: 3px solid white; z-index: 10;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: white; border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="joystick-container"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        // 色を明るく鮮やかにするための設定
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // ライトをかなり強く設定（グレー対策）
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.0); // 全体を明るく
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x90ee90 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        let dummy, mixer, walkAction, penguin;
        let moveDir = { x: 0, z: 0 };
        const gltfLoader = new GLTFLoader();
        const fbxLoader = new FBXLoader();
        const textureLoader = new THREE.TextureLoader();

        // 1. テクスチャ読み込み
        const penguinTex = textureLoader.load('colormap 2.png', (tex) => {
            tex.colorSpace = THREE.SRGBColorSpace; // テクスチャ自体の色空間も修正
        });
        penguinTex.flipY = false;

        // 2. ペンギンの読み込み
        gltfLoader.load('animal-penguin.glb', (gltf) => {
            penguin = gltf.scene;
            penguin.traverse(child => {
                if (child.isMesh) {
                    // 発光設定（Emissive）を少し足してグレーを飛ばす
                    child.material.map = penguinTex;
                    child.material.emissive = new THREE.Color(0xffffff);
                    child.material.emissiveMap = penguinTex;
                    child.material.emissiveIntensity = 0.2; 
                    child.castShadow = true;
                }
            });

            // 3. FBX（Walking.fbx）の読み込み
            fbxLoader.load('Walking.fbx', (object) => {
                dummy = object;
                dummy.scale.set(0.01, 0.01, 0.01);
                dummy.visible = false; 
                scene.add(dummy);

                mixer = new THREE.AnimationMixer(dummy);
                // アニメーションを確実に取得して即再生
                if (dummy.animations && dummy.animations.length > 0) {
                    walkAction = mixer.clipAction(dummy.animations[0]);
                    walkAction.play();
                    walkAction.setEffectiveWeight(0); // 最初は待機
                    console.log("Animation Loaded!");
                }

                // 骨への接着
                const attach = (partName, boneName) => {
                    const p = penguin.getObjectByName(partName);
                    const b = dummy.getObjectByName(boneName);
                    if (p && b) b.add(p);
                };

                attach('Body', 'mixamorig_Spine');
                attach('Head', 'mixamorig_Head');
                attach('Leg_L', 'mixamorig_LeftLeg');
                attach('Leg_R', 'mixamorig_RightLeg');
                attach('Wing_L', 'mixamorig_LeftArm');
                attach('Wing_R', 'mixamorig_RightArm');

                scene.add(penguin);
            });
        });

        camera.position.set(0, 5, 8);

        // ジョイスティック
        const stick = document.getElementById('joystick-stick');
        const container = document.getElementById('joystick-container');
        let isTouching = false;

        container.addEventListener('touchstart', (e) => { isTouching = true; e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', () => {
            isTouching = false;
            moveDir = { x: 0, z: 0 };
            stick.style.transform = `translate(0, 0)`;
            if (walkAction) walkAction.setEffectiveWeight(0);
        });

        window.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            const rect = container.getBoundingClientRect();
            const touch = e.touches[0];
            const dx = touch.clientX - (rect.left + rect.width/2);
            const dy = touch.clientY - (rect.top + rect.height/2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveDir.x = Math.cos(angle) * (dist/40);
            moveDir.z = Math.sin(angle) * (dist/40);
            
            // ジョイスティックを動かしている間だけアニメーションの重みを1にする
            if (walkAction) walkAction.setEffectiveWeight(1);
        }, { passive: false });

        const clock = new THREE.Clock(); // アニメーションの時間を正確に測る

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta(); // ここを修正：deltaを正しく取得
            if (mixer) mixer.update(delta);

            if (dummy && (moveDir.x !== 0 || moveDir.z !== 0)) {
                dummy.position.x += moveDir.x * 0.1;
                dummy.position.z += moveDir.z * 0.1;
                dummy.rotation.y = Math.atan2(-moveDir.x, -moveDir.z) + Math.PI;
            }

            if (dummy) {
                const targetPos = new THREE.Vector3(dummy.position.x, 5, dummy.position.z + 10);
                camera.position.lerp(targetPos, 0.1);
                camera.lookAt(dummy.position);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
