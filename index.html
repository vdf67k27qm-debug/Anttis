<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pig Game - Joint Rotation Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; touch-action: none; font-family: sans-serif; }
        #move-stick-wrapper {
            position: absolute; bottom: 40px; left: 40px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border-radius: 50%; z-index: 100; border: 2px solid rgba(255,255,255,0.2);
        }
        #move-stick {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            background: #00ff88; border-radius: 50%; transform: translate(-50%, -50%);
        }
        #action-pad {
            position: absolute; bottom: 40px; right: 40px;
            width: 140px; height: 120px; background: rgba(255,255,255,0.1);
            border-radius: 15px; z-index: 100; border: 2px solid rgba(255,255,255,0.2);
            overflow: hidden; display: flex;
        }
        .pad-half { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.3; pointer-events: none; }
        #action-stick {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: #ff4400; border-radius: 50%; transform: translate(-50%, -50%);
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="move-stick-wrapper"><div id="move-stick"></div></div>
<div id="action-pad">
    <div class="pad-half">✋</div>
    <div class="pad-half">✋</div>
    <div id="action-stick"></div>
</div>

<script type="importmap">
    {
        "imports": {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222233);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const sun = new THREE.DirectionalLight(0xffffff, 1.0);
    sun.position.set(5, 10, 5);
    scene.add(sun);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x333333 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    scene.add(new THREE.GridHelper(100, 40, 0x444444, 0x444444));

    const playerGroup = new THREE.Group();
    scene.add(playerGroup);

    const bodyAnchor = new THREE.Group();
    playerGroup.add(bodyAnchor);

    // 腕の関節（ピボット）を作成
    const armPivotL = new THREE.Group();
    const armPivotR = new THREE.Group();
    playerGroup.add(armPivotL, armPivotR);

    const loader = new GLTFLoader();
    const models = {};
    const CONFIG = {
        Shoulder: { x: 0.4, y: 0.7, z: 0 }, // 肩の付け根の位置
        ArmOffset: { z: -0.2 }, // 関節からメッシュをどれだけ前に出すか
        HandOffset: { z: -0.5 },
        RelaxAngle: 0.8, // 未操作時の下向き角度 (ラジアン)
        AttackAngle: -0.5 // 攻撃時の振り上げ角度
    };

    async function initModels() {
        const load = (f) => new Promise(r => loader.load(f, g => r(g.scene)));
        models.Body = await load('Pig_Body.glb');
        models.Arm_L = await load('Pig_Arm.glb');
        models.Arm_R = await load('Pig_Arm.glb');
        models.Hand_L = await load('Pig_Hand.glb');
        models.Hand_R = await load('Pig_Hand.glb');

        bodyAnchor.add(models.Body);
        
        // 関節の中にパーツを配置
        armPivotL.position.set(-CONFIG.Shoulder.x, CONFIG.Shoulder.y, CONFIG.Shoulder.z);
        armPivotL.add(models.Arm_L, models.Hand_L);
        models.Arm_L.position.set(0, 0, CONFIG.ArmOffset.z);
        models.Hand_L.position.set(0, 0, CONFIG.HandOffset.z);

        armPivotR.position.set(CONFIG.Shoulder.x, CONFIG.Shoulder.y, CONFIG.Shoulder.z);
        armPivotR.add(models.Arm_R, models.Hand_R);
        models.Arm_R.position.set(0, 0, CONFIG.ArmOffset.z);
        models.Hand_R.position.set(0, 0, CONFIG.HandOffset.z);

        playerGroup.position.y = 0.5; 
    }
    initModels();

    let moveInput = new THREE.Vector2();
    let actionInput = new THREE.Vector2();

    const moveWrapper = document.getElementById('move-stick-wrapper');
    const moveStick = document.getElementById('move-stick');

    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if (t.clientX < window.innerWidth/2) {
                const rect = moveWrapper.getBoundingClientRect();
                const dx = t.clientX - (rect.left + 50);
                const dy = t.clientY - (rect.top + 50);
                const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                moveStick.style.left = `${50 + (dx/dist)*dist}px`;
                moveStick.style.top = `${50 + (dy/dist)*dist}px`;
                moveInput.set(dx/40, -dy/40);
            } else {
                const pad = document.getElementById('action-pad');
                const rect = pad.getBoundingClientRect();
                const dx = t.clientX - (rect.left + rect.width/2);
                const dy = t.clientY - (rect.top + rect.height/2);
                document.getElementById('action-stick').style.left = `${70 + Math.max(-50, Math.min(50, dx))}px`;
                document.getElementById('action-stick').style.top = `${60 + Math.max(-40, Math.min(40, dy))}px`;
                actionInput.set(dx/50, -dy/40);
            }
        }
    });

    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) {
            if (t.clientX < window.innerWidth/2) {
                moveInput.set(0,0);
                moveStick.style.left = '50%'; moveStick.style.top = '50%';
            } else {
                actionInput.set(0,0);
                document.getElementById('action-stick').style.left = '50%';
                document.getElementById('action-stick').style.top = '50%';
            }
        }
    });

    function animate() {
        requestAnimationFrame(animate);

        if (moveInput.length() > 0.1) {
            playerGroup.position.x += moveInput.x * 0.12;
            playerGroup.position.z -= moveInput.y * 0.12;
            const targetAngle = Math.atan2(moveInput.x, moveInput.y);
            playerGroup.rotation.y = THREE.MathUtils.lerp(playerGroup.rotation.y, targetAngle, 0.15);
            bodyAnchor.rotation.x -= moveInput.length() * 0.5;
        }

        // 腕の回転制御
        if (models.Arm_L) {
            const upIntensity = Math.max(0, actionInput.y); // 上に倒した分だけ振り上げる
            
            // 左腕の計算
            const leftActive = actionInput.x < 0.3;
            const targetRotL = leftActive ? 
                THREE.MathUtils.lerp(CONFIG.RelaxAngle, CONFIG.AttackAngle, upIntensity) : CONFIG.RelaxAngle;
            armPivotL.rotation.x = THREE.MathUtils.lerp(armPivotL.rotation.x, targetRotL, 0.2);

            // 右腕の計算
            const rightActive = actionInput.x > -0.3;
            const targetRotR = rightActive ? 
                THREE.MathUtils.lerp(CONFIG.RelaxAngle, CONFIG.AttackAngle, upIntensity) : CONFIG.RelaxAngle;
            armPivotR.rotation.x = THREE.MathUtils.lerp(armPivotR.rotation.x, targetRotR, 0.2);
        }

        camera.position.lerp(playerGroup.position.clone().add(new THREE.Vector3(0, 7, 8)), 0.1);
        camera.lookAt(playerGroup.position);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
