<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Combat Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2000 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, leftHand, rightHand, sword, platforms;
let isLeft = false, isRight = false, isJump = false, isAttack = false;
let jumpCount = 0;
let isAttacking = false;

function preload() {
    this.load.image('body', 'character_roundRed.png');
    this.load.image('hand', 'character_handRed.png');
    this.load.image('tile', 'tile_top.png');
    this.load.image('sword', 'item_sword.png');
}

function create() {
    // 【地面・足場の作成】
    platforms = this.physics.add.staticGroup();
    // タイルを並べて床を作る
    for (let i = 0; i < 13; i++) {
        platforms.create(32 + (i * 64), 568, 'tile');
    }
    // 空中の足場
    platforms.create(200, 350, 'tile');
    platforms.create(600, 350, 'tile');

    // 【プレイヤーと装備】
    player = this.physics.add.sprite(400, 400, 'body');
    player.setCollideWorldBounds(true);
    player.setDragX(2500); // スライドしすぎないよう抵抗を強く

    leftHand = this.add.sprite(0, 0, 'hand');
    rightHand = this.add.sprite(0, 0, 'hand');
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 1); // 剣の根元を支点にする

    this.physics.add.collider(player, platforms);

    // 【UIボタン】
    const uiY = 520;
    const btnL = this.add.circle(80, uiY, 40, 0x000000, 0.1).setInteractive();
    this.add.text(70, uiY-15, '←', {fontSize:'30px', color:'#000'});
    
    const btnR = this.add.circle(180, uiY, 40, 0x000000, 0.1).setInteractive();
    this.add.text(170, uiY-15, '→', {fontSize:'30px', color:'#000'});

    const btnJ = this.add.circle(620, uiY, 45, 0x0000ff, 0.2).setInteractive();
    this.add.text(595, uiY-10, 'JUMP', {fontSize:'18px', color:'#000', fontWeight:'bold'});

    const btnA = this.add.circle(720, uiY, 45, 0xff0000, 0.3).setInteractive();
    this.add.text(695, uiY-10, 'ATTACK', {fontSize:'16px', color:'#000', fontWeight:'bold'});

    // イベント登録
    btnL.on('pointerdown', () => isLeft = true);
    btnL.on('pointerup', () => isLeft = false);
    btnR.on('pointerdown', () => isRight = true);
    btnR.on('pointerup', () => isRight = false);
    
    btnJ.on('pointerdown', () => {
        if (player.body.touching.down) {
            jumpCount = 1;
            player.setVelocityY(-850);
        } else if (jumpCount < 2) { // 2段ジャンプ
            jumpCount++;
            player.setVelocityY(-750);
        }
    });

    btnA.on('pointerdown', () => attack(this));

    this.cursors = this.input.keyboard.createCursorKeys();
}

function attack(scene) {
    if (isAttacking) return;
    isAttacking = true;

    scene.tweens.add({
        targets: sword,
        angle: player.flipX ? -90 : 90,
        duration: 100,
        yoyo: true,
        onComplete: () => {
            isAttacking = false;
            sword.angle = 0;
        }
    });
}

function update() {
    // 移動ロジック
    if (isLeft || this.cursors.left.isDown) {
        player.setAccelerationX(-3000);
        player.setFlipX(true);
    } else if (isRight || this.cursors.right.isDown) {
        player.setAccelerationX(3000);
        player.setFlipX(false);
    } else {
        player.setAccelerationX(0);
    }

    // 地面にいたらジャンプ回数リセット
    if (player.body.touching.down) {
        jumpCount = 0;
    }

    // パーツの追従とアニメーション
    let walkCycle = Math.sin(this.time.now / 100) * 4;
    let isMoving = Math.abs(player.body.velocity.x) > 10;
    
    // 移動中のみ上下に揺らす（歩きアニメ）
    let currentY = player.y + (isMoving ? walkCycle : 0);
    
    let side = player.flipX ? 1 : -1;
    leftHand.setPosition(player.x + (30 * side), currentY + 10);
    rightHand.setPosition(player.x - (30 * side), currentY + 10);
    
    // 剣を右手に持たせる
    sword.setPosition(rightHand.x, rightHand.y);
    sword.setFlipX(player.flipX);
    
    // 移動時に体を少し傾ける
    if (isMoving) {
        player.angle = player.body.velocity.x / 20;
    } else {
        player.angle = 0;
    }
}
</script>
</body>
</html>
