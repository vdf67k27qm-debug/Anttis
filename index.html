<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kunya System</title>
<style>
body { margin:0; overflow:hidden; background:#111; }

/* ジョイスティック */
#joy {
  position: fixed;
  bottom: 40px;
  left: 40px;
  width: 130px;
  height: 130px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
}

#knob {
  position:absolute;
  top:40px;
  left:40px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:white;
}
</style>
</head>
<body>

<div id="joy"><div id="knob"></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* =======================
   基本セットアップ
======================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 7, 9);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

/* =======================
   地面
======================= */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x333333})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* =======================
   プレイヤー
======================= */
const player = new THREE.Group();
scene.add(player);

let parts = {
  body:null,
  armL:null,
  armR:null,
  legL:null,
  legR:null
};

/* =======================
   モデル読み込み
======================= */
new GLTFLoader().load("Base.glb", (gltf)=>{
  const model = gltf.scene;

  model.traverse(obj=>{
    if(!obj.isMesh) return;

    if(obj.name === "Body") parts.body = obj;
    if(obj.name === "Arm_L") parts.armL = obj;
    if(obj.name === "Arm_R") parts.armR = obj;
    if(obj.name === "Leg_L") parts.legL = obj;
    if(obj.name === "Leg_R") parts.legR = obj;
  });

  player.add(model);
});

/* =======================
   ジョイスティック
======================= */
let input = {x:0, z:0};

const joy = document.getElementById("joy");
const knob = document.getElementById("knob");

let active = false;

joy.addEventListener("touchstart", e=>{
  active = true;
});

window.addEventListener("touchmove", e=>{
  if(!active) return;

  const t = e.touches[0];
  const rect = joy.getBoundingClientRect();

  const dx = t.clientX - (rect.left+65);
  const dy = t.clientY - (rect.top+65);

  const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 55);
  const ang = Math.atan2(dy, dx);

  knob.style.transform =
    `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;

  input.x = Math.cos(ang)*(dist/55);
  input.z = Math.sin(ang)*(dist/55);
});

window.addEventListener("touchend", ()=>{
  active = false;
  knob.style.transform = "translate(0,0)";
  input = {x:0,z:0};
});

/* =======================
   くにゃ物理
======================= */
let velocity = new THREE.Vector3();
let targetVelocity = new THREE.Vector3();

const clock = new THREE.Clock();

/* =======================
   メインループ
======================= */
function animate(){
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  /* --- 移動 --- */
  targetVelocity.set(input.x*6, 0, input.z*6);

  velocity.lerp(targetVelocity, 0.12); // 遅延
  velocity.multiplyScalar(0.94);       // 摩擦

  player.position.add(velocity.clone().multiplyScalar(dt));

  const speed = velocity.length();

  /* --- 向き --- */
  if(speed > 0.05){
    const rot = Math.atan2(velocity.x, velocity.z);
    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, rot, 0.12);
  }

  /* =======================
     くにゃ挙動
  ======================= */

  // 伸び縮み
  player.scale.y = 1 + speed * 0.25;
  player.scale.x = 1 - speed * 0.12;
  player.scale.z = 1 - speed * 0.12;

  // バウンド
  player.position.y = Math.abs(Math.sin(time*8)) * speed * 0.25;

  // 横にしなる
  if(parts.body){
    parts.body.rotation.z = -velocity.x * 0.15;
  }

  // 止まった時プルプル
  if(speed < 0.1 && parts.body){
    parts.body.scale.y = 1 + Math.sin(time*6)*0.05;
  }

  // 腕
  if(parts.armL){
    parts.armL.rotation.x = Math.sin(time*10)*speed*1.5;
  }
  if(parts.armR){
    parts.armR.rotation.x = -Math.sin(time*10)*speed*1.5;
  }

  // 足
  if(parts.legL){
    parts.legL.rotation.x = -Math.sin(time*10)*speed*1.2;
  }
  if(parts.legR){
    parts.legR.rotation.x = Math.sin(time*10)*speed*1.2;
  }

  /* --- カメラ --- */
  const camTarget = new THREE.Vector3(
    player.position.x,
    6,
    player.position.z + 8
  );

  camera.position.lerp(camTarget, 0.08);
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

animate();

/* =======================
   リサイズ
======================= */
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
