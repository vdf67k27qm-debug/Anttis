<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Party Animals Physics Test</title>
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 1. シーン・カメラ・レンダラーのセットアップ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 5, 2);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 2. モデルの読み込み ---
        const loader = new GLTFLoader();
        loader.load('./Demo.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            // 各パーツにアクセスできるか確認
            model.traverse((child) => {
                if (child.isMesh) {
                    console.log("パーツ発見:", child.name);
                    // ここで child.name が "Body" や "Arm_L" になっているはずです
                }
            });

            // ここに物理演算のセットアップ（ラグドール化）を記述していきます
            setupPhysics(model);
        });

        // --- 3. 物理演算の簡易セットアップ（概念） ---
        function setupPhysics(model) {
            // 本来はここで Cannon.js 等を使って各パーツに「重さ」と「衝突判定」を与え、
            // パーツ間を「ジョイント（関節）」で繋ぎます。
            console.log("物理演算を適用する準備ができました");
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, animate);
        }
        animate();
    </script>
</body>
</html>
