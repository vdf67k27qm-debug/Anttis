<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Stable Final</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; }
        #joystick-base { 
            position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 100;
        }
        #joystick-stick { 
            position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; 
            background: rgba(255,255,255,0.4); border-radius: 50%; 
        }
    </style>
</head>
<body>
    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/loaders/GLTFLoader": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        // --- 確定した黄金の数値 ---
        const S = 0.5;
        const POS = {
            Arm_R: { x: -0.25, y: -0.15 },
            Arm_L: { x: 0.25,  y: -0.15 },
            Leg_R: { x: -0.12, y: -0.2 },
            Leg_L: { x: 0.12,  y: -0.2 }
        };

        const loader = new GLTFLoader();
        const pivots = {};

        // 全パーツをロードするまで待機
        async function init() {
            const names = ['Body', 'Arm_R', 'Arm_L', 'Leg_R', 'Leg_L'];
            const promises = names.map(name => loader.loadAsync(`./${name}.glb`));
            const results = await Promise.all(promises);

            results.forEach((gltf, i) => {
                const name = names[i];
                const model = gltf.scene;
                model.scale.set(S, S, S);

                const pivot = new THREE.Group();
                if (name !== 'Body') {
                    pivot.position.set(POS[name].x, POS[name].y, 0);
                    // モデルを少し下げることで、回転軸を「付け根」に持ってくる
                    model.position.y = -0.1; 
                }
                pivot.add(model);
                pivots[name] = pivot;
                playerGroup.add(pivot);
            });

            animate();
        }

        // --- 操作系 ---
        let moveX = 0, moveZ = 0, power = 0;
        const stick = document.getElementById('joystick-stick');
        const base = document.getElementById('joystick-base');

        const updateJoystick = (e) => {
            const touch = e.touches[0];
            const rect = base.getBoundingClientRect();
            const dx = touch.clientX - (rect.left + rect.width / 2);
            const dy = touch.clientY - (rect.top + rect.height / 2);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);

            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            power = dist / 50;
            moveX = Math.cos(angle) * power * 0.12;
            moveZ = Math.sin(angle) * power * 0.12;
        };

        window.addEventListener('touchstart', updateJoystick);
        window.addEventListener('touchmove', updateJoystick);
        window.addEventListener('touchend', () => {
            stick.style.transform = `translate(0,0)`;
            moveX = 0; moveZ = 0; power = 0;
        });

        let walkTime = 0;
        function animate() {
            requestAnimationFrame(animate);

            if (power > 0.1) {
                // 移動と回転（向き）
                playerGroup.position.x += moveX;
                playerGroup.position.z += moveZ;
                playerGroup.rotation.y = Math.atan2(-moveX, -moveZ) + Math.PI;

                // アニメーション定数
                walkTime += power * 0.2;
                const swing = Math.sin(walkTime * 10);
                const stepUp = Math.abs(Math.cos(walkTime * 10)) * 0.1;

                // 足の交互回転（Pivotで回す）
                pivots['Leg_R'].rotation.x = swing * 0.6;
                pivots['Leg_L'].rotation.x = -swing * 0.6;

                // 腕の連動
                pivots['Arm_R'].rotation.x = -swing * 0.4;
                pivots['Arm_L'].rotation.x = swing * 0.4;

                // 胴体のバウンド
                pivots['Body'].position.y = stepUp;
                pivots['Body'].rotation.z = -swing * 0.05;
            } else {
                // 停止時：初期ポーズにスムーズに戻す
                Object.values(pivots).forEach(p => {
                    p.rotation.x *= 0.9;
                    p.rotation.z *= 0.9;
                });
                pivots['Body'].position.y *= 0.9;
            }

            // カメラ追従
            camera.position.set(playerGroup.position.x, 5, playerGroup.position.z + 8);
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
