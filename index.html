<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Project - Stable Loader</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; color: #0f0; padding: 10px; font-family: monospace; pointer-events: none; font-size: 12px; }
        .joy-base { position: absolute; bottom: 50px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); pointer-events: auto; }
        .joy-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #FFD700; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui-layer">System Status: Booting...</div>
    <div id="move-joy" class="joy-base"><div class="joy-knob"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const ui = document.getElementById('ui-layer');
        const log = (m) => { ui.innerHTML += `<br>> ${m}`; console.log(m); };

        // --- ドキュメント流のConfig設定 ---
        const config = {
            game: { speed: 0.15, rotationSpeed: 0.2 },
            model: { scale: 1.0 },
            files: { body: 'Snail.glb', shell: 'Shell.glb' }
        };

        let scene, camera, renderer, snailPlayer, moveInput = { x: 0, z: 0 };
        const loader = new THREE.GLTFLoader();

        // --- 1. モデル読み込み（Promiseによる完全同期） ---
        const loadAsset = (url) => {
            return new Promise((resolve, reject) => {
                loader.load(url, (gltf) => resolve(gltf.scene), undefined, (e) => reject(url));
            });
        };

        async function initGame() {
            log("Loading assets...");
            try {
                // 胴体と殻を同時に読み込むまで待つ
                const [body, shell] = await Promise.all([
                    loadAsset(config.files.body),
                    loadAsset(config.files.shell)
                ]);

                log("Assets Loaded. Initializing Scene...");
                setupScene();

                // カタツムリグループの構築
                snailPlayer = new THREE.Group();
                const motionContainer = new THREE.Group(); // 揺れ用の中間階層
                
                body.scale.setScalar(config.model.scale);
                shell.scale.setScalar(config.model.scale);
                
                motionContainer.add(body);
                motionContainer.add(shell);
                snailPlayer.add(motionContainer);
                scene.add(snailPlayer);

                setupJoystick();
                animate();
                log("Game Ready.");
            } catch (err) {
                log(`FATAL ERROR: File "${err}" not found.`);
            }
        }

        function setupScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 8);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(5, 10, 5);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));
            scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
        }

        function setupJoystick() {
            const joy = document.getElementById('move-joy');
            const knob = joy.querySelector('.joy-knob');
            const handle = (e) => {
                e.preventDefault();
                const t = e.touches[0];
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + 60);
                const dy = t.clientY - (r.top + 60);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                const a = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                moveInput = { x: Math.cos(a) * (d/40), z: Math.sin(a) * (d/40) };
            };
            joy.addEventListener('touchstart', handle);
            joy.addEventListener('touchmove', handle);
            joy.addEventListener('touchend', () => {
                knob.style.transform = `translate(0,0)`;
                moveInput = { x: 0, z: 0 };
            });
        }

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.05;

            if (moveInput.x !== 0 || moveInput.z !== 0) {
                // 移動と回転
                snailPlayer.position.x += moveInput.x * config.game.speed;
                snailPlayer.position.z += moveInput.z * config.game.speed;
                const targetAngle = Math.atan2(-moveInput.x, -moveInput.z);
                snailPlayer.rotation.y = THREE.MathUtils.lerp(snailPlayer.rotation.y, targetAngle, config.game.rotationSpeed);

                // 自然なモーション（motionContainerを揺らす）
                const mc = snailPlayer.children[0];
                mc.rotation.x = Math.sin(time * 8) * 0.1;
                mc.position.y = Math.abs(Math.sin(time * 8)) * 0.05;
            }

            camera.position.lerp(new THREE.Vector3(snailPlayer.position.x, 5, snailPlayer.position.z + 8), 0.1);
            camera.lookAt(snailPlayer.position);
            renderer.render(scene, camera);
        }

        initGame();
    </script>
</body>
</html>
