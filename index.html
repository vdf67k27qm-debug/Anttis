<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scribble Battle - Final Adjustments</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #333; touch-action: none; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#ffffff',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 2400 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let playerMain, body, head, leftHand, rightHand, sword, platforms;
let jumpCount = 0;
let isAttacking = false;
let attackProgress = 0;
let joyInput = { x: 0, y: 0, active: false };

function preload() {
    this.load.image('head', 'rabbit_head.png');
    this.load.image('body', 'rabbit_body.png');
    this.load.image('hand', 'rabbit_hand.png');
    this.load.image('sword', 'sword.png');
    this.load.image('tile', 'tile_top.png');
}

function create() {
    const scene = this;
    this.input.addPointer(3);

    const worldWidth = 2000;
    const worldHeight = 800;

    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 32; i++) {
        platforms.create(32 + (i * 64), 750, 'tile');
    }
    platforms.create(400, 550, 'tile');
    platforms.create(800, 400, 'tile');
    platforms.create(1200, 550, 'tile');

    playerMain = this.add.container(400, 600);
    body = this.add.sprite(0, 0, 'body');
    head = this.add.sprite(0, -32, 'head');
    playerMain.add([body, head]);
    playerMain.setDepth(11);

    this.physics.world.enable(playerMain);
    playerMain.body.setCollideWorldBounds(true);
    playerMain.body.setDragX(3500); 
    playerMain.body.setMaxVelocity(400, 1200);
    playerMain.body.setSize(60, 80);
    playerMain.body.setOffset(-30, -40);

    leftHand = this.add.sprite(0, 0, 'hand').setDepth(10);
    sword = this.add.sprite(0, 0, 'sword').setOrigin(0.5, 0.9).setDepth(12);
    rightHand = this.add.sprite(0, 0, 'hand').setDepth(13);

    // 【修正】地面すり抜け機能を削除（単純なコライダーに）
    this.physics.add.collider(playerMain, platforms);

    this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
    this.cameras.main.startFollow(playerMain, true, 0.1, 0.1);

    const setupUI = () => {
        const uiY = 480;
        const joyBase = this.add.circle(120, uiY, 60, 0x000000, 0.1).setScrollFactor(0).setDepth(100);
        const joyStick = this.add.circle(120, uiY, 30, 0x000000, 0.2).setScrollFactor(0).setDepth(101);

        this.input.on('pointermove', (pointer) => {
            if (pointer.x < 400 && pointer.isDown) {
                const dist = Phaser.Math.Distance.Between(120, uiY, pointer.x, pointer.y);
                const angle = Phaser.Math.Angle.Between(120, uiY, pointer.x, pointer.y);
                const limitedDist = Math.min(dist, 60);
                joyStick.x = 120 + Math.cos(angle) * limitedDist;
                joyStick.y = uiY + Math.sin(angle) * limitedDist;
                joyInput.x = Math.cos(angle) * (limitedDist / 60);
                joyInput.y = Math.sin(angle) * (limitedDist / 60);
            }
        });

        this.input.on('pointerup', (pointer) => {
            if (pointer.x < 400) {
                joyStick.setPosition(120, uiY);
                joyInput = { x: 0, y: 0, active: false };
            }
        });

        const btnJ = this.add.circle(620, uiY - 40, 55, 0x0000ff, 0.2).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(620, uiY - 40, 'JUMP', {fontSize:'20px', color:'#000'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

        const btnA = this.add.circle(710, uiY + 40, 55, 0xff0000, 0.3).setInteractive().setScrollFactor(0).setDepth(100);
        this.add.text(710, uiY + 40, 'ATK', {fontSize:'20px', color:'#000'}).setOrigin(0.5).setScrollFactor(0).setDepth(101);

        btnJ.on('pointerdown', () => {
            if (playerMain.body.touching.down) {
                jumpCount = 1;
                playerMain.body.setVelocityY(-1000);
            } else if (jumpCount < 2) {
                jumpCount++;
                playerMain.body.setVelocityY(-900);
            }
        });

        btnA.on('pointerdown', () => {
            if (!isAttacking) startAttack(scene);
        });
    };
    setupUI();

    this.cursors = this.input.keyboard.createCursorKeys();
}

function startAttack(scene) {
    isAttacking = true;
    attackProgress = 0;
    scene.tweens.add({
        targets: { val: 0 },
        val: 1,
        duration: 200, // 少し速くして鋭さを出しました
        ease: 'Cubic.easeOut',
        onUpdate: (tween) => { attackProgress = tween.getValue(); },
        onComplete: () => { isAttacking = false; attackProgress = 0; }
    });
}

function update() {
    let moveX = (this.cursors.left.isDown ? -1 : (this.cursors.right.isDown ? 1 : joyInput.x));
    
    if (Math.abs(moveX) > 0.2) {
        playerMain.body.setAccelerationX(moveX * 4000);
        playerMain.setScale(moveX < 0 ? -1 : 1, 1);
    } else {
        playerMain.body.setAccelerationX(0);
    }
    
    if (playerMain.body.touching.down) jumpCount = 0;

    let time = this.time.now;
    let isMoving = Math.abs(playerMain.body.velocity.x) > 20;
    let bounceY = isMoving ? Math.sin(time / 100) * 8 : Math.sin(time / 400) * 2;
    
    body.y = bounceY;
    head.y = -32 + bounceY;
    playerMain.setAngle(isMoving ? playerMain.body.velocity.x / 20 : 0);

    let side = playerMain.scaleX;
    let px = playerMain.x;
    let py = playerMain.y;

    leftHand.setPosition(px - (40 * side), py + 10 + bounceY);
    leftHand.setAngle(playerMain.angle);
    leftHand.setScale(side, 1);

    if (!isAttacking) {
        rightHand.setPosition(px + (40 * side), py + 10 + bounceY);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setAngle(playerMain.angle);
        // 【修正】剣を縦に伸ばす (1 -> 1.3)
        sword.setScale(side, 1.3);
    } else {
        let swingAngle, offsetX, offsetY;
        if (attackProgress < 0.2) {
            let p = attackProgress / 0.2;
            swingAngle = p * -80; // 振りかぶりを大きく
            offsetX = 40 - (p * 20);
            offsetY = 10 - (p * 30);
        } else {
            let p = (attackProgress - 0.2) / 0.8;
            // 【修正】振り下ろし角度を 210° まで拡大（斜め下までしっかり下りる）
            swingAngle = -80 + (p * 290); 
            offsetX = 20 + (p * 65);
            offsetY = -20 + (p * 60);
        }
        rightHand.setPosition(px + (offsetX * side), py + offsetY + bounceY);
        sword.setPosition(rightHand.x, rightHand.y);
        sword.setAngle((swingAngle * side) + playerMain.angle);
        // 【修正】攻撃中も剣を伸ばす
        sword.setScale(side, 1.3);
    }
}
</script>
</body>
</html>
