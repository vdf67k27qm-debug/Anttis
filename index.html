<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sento Final Test</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; }
        #status { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.8); font-size: 14px; padding: 10px; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status">Status: Initializing...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        var statusBox = document.getElementById('status');
        function log(msg) { statusBox.innerText = "Status: " + msg; console.log(msg); }

        try {
            log("Three.js Loaded. Starting Scene...");
            
            var scene = new THREE.Scene();
            scene.background = new THREE.Color(0x444444);
            
            var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 3);

            var renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            var light = new THREE.AmbientLight(0xffffff, 2);
            scene.add(light);

            log("Loading Base.glb...");
            
            var loader = new THREE.GLTFLoader();
            // ./ をつけて、同じ階層にあることを明示
            loader.load('./Base.glb', function(gltf) {
                log("✅ SUCCESS! Model Displayed.");
                scene.add(gltf.scene);
            }, function(xhr) {
                if (xhr.total > 0) {
                    log("Downloading: " + Math.round(xhr.loaded / xhr.total * 100) + "%");
                }
            }, function(err) {
                log("❌ ERROR: Could not find 'Base.glb'. Check filename/path.");
            });

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();

        } catch (e) {
            log("⚠️ CRITICAL ERROR: " + e.message);
        }
    </script>
</body>
</html>
