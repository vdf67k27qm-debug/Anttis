<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snail Adventure - Club Action Refined</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui-container { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .joystick-base {
            position: absolute; width: 130px; height: 130px;
            background: rgba(255, 255, 255, 0.1); border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; opacity: 0.6; pointer-events: auto;
        }
        .joystick-knob {
            position: absolute; top: 35px; left: 35px; width: 60px; height: 60px;
            background: radial-gradient(circle, #fff, #ccc); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        #move-joy { bottom: 50px; left: 40px; }
        #dash-joy { bottom: 180px; right: 40px; border-color: rgba(255, 100, 100, 0.3); }
        #attack-joy { bottom: 50px; right: 40px; border-color: rgba(100, 200, 255, 0.3); }
        
        .cd-svg { width: 60px; height: 60px; transform: rotate(-90deg); position: absolute; pointer-events: none; }
        .cd-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .cd-bar { fill: none; stroke: #fff; stroke-width: 6; stroke-dasharray: 170; stroke-dashoffset: 170; }

        .side-btn {
            position: absolute; left: 20px; width: 60px; height: 45px;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff;
            border-radius: 5px; pointer-events: auto; font-size: 10px;
        }
        #camera-btn { top: 20px; }
    </style>
</head>
<body>

    <div id="ui-container">
        <div id="move-joy" class="joystick-base"><div id="move-knob" class="joystick-knob"></div></div>
        <div id="dash-joy" class="joystick-base">
            <div id="dash-knob" class="joystick-knob">
                <svg class="cd-svg"><circle class="cd-bg" cx="30" cy="30" r="27"/><circle id="cd-gauge" class="cd-bar" cx="30" cy="30" r="27"/></svg>
                <span id="dash-label" style="color:#333; font-size:10px; font-weight:bold; z-index:11;">DASH</span>
            </div>
        </div>
        <div id="attack-joy" class="joystick-base">
            <div id="attack-knob" class="joystick-knob">
                <span id="attack-label" style="color:#333; font-size:10px; font-weight:bold;">THROW</span>
            </div>
        </div>
        <button id="camera-btn" class="side-btn">視点切替</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const config = {
            models: {
                body: { file: 'Snail.glb', pos: [0, 0, 0] },
                shell: { file: 'Shell.glb', pos: [0, 0.25, -0.25] },
                club: { file: 'Club.glb', equipPos: [0, 1.2, -0.3], scale: 0.7 },
                dashShell: { file: 'Shell_dash.glb', scale: 1.2, pivotPos: [0, 0.65, 0], modelOffset: [0, -0.3, 0], rotateAxis: 'x', rotateSpeed: 15.0 }
            },
            game: {
                dashDuration: 0.4, dashCooldown: 8.0, dashSpeed: 15.0, dashAimLineWidth: 0.6,
                clubPickupTime: 0.8,
                throwAimLength: 12.0,
                throwAimWidth: 0.4,
                throwForce: 25.0,
                throwUpwardForce: 0.2,
                clubAirRotateSpeed: 20.0
            }
        };

        const state = {
            isLoaded: false, camMode: 1,
            isAimingDash: false, isAimingAttack: false,
            isDashing: false, dashTimer: 0, dashCooldownTimer: 0, dashRot: 0,
            moveInput: { x: 0, z: 0 }, dashInput: { x: 0, z: 0 }, attackInput: { x: 0, z: 0 },
            clubState: 'ground',
            pickupTimer: 0,
            clubVel: new THREE.Vector3(),
            clubRot: 0,
            throwAnimTimer: 0 
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(15, 30, 15);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(100, 50, 0x444444, 0x444444));

        const snailPlayer = new THREE.Group();
        scene.add(snailPlayer);
        const dashPivot = new THREE.Group();
        snailPlayer.add(dashPivot);

        const pickupCircle = new THREE.Mesh(
            new THREE.RingGeometry(0.8, 1.0, 32),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide })
        );
        pickupCircle.rotation.x = -Math.PI/2;
        scene.add(pickupCircle);

        const pickupGauge = new THREE.Mesh(
            new THREE.RingGeometry(0.8, 1.0, 32, 1, 0, 0),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
        );
        pickupGauge.rotation.x = -Math.PI/2;
        scene.add(pickupGauge);

        const loadedModels = {};
        const manager = new THREE.LoadingManager();
        manager.onLoad = () => {
            state.isLoaded = true;
            if (loadedModels.dashShell) {
                dashPivot.add(loadedModels.dashShell);
                loadedModels.dashShell.position.set(...config.models.dashShell.modelOffset); 
                dashPivot.position.set(...config.models.dashShell.pivotPos);
            }
            loadedModels.club.position.set(5, 0.3, 5);
            loadedModels.club.rotation.set(Math.PI/2, 0, 0); 
            scene.add(loadedModels.club);
        };
        const gltfLoader = new GLTFLoader(manager);

        Object.entries(config.models).forEach(([key, info]) => {
            gltfLoader.load(info.file, (gltf) => {
                const model = gltf.scene;
                model.traverse(n => { if(n.isMesh) { n.castShadow = true; n.receiveShadow = true; }});
                if (info.scale) model.scale.setScalar(info.scale);
                loadedModels[key] = model;
                if (key === 'body' || key === 'shell') {
                    snailPlayer.add(model);
                    model.position.set(...(info.pos || [0,0,0]));
                }
            });
        });

        const dustParticles = [];

        const throwAimLine = new THREE.Mesh(
            new THREE.CylinderGeometry(config.game.throwAimWidth, config.game.throwAimWidth, config.game.throwAimLength, 8).rotateX(Math.PI/2).translate(0, 0, config.game.throwAimLength/2),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 })
        );
        scene.add(throwAimLine);

        const dashDist = config.game.dashSpeed * config.game.dashDuration;
        const dashAimLine = new THREE.Mesh(
            new THREE.CylinderGeometry(config.game.dashAimLineWidth, config.game.dashAimLineWidth, dashDist, 8).rotateX(Math.PI/2).translate(0, 0, dashDist/2),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 })
        );
        scene.add(dashAimLine);

        function setupJoy(id, knobId, onMove, onEnd) {
            const joy = document.getElementById(id), knob = document.getElementById(knobId);
            let active = false, tid = null;
            joy.addEventListener('touchstart', (e) => { active = true; tid = e.changedTouches[0].identifier; e.preventDefault(); }, {passive: false});
            window.addEventListener('touchmove', (e) => {
                const t = Array.from(e.touches).find(v => v.identifier === tid);
                if (!active || !t) return;
                const r = joy.getBoundingClientRect();
                const dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50), ang = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d}px)`;
                onMove(Math.cos(ang)*(d/50), Math.sin(ang)*(d/50), d);
            }, {passive: false});
            window.addEventListener('touchend', (e) => {
                if (Array.from(e.changedTouches).some(v => v.identifier === tid)) {
                    active = false; knob.style.transform = "translate(0,0)"; onEnd();
                }
            });
        }

        setupJoy('move-joy', 'move-knob', (x, z) => { state.moveInput = {x, z}; }, () => { state.moveInput = {x:0,z:0}; });
        setupJoy('dash-joy', 'dash-knob', (x, z, d) => { 
            state.dashInput = {x, z}; state.isAimingDash = d > 15; 
        }, () => { 
            if (state.isAimingDash && state.dashCooldownTimer <= 0 && !state.isDashing) {
                if (state.clubState === 'equipped') {
                    state.clubState = 'thrown';
                    const club = loadedModels.club;
                    scene.attach(club);
                    // ダッシュ時のドロップ慣性を極限まで低く修正(0.01)
                    const dropDir = new THREE.Vector3(state.dashInput.x, 0.2, state.dashInput.z).normalize();
                    state.clubVel.copy(dropDir).multiplyScalar(config.game.dashSpeed * 0.01); 
                }
                state.isDashing = true; state.dashTimer = config.game.dashDuration;
                state.dashCooldownTimer = config.game.dashCooldown; state.dashDir = { ...state.dashInput };
            }
            state.isAimingDash = false; 
        });
        setupJoy('attack-joy', 'attack-knob', (x, z, d) => { 
            state.attackInput = {x, z}; 
            if(state.clubState === 'equipped') state.isAimingAttack = d > 15; 
        }, () => { 
            if (state.isAimingAttack && state.clubState === 'equipped') throwClub();
            state.isAimingAttack = false; 
        });

        document.getElementById('camera-btn').addEventListener('click', () => { state.camMode = (state.camMode + 1) % 3; });

        function throwClub() {
            state.clubState = 'thrown';
            state.throwAnimTimer = 0.2; // 伸び上がり時間
            const club = loadedModels.club;
            scene.attach(club);
            // 投げはしっかりと自然に飛ぶように力を維持
            const dir = new THREE.Vector3(state.attackInput.x, config.game.throwUpwardForce, state.attackInput.z).normalize();
            state.clubVel.copy(dir).multiplyScalar(config.game.throwForce);
            club.lookAt(club.position.clone().add(dir));
        }

        const clock = new THREE.Clock();
        const camOffsets = [{h:7, d:6}, {h:12, d:10}, {h:22, d:18}];

        function animate() {
            requestAnimationFrame(animate);
            if (!state.isLoaded) return;
            const dt = clock.getDelta(), elapsed = clock.getElapsedTime();
            const isMoving = Math.abs(state.moveInput.x) > 0.1 || Math.abs(state.moveInput.z) > 0.1;

            const gauge = document.getElementById('cd-gauge');
            const label = document.getElementById('dash-label');
            if (state.dashCooldownTimer > 0) {
                state.dashCooldownTimer -= dt;
                gauge.style.strokeDashoffset = (state.dashCooldownTimer / config.game.dashCooldown) * 170;
                label.innerText = state.dashCooldownTimer.toFixed(1);
            } else {
                gauge.style.strokeDashoffset = 170; label.innerText = "DASH";
            }

            if (state.dashTimer > 0) {
                state.dashTimer -= dt;
                if (state.dashTimer <= 0) { state.isDashing = false; dashPivot.rotation.set(0,0,0); }
            }

            // エイム中の移動速度をさらに遅く(0.3)
            let speedMult = state.isAimingAttack ? 0.3 : 1.0;
            let currentSpeed = state.isDashing ? config.game.dashSpeed : (6 * speedMult);
            let moveX = state.isDashing ? state.dashDir.x : state.moveInput.x;
            let moveZ = state.isDashing ? state.dashDir.z : state.moveInput.z;
            snailPlayer.position.x += moveX * currentSpeed * dt;
            snailPlayer.position.z += moveZ * currentSpeed * dt;

            if ((isMoving && !state.isDashing) || state.isDashing) {
                snailPlayer.rotation.y = THREE.MathUtils.lerp(snailPlayer.rotation.y, Math.atan2(moveX, moveZ), 0.15);
            }

            const animSpeed = isMoving ? 12 : 1.5;
            const bodyWave = Math.sin(elapsed * animSpeed);
            const shellWave = Math.sin(elapsed * animSpeed - 0.8);
            const moveSwing = isMoving ? Math.sin(elapsed * 10) * 0.05 : 0;

            loadedModels.body.visible = !state.isDashing;
            loadedModels.shell.visible = !state.isDashing;
            dashPivot.visible = state.isDashing;
            throwAimLine.visible = false;
            dashAimLine.visible = false;
            pickupCircle.visible = false;
            pickupGauge.visible = false;

            if (state.isDashing) {
                state.dashRot += dt * config.models.dashShell.rotateSpeed;
                dashPivot.rotation.x = state.dashRot;
                if (Math.random() > 0.2) createDust(0.2);
            } else {
                let squashStretch = 1.0;
                let heightOffset = 0;
                if (state.isAimingAttack) {
                    squashStretch = 0.7; // かがみ込み
                    heightOffset = -0.05; // 地面にめり込まないように調整
                } else if (state.throwAnimTimer > 0) {
                    state.throwAnimTimer -= dt;
                    squashStretch = 1.3; // 伸び上がり
                    heightOffset = 0.15;
                }

                loadedModels.body.scale.y = (1 + bodyWave * (isMoving ? 0.12 : 0.03)) * squashStretch;
                loadedModels.body.position.y = heightOffset;
                loadedModels.body.rotation.x = 0; 
                
                loadedModels.shell.position.y = 0.25 + shellWave * 0.04 + heightOffset;
                loadedModels.shell.rotation.z = moveSwing;
                loadedModels.shell.rotation.x = 0; 
                loadedModels.shell.scale.y = squashStretch;

                const club = loadedModels.club;
                if (state.clubState === 'ground') {
                    pickupCircle.visible = true;
                    pickupCircle.position.set(club.position.x, 0.05, club.position.z);
                    club.rotation.set(Math.PI/2, 0, 0); // 地面では必ず水平

                    const dist = snailPlayer.position.distanceTo(club.position);
                    if (dist < 1.5) {
                        state.pickupTimer += dt;
                        pickupGauge.visible = true;
                        pickupGauge.position.set(club.position.x, 0.06, club.position.z);
                        const progress = Math.min(state.pickupTimer / config.game.clubPickupTime, 1);
                        pickupGauge.geometry.dispose();
                        pickupGauge.geometry = new THREE.RingGeometry(0.8, 1.0, 32, 1, 0, progress * Math.PI * 2);
                        if (progress >= 1) {
                            state.clubState = 'equipped';
                            snailPlayer.add(club);
                        }
                    } else { state.pickupTimer = 0; }
                } else if (state.clubState === 'equipped') {
                    club.visible = true;
                    club.position.set(
                        config.models.club.equipPos[0], 
                        config.models.club.equipPos[1] + (shellWave * 0.04) + (heightOffset * 2), 
                        config.models.club.equipPos[2]
                    );
                    club.rotation.set(moveSwing * 2, 0, moveSwing);
                    if (state.isAimingAttack) {
                        throwAimLine.visible = true;
                        throwAimLine.position.set(snailPlayer.position.x, 0.01, snailPlayer.position.z);
                        throwAimLine.rotation.y = Math.atan2(state.attackInput.x, state.attackInput.z);
                    }
                } else if (state.clubState === 'thrown') {
                    club.visible = true;
                    state.clubVel.y -= 35 * dt;
                    club.position.add(state.clubVel.clone().multiplyScalar(dt));
                    club.rotateX(config.game.clubAirRotateSpeed * dt);

                    if (club.position.y < 0.3) {
                        club.position.y = 0.3;
                        state.clubVel.y *= -0.4;
                        state.clubVel.x *= 0.8;
                        state.clubVel.z *= 0.8;
                        if (state.clubVel.length() < 1) {
                            state.clubState = 'ground';
                            state.pickupTimer = 0;
                            // アイテム状態への移行時に角度を水平に固定
                            club.rotation.set(Math.PI/2, 0, 0); 
                        }
                    }
                }

                if (state.isAimingDash && state.dashCooldownTimer <= 0) {
                    dashAimLine.visible = true;
                    dashAimLine.position.set(snailPlayer.position.x, 0.1, snailPlayer.position.z);
                    dashAimLine.rotation.y = Math.atan2(state.dashInput.x, state.dashInput.z);
                }
                if (isMoving && Math.random() > 0.8) createDust(0.1);
            }

            dustParticles.forEach((p, i) => {
                p.life -= dt * 2.2; p.mesh.scale.setScalar(Math.max(0, p.life));
                if (p.life <= 0) { scene.remove(p.mesh); dustParticles.splice(i, 1); }
            });

            const cfg = camOffsets[state.camMode];
            camera.position.lerp(new THREE.Vector3(snailPlayer.position.x, cfg.h, snailPlayer.position.z + cfg.d), 0.1);
            camera.lookAt(snailPlayer.position);
            renderer.render(scene, camera);
        }

        function createDust(size) {
            const dust = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), new THREE.MeshBasicMaterial({color: 0x888888, transparent: true, opacity: 0.4}));
            dust.position.copy(snailPlayer.position).add(new THREE.Vector3((Math.random()-0.5)*0.5, 0.05, (Math.random()-0.5)*0.5));
            scene.add(dust); dustParticles.push({mesh: dust, life: 1.0});
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
